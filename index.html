rbike?", "ex_vi": "Bạn đã từng lái xe máy chưa?"}, {"w": "unforgettable", "ipa": "/ˌʌnfərˈɡetəbəl/", "vi": "không thể quên", "ex_en": "It was an unforgettable trip.", "ex_vi": "Đó là một chuyến đi không thể quên."}], "patterns": ["Have/Has + S + V3 (ever)?", "S + have/has + never + V3"], "quiz": [{"q": "'Cô ấy chưa bao giờ ăn sushi':", "options": ["She has never eat sushi.", "She has never eaten sushi.", "She never has eaten sushi."], "answer": 1, "explain": "have/has + never + V3."}, {"q": "Câu hỏi đúng: 'Bạn đã từng thử durian chưa?'", "options": ["Did you try durian?", "Have you ever tried durian?", "Do you try durian?"], "answer": 1, "explain": "Have + S + ever + V3?"}, {"q": "Quá khứ phân từ (V3) của 'try':", "options": ["try", "tried", "trying"], "answer": 1, "explain": "try - tried - tried."}, {"q": "'Bạn đã bao giờ leo núi chưa?':", "options": ["Have you ever climb a mountain?", "Have you ever climbed a mountain?", "Did you ever climbed a mountain?"], "answer": 1, "explain": "Have + S + ever + V3?"}, {"q": "'Đó là một chuyến đi không thể quên':", "options": ["It was an unforgettable trip.", "It is an unforgettable trip yesterday.", "It was an unforgettable trip since."], "answer": 0, "explain": "quá khứ đơn: was, có mốc rõ (chuyến đi đã qua)."}, {"q": "'Tôi đã từng lái xe máy' dùng:", "options": ["I have ridden a motorbike.", "I have ride a motorbike.", "I has ridden a motorbike."], "answer": 0, "explain": "have + V3 (ridden)."}], "speaking": "Nói về 3 điều bạn đã từng trải nghiệm trong đời (nơi đã đến, món ăn đã thử, việc đã làm).", "homework": "Viết danh sách 8 điều 'I have never...' và 'I have already...' về bản thân.", "links": [{"label": "Video YouTube: present perfect tense have you ever English grammar", "url": "https://www.youtube.com/results?search_query=present%20perfect%20tense%20have%20you%20ever%20English%20grammar"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Chia sẻ trải nghiệm đã từng làm", "lines": [{"speaker": "A", "en": "Have you ever climbed a mountain?", "vi": "Bạn đã bao giờ leo núi chưa?"}, {"speaker": "B", "en": "Yes, I have. I climbed Fansipan last year. It was unforgettable.", "vi": "Rồi, tôi đã từng. Tôi đã leo Fansipan năm ngoái. Đó là một trải nghiệm không thể quên."}, {"speaker": "A", "en": "Wow! Have you ever ridden a motorbike long distance?", "vi": "Wow! Bạn đã bao giờ lái xe máy đường dài chưa?"}, {"speaker": "B", "en": "Yes, I have ridden from Hanoi to Ha Giang. Have you ever tried that?", "vi": "Rồi, tôi đã từng đi xe máy từ Hà Nội đến Hà Giang. Bạn đã thử chưa?"}, {"speaker": "A", "en": "No, I haven't. I'd love to try it someday!", "vi": "Chưa, tôi chưa từng. Tôi rất muốn thử một ngày nào đó!"}]}}, {"week": 26, "month": 7, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "So sánh hiện tại hoàn thành vs quá khứ đơn", "review": false, "grammar": {"name": "Phân biệt Hiện tại hoàn thành và Quá khứ đơn, SINCE/FOR", "explain": "Quá khứ đơn: hành động đã kết thúc, có thời gian cụ thể (yesterday, in 2020). Hiện tại hoàn thành: không nói rõ thời điểm, hoặc kéo dài đến hiện tại (dùng since + mốc thời gian, for + khoảng thời gian).", "examples": [{"en": "I visited Hue in 2019.", "vi": "Tôi đã thăm Huế vào năm 2019."}, {"en": "I have lived here since 2019.", "vi": "Tôi đã sống ở đây từ năm 2019."}, {"en": "She has worked here for 3 years.", "vi": "Cô ấy đã làm việc ở đây được 3 năm."}]}, "vocab": [{"w": "since", "ipa": "/sɪns/", "vi": "từ (mốc thời gian)", "ex_en": "I have studied English since 2023.", "ex_vi": "Tôi đã học tiếng Anh từ năm 2023."}, {"w": "for", "ipa": "/fɔːr/", "vi": "trong (khoảng thời gian)", "ex_en": "I have lived here for 5 years.", "ex_vi": "Tôi đã sống ở đây 5 năm."}, {"w": "how long", "ipa": "", "vi": "bao lâu rồi", "ex_en": "How long have you worked here?", "ex_vi": "Bạn đã làm việc ở đây bao lâu rồi?"}, {"w": "recently", "ipa": "/ˈriːsəntli/", "vi": "gần đây", "ex_en": "I have recently changed jobs.", "ex_vi": "Gần đây tôi đã đổi việc."}, {"w": "moment", "ipa": "/ˈmoʊmənt/", "vi": "thời điểm", "ex_en": "At that moment, I felt happy.", "ex_vi": "Vào khoảnh khắc đó, tôi cảm thấy hạnh phúc."}, {"w": "still", "ipa": "/stɪl/", "vi": "vẫn còn", "ex_en": "I still live in Hanoi.", "ex_vi": "Tôi vẫn sống ở Hà Nội."}, {"w": "ago", "ipa": "/əˈɡoʊ/", "vi": "cách đây", "ex_en": "I moved here two years ago.", "ex_vi": "Tôi chuyển đến đây cách đây 2 năm."}, {"w": "continue", "ipa": "/kənˈtɪnjuː/", "vi": "tiếp tục", "ex_en": "I will continue studying.", "ex_vi": "Tôi sẽ tiếp tục học."}, {"w": "for a long time", "ipa": "/fɔːr ə lɔːŋ taɪm/", "vi": "trong một thời gian dài", "ex_en": "I have known her for a long time.", "ex_vi": "Tôi đã biết cô ấy trong một thời gian dài."}, {"w": "just / already / yet", "ipa": "/dʒʌst/ /ɔːlˈredi/ /jet/", "vi": "vừa mới / đã / chưa", "ex_en": "I have just finished my homework.", "ex_vi": "Tôi vừa mới hoàn thành bài tập."}, {"w": "since I was young", "ipa": "/sɪns aɪ wʌz jʌŋ/", "vi": "từ khi tôi còn nhỏ", "ex_en": "I have played piano since I was young.", "ex_vi": "Tôi đã chơi piano từ khi còn nhỏ."}, {"w": "recently", "ipa": "/ˈriːsəntli/", "vi": "gần đây", "ex_en": "I moved here recently.", "ex_vi": "Gần đây tôi đã chuyển đến đây."}], "patterns": ["S + have/has + V3 + since/for...", "S + V-ed + (mốc thời gian cụ thể)"], "quiz": [{"q": "'Tôi sống ở đây được 5 năm rồi (và vẫn đang sống)':", "options": ["I lived here for 5 years.", "I have lived here for 5 years.", "I live here since 5 years."], "answer": 1, "explain": "Kéo dài đến hiện tại dùng hiện tại hoàn thành + for."}, {"q": "Chọn đúng: 'since' đi với:", "options": ["khoảng thời gian (3 years)", "mốc thời gian (2020)", "hôm qua"], "answer": 1, "explain": "since + mốc thời gian cụ thể."}, {"q": "'Tôi đã thăm Huế năm 2019' (đã kết thúc, có mốc rõ):", "options": ["I have visited Hue in 2019.", "I visited Hue in 2019.", "I visit Hue in 2019."], "answer": 1, "explain": "Có mốc thời gian cụ thể dùng quá khứ đơn."}, {"q": "'Tôi vừa mới hoàn thành bài tập':", "options": ["I have just finished my homework.", "I just finish my homework.", "I have finished just my homework."], "answer": 0, "explain": "have + just + V3."}, {"q": "'Tôi đã biết cô ấy trong một thời gian dài':", "options": ["I know her for a long time.", "I have known her for a long time.", "I knew her for a long time already."], "answer": 1, "explain": "kéo dài đến hiện tại: have known + for."}, {"q": "'Gần đây tôi đã chuyển đến đây':", "options": ["I move here recently.", "I moved here recently.", "I have move here recently."], "answer": 1, "explain": "recently thường đi với quá khứ đơn khi có ý nghĩa 1 hành động cụ thể."}], "speaking": "Nói về những điều bạn đã làm 'từ' (since) một thời điểm và 'trong' (for) bao lâu.", "homework": "Viết 5 câu về bản thân dùng since và 5 câu dùng for.", "links": [{"label": "Video YouTube: present perfect vs simple past since for English", "url": "https://www.youtube.com/results?search_query=present%20perfect%20vs%20simple%20past%20since%20for%20English"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}], "dialogue": {"title": "Nói về khoảng thời gian đã trải qua", "lines": [{"speaker": "A", "en": "How long have you lived in this city?", "vi": "Bạn đã sống ở thành phố này bao lâu rồi?"}, {"speaker": "B", "en": "I have lived here for five years, since I finished university.", "vi": "Tôi đã sống ở đây được 5 năm, từ khi tôi tốt nghiệp đại học."}, {"speaker": "A", "en": "Have you made a lot of friends here?", "vi": "Bạn đã kết bạn nhiều ở đây chưa?"}, {"speaker": "B", "en": "Yes, I have. I've just made a new friend recently, actually.", "vi": "Rồi. Thật ra gần đây tôi vừa mới kết một người bạn mới."}, {"speaker": "A", "en": "That's nice! I've known my best friend since I was young.", "vi": "Hay đấy! Tôi đã biết bạn thân của mình từ khi còn nhỏ."}]}}, {"week": 27, "month": 7, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Kỹ năng & Khả năng", "review": false, "grammar": {"name": "CAN / COULD / BE ABLE TO (khả năng)", "explain": "Can: khả năng ở hiện tại. Could: khả năng ở quá khứ, hoặc lịch sự hơn khi xin phép/yêu cầu. Be able to: có thể dùng ở mọi thì, trang trọng hơn can.", "examples": [{"en": "I can speak a little English.", "vi": "Tôi có thể nói một chút tiếng Anh."}, {"en": "When I was young, I could run fast.", "vi": "Khi còn nhỏ, tôi có thể chạy nhanh."}, {"en": "I will be able to finish it tomorrow.", "vi": "Tôi sẽ có thể hoàn thành nó vào ngày mai."}]}, "vocab": [{"w": "skill", "ipa": "/skɪl/", "vi": "kỹ năng", "ex_en": "I want to improve my skills.", "ex_vi": "Tôi muốn cải thiện kỹ năng của mình."}, {"w": "play the guitar/piano", "ipa": "", "vi": "chơi guitar/piano", "ex_en": "I can play the guitar.", "ex_vi": "Tôi có thể chơi guitar."}, {"w": "drive", "ipa": "/draɪv/", "vi": "lái xe", "ex_en": "I can drive a car.", "ex_vi": "Tôi có thể lái xe hơi."}, {"w": "swim", "ipa": "/swɪm/", "vi": "bơi", "ex_en": "I couldn't swim when I was a child.", "ex_vi": "Tôi không thể bơi khi còn nhỏ."}, {"w": "cook", "ipa": "/kʊk/", "vi": "nấu ăn", "ex_en": "She can cook Vietnamese food well.", "ex_vi": "Cô ấy có thể nấu món Việt rất ngon."}, {"w": "improve", "ipa": "/ɪmˈpruːv/", "vi": "cải thiện", "ex_en": "I want to improve my English.", "ex_vi": "Tôi muốn cải thiện tiếng Anh của mình."}, {"w": "talented", "ipa": "/ˈtæləntɪd/", "vi": "có năng khiếu", "ex_en": "He is talented at music.", "ex_vi": "Anh ấy có năng khiếu về âm nhạc."}, {"w": "practice", "ipa": "/ˈpræktɪs/", "vi": "luyện tập", "ex_en": "Practice makes perfect.", "ex_vi": "Có công mài sắt có ngày nên kim."}, {"w": "play chess", "ipa": "/pleɪ tʃes/", "vi": "chơi cờ vua", "ex_en": "I can play chess quite well.", "ex_vi": "Tôi có thể chơi cờ vua khá giỏi."}, {"w": "speak two languages", "ipa": "/spiːk tuː ˈlæŋɡwɪdʒɪz/", "vi": "nói hai ngôn ngữ", "ex_en": "She can speak two languages.", "ex_vi": "Cô ấy có thể nói hai ngôn ngữ."}, {"w": "fix things", "ipa": "/fɪks θɪŋz/", "vi": "sửa đồ", "ex_en": "My father can fix almost anything.", "ex_vi": "Bố tôi có thể sửa hầu như mọi thứ."}, {"w": "good at / bad at", "ipa": "/ɡʊd æt/ /bæd æt/", "vi": "giỏi về / kém về", "ex_en": "I'm good at math but bad at drawing.", "ex_vi": "Tôi giỏi toán nhưng kém vẽ."}], "patterns": ["S + can/could + V", "S + will be able to + V"], "quiz": [{"q": "'Tôi có thể nói tiếng Anh' hiện tại:", "options": ["I can speak English.", "I could speak English.", "I can to speak English."], "answer": 0, "explain": "can + V nguyên mẫu, không có 'to'."}, {"q": "'Khi nhỏ tôi có thể bơi' (quá khứ):", "options": ["I can swim.", "I could swim.", "I will can swim."], "answer": 1, "explain": "Khả năng quá khứ dùng could."}, {"q": "Dạng tương lai của can:", "options": ["will can", "will be able to", "can will"], "answer": 1, "explain": "can không có dạng tương lai, dùng will be able to."}, {"q": "'Cô ấy có thể nói hai ngôn ngữ':", "options": ["She can speaks two languages.", "She can speak two languages.", "She can to speak two languages."], "answer": 1, "explain": "can + V nguyên mẫu, không thêm s."}, {"q": "'Tôi giỏi toán nhưng kém vẽ':", "options": ["I'm good at math but bad at drawing.", "I'm good in math but bad in drawing.", "I'm good at math but bad drawing."], "answer": 0, "explain": "good at / bad at + danh từ/V-ing."}, {"q": "'Bố tôi có thể sửa hầu như mọi thứ':", "options": ["My father can fix almost anything.", "My father can fixes almost anything.", "My father cans fix anything."], "answer": 0, "explain": "can luôn giữ nguyên, không chia theo chủ ngữ."}], "speaking": "Nói về 3 kỹ năng bạn có thể làm hiện tại và 1 kỹ năng bạn muốn cải thiện.", "homework": "Viết đoạn văn 6 câu về khả năng của bản thân ở hiện tại và quá khứ.", "links": [{"label": "Video YouTube: can could be able to English grammar ability", "url": "https://www.youtube.com/results?search_query=can%20could%20be%20able%20to%20English%20g re seems to be a problem with...'. Khi xin lỗi: 'I apologize for...', 'I'm really sorry about...'.", "examples": [{"en": "I'm sorry to say this, but the food is cold.", "vi": "Tôi xin lỗi phải nói điều này, nhưng đồ ăn nguội rồi."}, {"en": "There seems to be a problem with my room.", "vi": "Có vẻ như có vấn đề với phòng của tôi."}, {"en": "I apologize for the inconvenience.", "vi": "Tôi xin lỗi vì sự bất tiện này."}]}, "vocab": [{"w": "problem / issue", "ipa": "", "vi": "vấn đề", "ex_en": "There is a problem with my order.", "ex_vi": "Có vấn đề với đơn hàng của tôi."}, {"w": "complain", "ipa": "/kəmˈpleɪn/", "vi": "phàn nàn", "ex_en": "I want to complain about the service.", "ex_vi": "Tôi muốn phàn nàn về dịch vụ."}, {"w": "apologize", "ipa": "/əˈpɒlədʒaɪz/", "vi": "xin lỗi", "ex_en": "I apologize for being late.", "ex_vi": "Tôi xin lỗi vì đã đến trễ."}, {"w": "inconvenience", "ipa": "/ˌɪnkənˈviːniəns/", "vi": "sự bất tiện", "ex_en": "Sorry for the inconvenience.", "ex_vi": "Xin lỗi vì sự bất tiện."}, {"w": "refund", "ipa": "/ˈriːfʌnd/", "vi": "hoàn tiền", "ex_en": "Can I get a refund?", "ex_vi": "Tôi có thể được hoàn tiền không?"}, {"w": "mistake", "ipa": "/mɪˈsteɪk/", "vi": "sai sót", "ex_en": "This is a mistake.", "ex_vi": "Đây là một sai sót."}, {"w": "fix / solve", "ipa": "", "vi": "sửa / giải quyết", "ex_en": "Can you fix this problem?", "ex_vi": "Bạn có thể giải quyết vấn đề này không?"}, {"w": "understand", "ipa": "/ˌʌndərˈstænd/", "vi": "thông cảm/hiểu", "ex_en": "I understand your frustration.", "ex_vi": "Tôi hiểu sự bực bội của bạn."}, {"w": "broken / not working", "ipa": "/ˈbroʊkən/", "vi": "hỏng / không hoạt động", "ex_en": "The air conditioner is broken.", "ex_vi": "Máy lạnh bị hỏng."}, {"w": "dirty", "ipa": "/ˈdɜːrti/", "vi": "bẩn", "ex_en": "The room was dirty when I arrived.", "ex_vi": "Phòng bị bẩn khi tôi đến."}, {"w": "compensation", "ipa": "/ˌkɒmpenˈseɪʃən/", "vi": "sự bồi thường", "ex_en": "Can I get some compensation?", "ex_vi": "Tôi có thể đư n?", "The room dirty, can I get compensation?", "The room is dirty, can I getting compensation?"], "answer": 0, "explain": "is + tính từ; can + V nguyên mẫu."}, {"q": "'Tôi rất cảm kích vì sự giúp đỡ của bạn':", "options": ["I appreciate your help.", "I appreciate for your help.", "I'm appreciate your help."], "answer": 0, "explain": "appreciate + tân ngữ trực tiếp, không cần giới từ."}], "speaking": "Xử lý liên tiếp 2 tình huống thực tế: đặt phòng khách sạn qua điện thoại, sau đó phàn nàn về phòng không như mong đợi.", "homework": "Viết kịch bản hoàn chỉnh (script) cho 2 tình huống trên, luyện đọc to 3 lần.", "links": [{"label": "Video YouTube: hotel booking and complaint role play English", "url": "https://www.youtube.com/results?search_query=hotel%20booking%20and%20complaint%20role%20play%20English"}], "dialogue": {"title": "Tổng ôn: Đặt phòng và xử lý sự cố", "lines": [{"speaker": "A", "en": "Hi, I'd like to book a room with a sea view for this weekend.", "vi": "Chào, tôi muốn đặt phòng hướng biển cho cuối tuần này."}, {"speaker": "B", "en": "Sure, as long as you book before Friday, we can guarantee it.", "vi": "Vâng, miễn là anh/chị đặt trước thứ Sáu, chúng tôi có thể đảm bảo."}, {"speaker": "A", "en": "Great, I'll book now then.", "vi": "Tuyệt, vậy tôi đặt luôn bây giờ."}, {"speaker": "A", "en": "By the way, last time I stayed, the room was a bit dirty. I hope that won't happen again.", "vi": "Nhân tiện, lần trước tôi ở, phòng hơi bẩn. Tôi hy vọng lần này sẽ không như vậy."}, {"speaker": "B", "en": "I'm sorry about that. We'll make sure your room is perfect this time.", "vi": "Tôi xin lỗi về điều đó. Chúng tôi sẽ đảm bảo phòng hoàn hảo lần này."}, {"speaker": "A", "en": "I appreciate it, thank you.", "vi": "Tôi rất cảm kích, cảm ơn."}]}}, {"week": 33, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Nêu ý kiến cá nhân", "review": false, "grammar": {"name": "I think/In my opinion + liên từ but/because/so", "explain": "Dùng để mở đầu khi nêu quan điểm cá nhân một cách tự nhiên, tránh nói cộc lốc. Liên từ but/because/so giúp câu logic và tự nhiên hơn.", "examples": [{"en": "In my opinion, learning English is important.", "vi": "Theo ý kiến của tôi, học tiếng Anh rất quan trọng."}, {"en": "I think this is a good idea, but it takes time.", "vi": "Tôi nghĩ đây là ý tưởng hay, nhưng nó tốn thời gian."}, {"en": "I like this job because it pays well.", "vi": "Tôi thích công việc này vì nó trả lương cao."}]}, "vocab": [{"w": "in my opinion", "ipa": "", "vi": "theo ý kiến của tôi", "ex_en": "In my opinion, this is the best choice.", "ex_vi": "Theo ý kiến của tôi, đây là lựa chọn tốt nhất."}, {"w": "I think/I believe", "ipa": "", "vi": "tôi nghĩ/tôi tin rằng", "ex_en": "I believe hard work pays off.", "ex_vi": "Tôi tin rằng chăm chỉ sẽ được đền đáp."}, {"w": "agree / disagree", "ipa": "", "vi": "đồng ý / không đồng ý", "ex_en": "I agree with you.", "ex_vi": "Tôi đồng ý với bạn."}, {"w": "because", "ipa": "/bɪˈkɔːz/", "vi": "bởi vì", "ex_en": "I study English because I want a better job.", "ex_vi": "Tôi học tiếng Anh vì tôi muốn công việc tốt hơn."}, {"w": "so", "ipa": "/soʊ/", "vi": "vì vậy", "ex_en": "It was raining, so I stayed home.", "ex_vi": "Trời mưa nên tôi ở nhà."}, {"w": "but / however", "ipa": "", "vi": "nhưng / tuy nhiên", "ex_en": "I like it, but it's expensive.", "ex_vi": "Tôi thích nó, nhưng nó đắt."}, {"w": "point of view", "ipa": "", "vi": "quan điểm", "ex_en": "From my point of view, it's fair.", "ex_vi": "Theo quan điểm của tôi, điều đó công bằng."}, {"w": "importance", "ipa": "/ɪmˈpɔːrtəns/", "vi": "tầm quan trọng", "ex_en": "I understand the importance of English.", "ex_vi": "Tôi hiểu tầm quan trọng của tiếng Anh."}, {"w": "from my perspective", "ipa": "/frʌm maɪ pərˈspektɪv/", "vi": "theo quan điểm của tôi", "ex_en": "From my perspective, it's fair.", "ex_vi": "Theo quan điểm của tôi, điều đó công bằng."}, {"w": "on the other hand", "ipa": "/ɒn ði ˈʌðər hænd/", "vi": "mặt khác", "ex_en": "On the other hand, it's expensive.", "ex_vi": "Mặt khác, nó lại đắt."}, {"w": "convince", "ipa": "/kənˈvɪns/", "vi": "thuyết phục", "ex_en": "You didn't convince me.", "ex_vi": "Bạn chưa thuyết phục được tôi."}, {"w": "make sense", "ipa": "/meɪk sens/", "vi": "hợp lý", "ex_en": "That makes sense to me.", "ex_vi": "Điều đó hợp lý với tôi."}], "patterns": ["In my opinion, .../ I think..., but...", "S + V + because + S + V"], "quiz": [{"q": "Mở đầu nêu ý kiến tự nhiên:", "options": ["This is true.", "In my opinion, this is true.", "True this is."], "answer": 1, "explain": "In my opinion mở đầu tự nhiên hơn."}, {"q": "'Tôi thích vì nó rẻ':", "options": ["I like it so it's cheap.", "I like it because it's cheap.", "I like it but it's cheap."], "answer": 1, "explain": "because diễn tả lý do."}, {"q": "'Trời mưa nên tôi ở nhà':", "options": ["It rained because I stayed home.", "It rained so I stayed home.", "It rained but I stayed home."], "answer": 1, "explain": "so diễn tả kết quả."}, {"q": "'Theo quan điểm của tôi, điều đó công bằng':", "options": ["From my perspective, it's fair.", "From my perspective, it fair.", "In my perspective, it's fair."], "answer": 0, "explain": "from my perspective = theo quan điểm của tôi."}, {"q": "'Điều đó hợp lý với tôi':", "options": ["That makes sense to me.", "That make sense to me.", "That making sense to me."], "answer": 0, "explain": "makes (ngôi 3 số ít 'that')."}, {"q": "'Mặt khác' tiếng Anh là:", "options": ["on the other hand", "from my perspective", "make sense"], "answer": 0, "explain": "on the other hand = mặt khác."}], "speaking": "Nêu ý kiến về 2 chủ đề đơn giản (VD: học online vs học trực tiếp) dùng in my opinion/because/but.", "homework": "Viết đoạn văn 6-8 câu nêu quan điểm về một chủ đề bạn quan tâm.", "links": [{"label": "Video YouTube: giving opinions in English useful phrases", "url": "https://www.youtube.com/results?search_query=giving%20opinions%20in%20English%20useful%20phrases"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Tranh luận nhẹ nhàng về một chủ đề", "lines": [{"speaker": "A", "en": "I think working from home is better than going to the office.", "vi": "Tôi nghĩ làm việc tại nhà tốt hơn đến văn phòng."}, {"speaker": "B", "en": "From my perspective, I disagree. I prefer the office.", "vi": "Theo quan điểm của tôi, tôi không đồng ý. Tôi thích văn phòng hơn."}, {"speaker": "A", "en": "Why is that?", "vi": "Tại sao vậy?"}, {"speaker": "B", "en": "Working at the office helps me focus. On the other hand, home has too many distractions.", "vi": "Làm ở văn phòng giúp tôi tập trung. Mặt khác, ở nhà có quá nhiều thứ gây xao nhãng."}, {"speaker": "A", "en": "That makes sense, actually. You've convinced me a little!", "vi": "Thật ra điều đó hợp lý đấy. Bạn đã thuyết phục tôi phần nào rồi!"}]}}, {"week": 34, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Câu bị động cơ bản", "review": false, "grammar": {"name": "Câu bị động (Passive Voice) thì hiện tại/quá khứ đơn", "explain": "Dùng khi muốn nhấn mạnh vào hành động/đối tượng chịu tác động hơn là người thực hiện. Cấu trúc: S + am/is/are/was/were + V3 (+ by + tác nhân).", "examples": [{"en": "English is spoken in many countries.", "vi": "Tiếng Anh được nói ở nhiều quốc gia."}, {"en": "The house was built in 1990.", "vi": "Ngôi nhà được xây vào năm 1990."}, {"en": "This product is made in Vietnam.", "vi": "Sản phẩm này được sản xuất tại Việt Nam."}]}, "vocab": [{"w": "made / built", "ipa": "", "vi": "được làm / được xây", "ex_en": "This car is made in Japan.", "ex_vi": "Chiếc xe này được sản xuất tại Nhật."}, {"w": "spoken / written", "ipa": "", "vi": "được nói / được viết", "ex_en": "This letter was written by her.", "ex_vi": "Bức thư này được viết bởi cô ấy."}, {"w": "used", "ipa": "/juːzd/", "vi": "được sử dụng", "ex_en": "This tool is used every day.", "ex_vi": "Công cụ này được dùng mỗi ngày."}, {"w": "produce", "ipa": "/prəˈdjuːs/", "vi": "sản xuất", "ex_en": "Rice is produced in Vietnam.", "ex_vi": "Gạo được sản xuất ở Việt Nam."}, {"w": "by (tác nhân)", "ipa": "/baɪ/", "vi": "bởi", "ex_en": "This song was written by him.", "ex_vi": "Bài hát này được viết bởi anh ấy."}, {"w": "known / famous", "ipa": "", "vi": "nổi tiếng", "ex_en": "This place is known for its food.", "ex_vi": "Nơi này nổi tiếng vì đồ ăn."}, {"w": "include", "ipa": "/ɪnˈkluːd/", "vi": "bao gồm", "ex_en": "Breakfast is included.", "ex_vi": "Bữa sáng đã được bao gồm."}, {"w": "worldwide", "ipa": "/ˌwɜːrldˈwaɪd/", "vi": "trên toàn thế giới", "ex_en": "This brand is known worldwide.", "ex_vi": "Thương hiệu này được biết đến trên toàn thế giới."}, {"w": "invented", "ipa": "/ɪnˈventɪd/", "vi": "được phát minh", "ex_en": "The telephone was invented in 1876.", "ex_vi": "Điện thoại được phát minh năm 1876."}, {"w": "built", "ipa": "/bɪlt/", "vi": "được xây dựng", "ex_en": "This bridge was built in 1990.", "ex_vi": "Cây cầu này được xây năm 1990."}, {"w": "discovered", "ipa": "/dɪˈskʌvərd/", "vi": "được khám phá", "ex_en": "America was discovered by explorers.", "ex_vi": "Châu Mỹ được các nhà thám hiểm khám phá."}, {"w": "designed", "ipa": "/dɪˈzaɪnd/", "vi": "được thiết kế", "ex_en": "This app was designed for beginners.", "ex_vi": "Ứng dụng này được thiết kế cho người mới bắt đầu."}], "patterns": ["S + am/is/are + V3 (+ by...)", "S + was/were + V3 (+ by...)"], "quiz": [{"q": "'Tiếng Anh được nói ở nhiều nước':", "options": ["English speaks in many countries.", "English is spoken in many countries.", "English was spoken many countries."], "answer": 1, "explain": "hiện tại đơn bị động: is + V3."}, {"q": "'Ngôi nhà được xây năm 1990':", "options": ["The house built in 1990.", "The house was built in 1990.", "The house is built in 1990."], "answer": 1, "explain": "quá khứ đơn bị động: was + V3."}, {"q": "Câu bị động dùng khi:", "options": ["Nhấn mạnh người thực hiện", "Nhấn mạnh đối tượng chịu tác động", "Không có nghĩa gì khác"], "answer": 1, "explain": "Bị động nhấn mạnh đối tượng."}, {"q": "'Điện thoại được phát minh năm 1876':", "options": ["The telephone invented in 1876.", "The telephone was invented in 1876.", "The telephone is invented in 1876."], "answer": 1, "explain": "bị động quá khứ: was invented."}, {"q": "'Ứng dụng này được thiết kế cho người mới':", "options": ["This app designed for beginners.", "This app was designed for beginners.", "This app is design for beginners."], "answer": 1, "explain": "was + V3 (câu bị động quá khứ)."}, {"q": "'Cây cầu này được xây năm 1990':", "options": ["This bridge built in 1990.", "This bridge was built in 1990.", "This bridge is built in 1990."], "answer": 1, "explain": "was built = được xây (quá khứ bị động)."}], "speaking": "Mô tả 3 sản phẩm/địa điểm nổi tiếng dùng câu bị động (VD: This phone is made in...).", "homework": "Viết 5 câu bị động về sản phẩm hoặc địa danh Việt Nam.", "links": [{"label": "Video YouTube: passive voice English grammar simple present past", "url": "https://www.youtube.com/results?search_query=passive%20voice%20English%20grammar%20simple%20present%20past"}, {"label": "Từ điển phát âm Cambridge", "url": "https://dictionary.cambridge.org/"}], "dialogue": {"title": "Nói về những phát minh và địa danh nổi tiếng", "lines": [{"speaker": "A", "en": "Did you know the telephone was invented in 1876?", "vi": "Bạn có biết điện thoại được phát minh năm 1876 không?"}, {"speaker": "B", "en": "Really? That's older than I thought. Who invented it?", "vi": "Thật hả? Cũ hơn tôi nghĩ. Ai phát minh ra nó vậy?"}, {"speaker": "A", "en": "Alexander Graham Bell. By the way, this bridge near my house was built in 1990.", "vi": "Alexander Graham Bell. Nhân tiện, cây cầu gần nhà tôi được xây năm 1990."}, {"speaker": "B", "en": "Interesting! This whole area was designed by a famous architect, I heard.", "vi": "Hay đấy! Tôi nghe nói cả khu này được thiết kế bởi một kiến trúc sư nổi tiếng."}]}}, {"week": 35, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Kể lại lời người khác", "review": false, "grammar": {"name": "Câu tường thuật (Reported Speech) cơ bản", "explain": "Khi kể lại lời người khác đã nói, thì thường lùi về một bậc (hiện tại đơn → quá khứ đơn) và đổi đại từ phù hợp. Cấu trúc: S + said (that) + S + V (lùi thì).", "examples": [{"en": "She said that she was tired.", "vi": "Cô ấy nói rằng cô ấy mệt."}, {"en": "He said he would come later.", "vi": "Anh ấy nói anh ấy sẽ đến sau."}, {"en": "They told me they liked the food.", "vi": "Họ nói với tôi rằng họ thích món ăn."}]}, "vocab": [{"w": "say - said", "ipa": "", "vi": "nói (quá khứ)", "ex_en": "She said she was busy.", "ex_vi": "Cô ấy nói cô ấy bận."}, {"w": "tell - told", "ipa": "", "vi": "kể/nói với ai (quá khứ)", "ex_en": "He told me his name.", "ex_vi": "Anh ấy nói tên anh ấy với tôi."}, {"w": "that (không bắt buộc)", "ipa": "", "vi": "rằng", "ex_en": "She said that she was happy.", "ex_vi": "Cô ấy nói rằng cô ấy hạnh phúc."}, {"w": "ask - asked", "ipa": "", "vi": "hỏi (quá khứ)", "ex_en": "He asked if I was okay.", "ex_vi": "Anh ấy hỏi tôi có ổn không."}, {"w": "mention", "ipa": "/ˈmenʃən/", "vi": "đề cập", "ex_en": "She mentioned her new job.", "ex_vi": "Cô ấy đã đề cập công việc mới của mình."}, {"w": "explain", "ipa": "/ɪkˈspleɪn/", "vi": "giải thích", "ex_en": "He explained the problem.", "ex_vi": "Anh ấy đã giải thích vấn đề."}, {"w": "according to", "ipa": "", "vi": "theo như", "ex_en": "According to her, it's true.", "ex_vi": "Theo như cô ấy nói, điều đó đúng."}, {"w": "would (lùi từ will)", "ipa": "", "vi": "sẽ (trong quá khứ)", "ex_en": "He said he would help me.", "ex_vi": "Anh ấy nói anh ấy sẽ giúp tôi."}, {"w": "promise - promised", "ipa": "/ˈprɒmɪst/", "vi": "hứa (tường thuật)", "ex_en": "He promised he would call.", "ex_vi": "Anh ấy hứa sẽ gọi."}, {"w": "suggest - suggested", "ipa": "/səˈdʒestɪd/", "vi": "gợi ý (tường thuật)", "ex_en": "She suggested going out.", "ex_vi": "Cô ấy gợi ý đi ra ngoài."}, {"w": "warn - warned", "ipa": "/wɔːrnd/", "vi": "cảnh báo (tường thuật)", "ex_en": "He warned me about the risk.", "ex_vi": "Anh ấy đã cảnh báo tôi về rủi ro."}, {"w": "admit - admitted", "ipa": "/ædˈmɪtɪd/", "vi": "thừa nhận (tường thuật)", "ex_en": "She admitted she was wrong.", "ex_vi": "Cô ấy thừa nhận mình đã sai."}], "patterns": ["S + said (that) + S + V (lùi thì)", "S + told + O + (that) + S + V"], "quiz": [{"q": "'Cô ấy nói cô ấy mệt' (mệt: is tired):", "options": ["She said she is tired.", "She said she was tired.", "She said she tired."], "answer": 1, "explain": "Lùi thì: is → was."}, {"q": "'Anh ấy nói anh ấy sẽ đến' (will come):", "options": ["He said he will come.", "He said he would come.", "He said he comes."], "answer": 1, "explain": "will lùi thành would."}, {"q": "Phân biệt say/tell:", "options": ["tell + tân ngữ người nghe, say + không cần", "say + tân ngữ, tell + không cần", "giống nhau hoàn toàn"], "answer": 0, "explain": "tell luôn cần tân ngữ chỉ người nghe."}, {"q": "'Anh ấy hứa sẽ gọi cho tôi' (will call):", "options": ["He promised he will call me.", "He promised he would call me.", "He promised he calls me."], "answer": 1, "explain": "will lùi thành would trong câu tường thuật."}, {"q": "'Cô ấy thừa nhận mình đã sai' (is wrong):", "options": ["She admitted she is wrong.", "She admitted she was wrong.", "She admitted she wrong."], "answer": 1, "explain": "is lùi thành was."}, {"q": "'Anh ấy đã cảnh báo tôi về rủi ro':", "options": ["He warn me about the risk.", "He warned me about the risk.", "He warns me about the risk."], "answer": 1, "explain": "warned = quá khứ của warn."}], "speaking": "Kể lại một cuộc hội thoại ngắn bạn đã nghe được gần đây (dùng said/told).", "homework": "Viết đoạn hội thoại ngắn rồi chuyển thành câu tường thuật (5 câu).", "links": [{"label": "Video YouTube: reported speech English grammar basics beginner", "url": "https://www.youtube.com/results?search_query=reported%20speech%20English%20grammar%20basics%20beginner"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Kể lại lời người khác đã nói", "lines": [{"speaker": "A", "en": "What did the doctor say?", "vi": "Bác sĩ nói gì vậy?"}, {"speaker": "B", "en": "She said I was very tired and suggested I rest more.", "vi": "Bác sĩ nói tôi rất mệt và gợi ý tôi nên nghỉ ngơi nhiều hơn."}, {"speaker": "A", "en": "Did she warn you about anything?", "vi": "Bác sĩ có cảnh báo bạn điều gì không?"}, {"speaker": "B", "en": "Yes, she warned me not to work overtime. I admitted that I work too much.", "vi": "Có, bác sĩ cảnh báo tôi đừng làm thêm giờ. Tôi đã thừa nhận là mình làm việc quá nhiều."}, {"speaker": "A", "en": "You promised me you would slow down last month!", "vi": "Bạn đã hứa với tôi tháng trước là sẽ chậm lại mà!"}]}}, {"week": 36, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Ôn tập cuối Giai đoạn 3 & Kiểm tra tổng hợp", "review": true, "grammar": {"name": "Ôn tập toàn bộ Tháng 7-9", "explain": "Ôn hiện tại hoàn thành, can/could, câu lịch sự, câu điều kiện, phàn nàn/xin lỗi, nêu ý kiến, câu bị động, câu tường thuật. Ôn toàn bộ ~1.800 từ vựng lũy kế.", "examples": [{"en": "In my opinion, this hotel is well known, but I was wondering if there's a problem with my booking.", "vi": "Theo tôi, khách sạn này khá nổi tiếng, nhưng tôi không biết là có vấn đề gì với đặt chỗ của tôi không."}]}, "vocab": [{"w": "in my opinion", "ipa": "", "vi": "theo ý kiến của tôi", "ex_en": "In my opinion, this is the best choice.", "ex_vi": "Theo ý kiến của tôi, đây là lựa chọn tốt nhất."}, {"w": "I think/I believe", "ipa": "", "vi": "tôi nghĩ/tôi tin rằng", "ex_en": "I believe hard work pays off.", "ex_vi": "Tôi tin rằng chăm chỉ sẽ được đền đáp."}, {"w": "agree / disagree", "ipa": "", "vi": "đồng ý / không đồng ý", "ex_en": "I agree with you.", "ex_vi": "Tôi đồng ý với bạn."}, {"w": "because", "ipa": "/bɪˈkɔːz/", "vi": "bởi vì", "ex_en": "I study English because I want a better job.", "ex_vi": "Tôi học tiếng Anh vì tôi muốn công việc tốt hơn."}, {"w": "made / built", "ipa": "", "vi": "được làm / được xây", "ex_en": "This car is made in Japan.", "ex_vi": "Chiếc xe này được sản xuất tại Nhật."}, {"w": "spoken / written", "ipa": "", "vi": "được nói / được viết", "ex_en": "This letter was written by her.", "ex_vi": "Bức thư này được viết bởi cô ấy."}, {"w": "used", "ipa": "/juːzd/", "vi": "được sử dụng", "ex_en": "This tool is used every day.", "ex_vi": "Công cụ này được dùng mỗi ngày."}, {"w": "produce", "ipa": "/prəˈdjuːs/", "vi": "sản xuất", "ex_en": "Rice is produced in Vietnam.", "ex_vi": "Gạo được sản xuất ở Việt Nam."}, {"w": "say - said", "ipa": "", "vi": "nói (quá khứ)", "ex_en": "She said she was busy.", "ex_vi": "Cô ấy nói cô ấy bận."}, {"w": "tell - told", "ipa": "", "vi": "kể/nói với ai (quá khứ)", "ex_en": "He told me his name.", "ex_vi": "Anh ấy nói tên anh ấy với tôi."}, {"w": "that (không bắt buộc)", "ipa": "", "vi": "rằng", "ex_en": "She said that she was happy.", "ex_vi": "Cô ấy nói rằng cô ấy hạnh phúc."}, {"w": "ask - asked", "ipa": "", "vi": "hỏi (quá khứ)", "ex_en": "He asked if I was okay.", "ex_vi": "Anh ấy hỏi tôi có ổn không."}], "patterns": ["Ôn tất cả cấu trúc Tháng 7-9"], "quiz": [{"q": "'This bag ___ (make) in Vietnam.'", "options": ["make", "made", "is made"], "answer": 2, "explain": "Câu bị động hiện tại: is made."}, {"q": "'She said she ___ (be) happy.'", "options": ["is", "was", "will be"], "answer": 1, "explain": "Câu tường thuật lùi thì: is → was."}, {"q": "'Theo tôi, ứng dụng này được thiết kế rất tốt':", "options": ["From my perspective, this app was designed very well.", "From my perspective, this app designed well.", "In my perspective, this app is design well."], "answer": 0, "explain": "from my perspective + was designed (bị động quá khứ)."}, {"q": "'Bác sĩ cảnh báo tôi và gợi ý tôi nên nghỉ ngơi':", "options": ["The doctor warned me and suggested I rest.", "The doctor warn me and suggest rest.", "The doctor warned me and suggested resting me."], "answer": 0, "explain": "warned, suggested đều là quá khứ đơn."}, {"q": "'Cây cầu này được xây năm nào?' hỏi đúng:", "options": ["When was this bridge built?", "When this bridge was built?", "When did this bridge built?"], "answer": 0, "explain": "câu hỏi bị động: When was + S + V3?"}, {"q": "'Anh ấy thừa nhận là đã hứa nhưng quên mất':", "options": ["He admitted that he promised but forgot.", "He admit that he promise but forget.", "He admitted that he promising but forgetting."], "answer": 0, "explain": "cả 3 động từ đều chia quá khứ đơn."}], "speaking": "PHỎNG VẤN NÓI 5 PHÚT + xử lý 1 tình huống bất ngờ (VD: máy bay bị hoãn, phải phàn nàn và tìm giải pháp).", "homework": "Tổng ôn 3 tháng: viết danh sách 15 lỗi sai thường gặp nhất của bản thân để chuẩn bị cho giai đoạn cuối.", "links": [{"label": "Video YouTube: English speaking test intermediate 5 minutes practice", "url": "https://www.youtube.com/results?search_query=English%20speaking%20test%20intermediate%205%20minutes%20practice"}], "dialogue": {"title": "Tổng ôn Giai đoạn 3: Ý kiến, bị động và tường thuật", "lines": [{"speaker": "A", "en": "From my perspective, this hotel was designed beautifully.", "vi": "Theo tôi, khách sạn này được thiết kế rất đẹp."}, {"speaker": "B", "en": "I agree. On the other hand, the receptionist warned us it can get noisy at night.", "vi": "Tôi đồng ý. Mặt khác, lễ tân đã cảnh báo chúng ta là ban đêm có thể ồn."}, {"speaker": "A", "en": "Really? She didn't mention that to me. Did she suggest anything?", "vi": "Thật hả? Cô ấy không nói với tôi điều đó. Cô ấy có gợi ý gì không?"}, {"speaker": "B", "en": "Yes, she suggested we ask for a room on a higher floor.", "vi": "Có, cô ấy gợi ý chúng ta nên xin phòng ở tầng cao hơn."}, {"speaker": "A", "en": "That makes sense. Let's ask at the front desk.", "vi": "Nghe hợp lý đấy. Ra quầy lễ tân hỏi thôi."}]}}, {"week": 37, "month": 10, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Công nghệ & Mạng xã hội", "review": false, "grammar": {"name": "Cụm động từ (Phrasal Verbs) thông dụng", "explain": "Phrasal verb = động từ + giới từ/trạng từ, nghĩa thường khác với nghĩa gốc của từng từ. Rất phổ biến trong giao tiếp tự nhiên hằng ngày.", "examples": [{"en": "I need to look up this word.", "vi": "Tôi cần tra từ này."}, {"en": "Turn off your phone, please.", "vi": "Làm ơn tắt điện thoại của bạn."}, {"en": "I grew up using smartphones.", "vi": "Tôi lớn lên cùng với việc dùng điện thoại thông minh."}]}, "vocab": [{"w": "look up (a word)", "ipa": "", "vi": "tra cứu", "ex_en": "I look up new words online.", "ex_vi": "Tôi tra từ mới trên mạng."}, {"w": "turn on/off", "ipa": "", "vi": "bật/tắt", "ex_en": "Turn on the computer.", "ex_vi": "Bật máy tính lên."}, {"w": "log in/out", "ipa": "", "vi": "đăng nhập/đăng xuất", "ex_en": "I need to log in to my account.", "ex_vi": "Tôi cần đăng nhập vào tài khoản."}, {"w": "sign up", "ipa": "", "vi": "đăng ký", "ex_en": "I signed up for a new app.", "ex_vi": "Tôi đã đăng ký một ứng dụng mới."}, {"w": "check out", "ipa": "", "vi": "kiểm tra/xem thử", "ex_en": "Check out this new app.", "ex_vi": "Xem thử ứng dụng mới này đi."}, {"w": "upload / download", "ipa": "", "vi": "tải lên / tải xuống", "ex_en": "I downloaded a new app.", "ex_vi": "Tôi đã tải xuống một ứng dụng mới."}, {"w": "keep up with", "ipa": "", "vi": "theo kịp", "ex_en": "I try to keep up with technology.", "ex_vi": "Tôi cố gắng theo kịp công nghệ."}, {"w": "figure out", "ipa": "", "vi": "tìm ra/hiểu ra", "ex_en": "I figured out how to use it.", "ex_vi": "Tôi đã hiểu ra cách sử dụng nó."}, {"w": "set up", "ipa": "/set ʌp/", "vi": "thiết lập/cài đặt", "ex_en": "I need to set up my new phone.", "ex_vi": "Tôi cần thiết lập điện thoại mới."}, {"w": "back up (data)", "ipa": "/bæk ʌp/", "vi": "sao lưu (dữ liệu)", "ex_en": "You should back up your photos.", "ex_vi": "Bạn nên sao lưu ảnh của mình."}, {"w": "run out of (batter ng."}, {"w": "souvenir shop", "ipa": "/ˌsuːvəˈnɪr ʃɒp/", "vi": "cửa hàng lưu niệm", "ex_en": "I bought gifts at a souvenir shop.", "ex_vi": "Tôi đã mua quà ở cửa hàng lưu niệm."}, {"w": "break the ice", "ipa": "/breɪk ði aɪs/", "vi": "phá vỡ sự ngại ngùng", "ex_en": "A joke can break the ice.", "ex_vi": "Một câu chuyện cười có thể phá vỡ sự ngại ngùng."}], "patterns": ["It's a piece of cake. / Break the ice.", "When in Rome, do as the Romans do."], "quiz": [{"q": "'Việc đó rất dễ' dùng idiom:", "options": ["It's a piece of cake.", "Break the ice.", "Cost an arm and a leg."], "answer": 0, "explain": "piece of cake = rất dễ."}, {"q": "'Rất đắt' dùng idiom:", "options": ["Piece of cake", "Cost an arm and a leg", "Break the ice"], "answer": 1, "explain": "cost an arm and a leg = rất đắt."}, {"q": "'Nhập gia tùy tục' tiếng Anh là:", "options": ["When in Rome, do as the Romans do.", "Break the ice.", "Piece of cake."], "answer": 0, "explain": "Idiom tương đương."}, {"q": "'Người dân địa phương ở đây rất thân thiện':", "options": ["Local people are very friendly here.", "Local peoples are very friendly here.", "Local people is very friendly here."], "answer": 0, "explain": "people luôn số nhiều, không thêm s."}, {"q": "'Chúng tôi đã tham gia một lễ hội địa phương':", "options": ["We celebrated a local festival.", "We celebrate a local festival yesterday.", "We celebrating a local festival."], "answer": 0, "explain": "quá khứ đơn: celebrated."}, {"q": "Idiom 'phá vỡ sự ngại ngùng':", "options": ["break the ice", "piece of cake", "cost an arm and a leg"], "answer": 0, "explain": "break the ice = phá vỡ sự ngại ngùng."}], "speaking": "So sánh một phong tục văn hóa Việt Nam với một nước khác, dùng ít nhất 2 idiom đã học.", "homework": "Tìm hiểu và viết thêm 3 idiom tiếng Anh thông dụng khác kèm ví dụ.", "links": [{"label": "Video YouTube: common English idioms for beginners with examples", "url": "https://www.youtube.com/results?search_query=common%20English%20idioms%20for%20beginners%20with%20examples"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Trải nghiệm văn hóa khi du lịch", "lines": [{"speaker": "A", "en": "How was your trip to Hoi An?", "vi": "Chuyến đi Hội An của bạn thế nào?"}, {"speaker": "B", "en": "Amazing! We joined a local festival and met really friendly local people.", "vi": "Tuyệt lắm! Chúng tôi đã tham gia một lễ hội địa phương và gặp những người dân rất thân thiện."}, {"speaker": "A", "en": "Did you buy anything?", "vi": "Bạn có mua gì không?"}, {"speaker": "B", "en": "Yes, I bought some gifts at a souvenir shop. When in Rome, do as the Romans do, right?", "vi": "Có, tôi đã mua vài món quà ở cửa hàng lưu niệm. Nhập gia tùy tục mà, đúng không?"}, {"speaker": "A", "en": "Exactly! Did you have trouble talking to people at first?", "vi": "Đúng vậy! Lúc đầu bạn có gặp khó khăn khi nói chuyện với mọi người không?"}, {"speaker": "B", "en": "A little, but a simple smile helped break the ice.", "vi": "Một chút, nhưng một nụ cười đơn giản đã giúp phá vỡ sự ngại ngùng."}]}}, {"week": 40, "month": 10, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Ôn tập & Kiểm tra tháng 10", "review": true, "grammar": {"name": "Ôn tập tổng hợp Tuần 37-39", "explain": "Ôn phrasal verbs công nghệ, although/however/despite, idioms văn hóa.", "examples": [{"en": "Although technology costs an arm and a leg sometimes, I keep up with it. However, I always respect traditional customs.", "vi": "Mặc dù công nghệ đôi khi rất đắt đỏ, tôi vẫn theo kịp nó. Tuy nhiên, tôi luôn tôn trọng các phong tục truyền thống."}]}, "vocab": [{"w": "look up (a word)", "ipa": "", "vi": "tra cứu", "ex_en": "I look up new words online.", "ex_vi": "Tôi tra từ mới trên mạng."}, {"w": "turn on/off", "ipa": "", "vi": "bật/tắt", "ex_en": "Turn on the computer.", "ex_vi": "Bật máy tính lên."}, {"w": "log in/out", "ipa": "", "vi": "đăng nhập/đăng xuất", "ex_en": "I need to log in to  at the festival then?", "vi": "Ôi không! Vậy bạn chụp ảnh ở lễ hội bằng cách nào?"}, {"speaker": "A", "en": "Luckily, a local person let me borrow their charger. It really helped break the ice too!", "vi": "May mắn là một người dân địa phương cho tôi mượn sạc. Điều đó cũng giúp phá vỡ sự ngại ngùng nữa!"}]}}, {"week": 41, "month": 11, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Phỏng vấn xin việc cơ bản", "review": false, "grammar": {"name": "Câu hỏi phỏng vấn thường gặp & Hiện tại hoàn thành nâng cao", "explain": "Trong phỏng vấn, hiện tại hoàn thành thường dùng để nói kinh nghiệm làm việc đã tích lũy (I have worked.../I have managed...).", "examples": [{"en": "Tell me about yourself.", "vi": "Hãy kể về bản thân bạn."}, {"en": "What are your strengths and weaknesses?", "vi": "Điểm mạnh và điểm yếu của bạn là gì?"}, {"en": "I have worked in customer service for 3 years.", "vi": "Tôi đã làm việc trong lĩnh vực chăm sóc khách hàng 3 năm."}]}, "vocab": [{"w": "strength / weakness", "ipa": "", "vi": "điểm mạnh / điểm yếu", "ex_en": "My strength is teamwork.", "ex_vi": "Điểm mạnh của tôi là làm việc nhóm."}, {"w": "experience", "ipa": "/ɪkˈspɪriəns/", "vi": "kinh nghiệm", "ex_en": "I have three years of experience.", "ex_vi": "Tôi có 3 năm kinh nghiệm."}, {"w": "responsibility", "ipa": "/rɪˌspɒnsəˈbɪləti/", "vi": "trách nhiệm", "ex_en": "I take my responsibilities seriously.", "ex_vi": "Tôi coi trọng trách nhiệm của mình."}, {"w": "teamwork", "ipa": "/ˈtiːmwɜːrk/", "vi": "làm việc nhóm", "ex_en": "I'm good at teamwork.", "ex_vi": "Tôi giỏi làm việc nhóm."}, {"w": "achievement", "ipa": "/əˈtʃiːvmənt/", "vi": "thành tựu", "ex_en": "This is my biggest achievement.", "ex_vi": "Đây là thành tựu lớn nhất của tôi."}, {"w": "salary", "ipa": "/ˈsæləri/", "vi": "lương", "ex_en": "What is the expected salary?", "ex_vi": "Mức lương mong đợi là bao nhiêu?"}, {"w": "position", "ipa": "/pəˈzɪʃən/", "vi": "vị trí (công việc)", "ex_en": "I'm applying for this position.", "ex_vi": "Tôi đang ứng tuyển vị trí này."}, {"w": "manage", "ipa": "/ˈmænɪdʒ/", "vi": "quản lý", "ex_en": "I have managed a small team.", "ex_vi": "Tôi đã quản lý một nhóm nhỏ."}, {"w": "qualification", "ipa": "/ˌkwɒlɪfɪˈkeɪʃən/", "vi": "bằng cấp/trình độ", "ex_en": "What qualifications do you have?", "ex_vi": "Bạn có bằng cấp gì?"}, {"w": "deadline-driven / hard-working", "ipa": "/ˈdedlaɪn ˈdrɪvən/", "vi": "chăm chỉ, đúng hạn", "ex_en": "I'm hard-working and reliable.", "ex_vi": "Tôi chăm chỉ và đáng tin cậy."}, {"w": "available to start", "ipa": "/əˈveɪləbəl tuː stɑːrt/", "vi": "sẵn sàng bắt đầu", "ex_en": "I'm available to start next month.", "ex_vi": "Tôi sẵn sàng bắt đầu vào tháng sau."}, {"w": "reference", "ipa": "/ˈrefərəns/", "vi": "người tham chiếu/thư giới thiệu", "ex_en": "I can provide a reference.", "ex_vi": "Tôi có thể cung cấp thư giới thiệu."}], "patterns": ["Tell me about yourself. / I have + V3 + for/since...", "My strength/weakness is..."], "quiz": [{"q": "Câu hỏi phỏng vấn phổ biến nhất:", "options": ["Tell me about yourself.", "Where do you live?", "Do you like food?"], "answer": 0, "explain": "Câu mở đầu phỏng vấn kinh điển."}, {"q": "'Tôi có 3 năm kinh nghiệm':", "options": ["I have 3 years experience.", "I have three years of experience.", "I has three years experience."], "answer": 1, "explain": "cấu trúc chuẩn: have + N + of experience."}, {"q": "Từ nào nghĩa 'điểm mạnh':", "options": ["weakness", "strength", "salary"], "answer": 1, "explain": "strength = điểm mạnh."}, {"q": "'Tôi sẵn sàng bắt đầu vào tháng sau':", "options": ["I'm available to start next month.", "I'm available start next month.", "I'm availability to start next month."], "answer": 0, "explain": "available to + V nguyên mẫu."}, {"q": "'Bạn có bằng cấp gì?':", "options": ["What qualifications do you have?", "What qualification you have?", "What have you qualifications?"], "answer": 0, "explain": "What + qualifications + do you have?"}, {"q": "'Tôi có thể cung cấp uire about...", "vi": "Kính gửi ông Smith, tôi viết thư này để hỏi về..."}, {"en": "Could you please send me the report?", "vi": "Bạn có thể gửi cho tôi báo cáo được không?"}, {"en": "Best regards, Thinh", "vi": "Trân trọng, Thinh"}]}, "vocab": [{"w": "Dear...", "ipa": "", "vi": "kính gửi", "ex_en": "Dear Ms. Lan,", "ex_vi": "Kính gửi cô Lan,"}, {"w": "I am writing to...", "ipa": "", "vi": "tôi viết thư này để...", "ex_en": "I am writing to ask about the schedule.", "ex_vi": "Tôi viết thư này để hỏi về lịch trình."}, {"w": "Best regards / Sincerely", "ipa": "", "vi": "trân trọng", "ex_en": "Best regards, Thinh", "ex_vi": "Trân trọng, Thinh"}, {"w": "attach", "ipa": "/əˈtætʃ/", "vi": "đính kèm", "ex_en": "Please find the file attached.", "ex_vi": "Vui lòng xem tệp đính kèm."}, {"w": "inquire", "ipa": "/ɪnˈkwaɪər/", "vi": "hỏi thông tin", "ex_en": "I am writing to inquire about the price.", "ex_vi": "Tôi viết thư này để hỏi về giá."}, {"w": "as soon as possible (ASAP)", "ipa": "", "vi": "càng sớm càng tốt", "ex_en": "Please reply as soon as possible.", "ex_vi": "Vui lòng trả lời càng sớm càng tốt."}, {"w": "hold on / hold the line", "ipa": "", "vi": "đợi máy (điện thoại)", "ex_en": "Please hold on for a moment.", "ex_vi": "Xin vui lòng đợi máy một lát."}, {"w": "get back to (someone)", "ipa": "", "vi": "phản hồi lại ai đó", "ex_en": "I will get back to you soon.", "ex_vi": "Tôi sẽ phản hồi lại bạn sớm."}, {"w": "regarding", "ipa": "/rɪˈɡɑːrdɪŋ/", "vi": "về việc (trang trọng)", "ex_en": "I'm writing regarding your order.", "ex_vi": "Tôi viết thư này về việc đơn hàng của bạn."}, {"w": "kindly", "ipa": "/ˈkaɪndli/", "vi": "vui lòng (trang trọng)", "ex_en": "Kindly reply at your earliest convenience.", "ex_vi": "Vui lòng phản hồi sớm nhất có thể."}, {"w": "looking forward to your reply", "ipa": "", "vi": "mong nhận được phản hồi của bạn", "ex_en": "I look forward to your reply.", "ex_vi": "Tôi mong nhận được phản hồi của bạn."}, {"w": "voicemail", "ipa": "/ˈvɔɪsmeɪl/", "v  "ví dụ như", "ex_en": "For example, we can save time.", "ex_vi": "Ví dụ, chúng ta có thể tiết kiệm thời gian."}, {"w": "audience", "ipa": "/ˈɔːdiəns/", "vi": "khán giả/người nghe", "ex_en": "Thank you for listening, audience.", "ex_vi": "Cảm ơn khán giả đã lắng nghe."}, {"w": "slide", "ipa": "/slaɪd/", "vi": "trang trình chiếu", "ex_en": "Let's look at the next slide.", "ex_vi": "Hãy xem trang tiếp theo."}, {"w": "conclusion", "ipa": "/kənˈkluːʒən/", "vi": "phần kết luận", "ex_en": "In conclusion, English is useful.", "ex_vi": "Kết luận lại, tiếng Anh rất hữu ích."}, {"w": "in this presentation", "ipa": "/ɪn ðɪs ˌprezənˈteɪʃən/", "vi": "trong bài thuyết trình này", "ex_en": "In this presentation, I will discuss three points.", "ex_vi": "Trong bài thuyết trình này, tôi sẽ nói về 3 điểm."}, {"w": "as you can see", "ipa": "/æz juː kæn siː/", "vi": "như bạn có thể thấy", "ex_en": "As you can see in this chart...", "ex_vi": "Như bạn có thể thấy trong biểu đồ này..."}, {"w": "let's move on to", "ipa": "/lets muːv ɒn tuː/", "vi": "hãy chuyển sang", "ex_en": "Let's move on to the next point.", "ex_vi": "Hãy chuyển sang điểm tiếp theo."}, {"w": "any questions?", "ipa": "/ˈeni ˈkwestʃənz/", "vi": "có câu hỏi nào không?", "ex_en": "Any questions before I continue?", "ex_vi": "Có câu hỏi nào trước khi tôi tiếp tục không?"}], "patterns": ["Today, I'm going to talk about...", "Firstly,.../In addition,.../Finally,...", "To sum up,..."], "quiz": [{"q": "Mở đầu bài thuyết trình:", "options": ["To sum up...", "Today, I'm going to talk about...", "Finally..."], "answer": 1, "explain": "Mở đầu giới thiệu chủ đề."}, {"q": "Từ nối ý thứ 2:", "options": ["Firstly", "In addition", "To sum up"], "answer": 1, "explain": "in addition = thêm vào đó."}, {"q": "Kết luận bài thuyết trình:", "options": ["Firstly...", "Today...", "To sum up..."], "answer": 2, "explain": "To sum up = tóm lại, dùng để kết luận."}, {"q": "Mở đầu giới thiệu nội dung bài thuyết trình:", "options": ["In this presentatio , {"en": "If I keep practicing, I will become fluent.", "vi": "Nếu tôi tiếp tục luyện tập, tôi sẽ trở nên trôi chảy."}, {"en": "This course was designed to help beginners.", "vi": "Khóa học này được thiết kế để giúp người mới bắt đầu."}]}, "vocab": [{"w": "fluent", "ipa": "/ˈfluːənt/", "vi": "trôi chảy", "ex_en": "I want to become fluent in English.", "ex_vi": "Tôi muốn trở nên trôi chảy tiếng Anh."}, {"w": "improve", "ipa": "/ɪmˈpruːv/", "vi": "cải thiện/tiến bộ", "ex_en": "I have improved my speaking skills.", "ex_vi": "Tôi đã cải thiện kỹ năng nói của mình."}, {"w": "progress", "ipa": "/ˈprɒɡres/", "vi": "tiến bộ", "ex_en": "I've made a lot of progress.", "ex_vi": "Tôi đã tiến bộ rất nhiều."}, {"w": "confident", "ipa": "/ˈkɒnfɪdənt/", "vi": "tự tin", "ex_en": "I feel more confident now.", "ex_vi": "Bây giờ tôi cảm thấy tự tin hơn."}, {"w": "review", "ipa": "/rɪˈvjuː/", "vi": "ôn tập/xem lại", "ex_en": "Let's review all the grammar.", "ex_vi": "Hãy cùng ôn lại toàn bộ ngữ pháp."}, {"w": "achieve", "ipa": "/əˈtʃiːv/", "vi": "đạt được", "ex_en": "I achieved my goal.", "ex_vi": "Tôi đã đạt được mục tiêu của mình."}, {"w": "mistake / correct", "ipa": "", "vi": "lỗi sai / sửa đúng", "ex_en": "I corrected my mistakes.", "ex_vi": "Tôi đã sửa các lỗi sai của mình."}, {"w": "consistent", "ipa": "/kənˈsɪstənt/", "vi": "kiên trì/đều đặn", "ex_en": "Being consistent is the key to success.", "ex_vi": "Kiên trì là chìa khóa thành công."}, {"w": "brush up on", "ipa": "/brʌʃ ʌp ɒn/", "vi": "ôn lại/trau dồi", "ex_en": "I need to brush up on my grammar.", "ex_vi": "Tôi cần ôn lại ngữ pháp của mình."}, {"w": "get the hang of", "ipa": "/ɡet ðə hæŋ ʌv/", "vi": "quen dần với, nắm được", "ex_en": "I'm starting to get the hang of it.", "ex_vi": "Tôi đang bắt đầu quen dần với nó."}, {"w": "solid foundation", "ipa": "/ˈsɒlɪd faʊnˈdeɪʃən/", "vi": "nền tảng vững chắc", "ex_en": "You have a solid foundation now.", "ex_vi": "Bây giờ bạn đã có nền tảng vững chắc."}, {"w": "keep it up", "ipa": "/kiːp ɪt ʌp/", "vi": "cố gắng duy trì", "ex_en": "You're doing great, keep it up!", "ex_vi": "Bạn đang làm rất tốt, cố duy trì nhé!"}], "patterns": ["Tổng hợp mọi cấu trúc: to be, các thì, modal verbs, câu điều kiện, bị động, tường thuật"], "quiz": [{"q": "'I ___ (study) English for almost a year.'", "options": ["study", "studied", "have studied"], "answer": 2, "explain": "Kéo dài đến hiện tại: have + V3."}, {"q": "'If I keep practicing, I ___ (become) fluent.'", "options": ["become", "will become", "became"], "answer": 1, "explain": "Câu điều kiện loại 1: will + V."}, {"q": "'This course ___ (design) to help beginners.'", "options": ["designed", "is designed", "was designed"], "answer": 2, "explain": "Bị động quá khứ: was designed."}, {"q": "'Tôi cần ôn lại ngữ pháp của mình':", "options": ["I need to brush up on my grammar.", "I need brush up my grammar.", "I need to brushing up my grammar."], "answer": 0, "explain": "brush up on + danh từ."}, {"q": "'Bạn đang làm rất tốt, cố duy trì nhé!':", "options": ["You're doing great, keep it up!", "You're doing great, get the hang!", "You're doing great, solid foundation!"], "answer": 0, "explain": "keep it up = cố duy trì."}, {"q": "'Bây giờ bạn đã có nền tảng vững chắc':", "options": ["You have a solid foundation now.", "You have solid foundation now.", "You having a solid foundation now."], "answer": 0, "explain": "cần mạo từ 'a' trước solid foundation."}], "speaking": "Tự chữa lỗi sai thường gặp: chọn 5 lỗi bạn hay mắc nhất trong 11 tháng qua và luyện nói lại cho đúng.", "homework": "Làm lại toàn bộ các bài quiz của 44 tuần trước trong app, ghi lại điểm số để so sánh.", "links": [{"label": "Video YouTube: English grammar review all tenses beginner to intermediate", "url": "https://www.youtube.com/results?search_query=English%20grammar%20review%20all%20tenses%20beginner%20to%20intermediate"}], "dialogue": {"title": "Nhìn lại quá trình học tập", "lines": [{"speaker": "A", "en": "How do you feel about your English after 11 months?", "vi": "Bạn cảm thấy thế nào về tiếng Anh của mình sau 11 tháng?"}, {"speaker": "B", "en": "Much better! I'm starting to get the hang of speaking naturally.", "vi": "Tốt hơn nhiều! Tôi đang bắt đầu quen dần với việc nói tự nhiên."}, {"speaker": "A", "en": "That's great, you have a solid foundation now.", "vi": "Tuyệt vời, bây giờ bạn đã có nền tảng vững chắc."}, {"speaker": "B", "en": "Thanks. I still need to brush up on some grammar points, though.", "vi": "Cảm ơn. Nhưng tôi vẫn cần ôn lại vài điểm ngữ pháp."}, {"speaker": "A", "en": "That's normal. Keep it up, you're almost there!", "vi": "Bình thường thôi. Cố duy trì nhé, bạn sắp thành công rồi!"}]}}, {"week": 46, "month": 12, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Luyện phản xạ hội thoại tự nhiên", "review": false, "grammar": {"name": "Ngữ điệu & từ đệm hội thoại tự nhiên (well, actually, you know, I mean)", "explain": "Người bản xứ dùng từ đệm (filler words) khi suy nghĩ hoặc nhấn mạnh, giúp hội thoại tự nhiên hơn thay vì im lặng hoặc dịch trong đầu.", "examples": [{"en": "Well, I think it's a good idea.", "vi": "À thì, tôi nghĩ đó là một ý hay."}, {"en": "Actually, I've never tried that before.", "vi": "Thật ra, tôi chưa từng thử điều đó trước đây."}, {"en": "You know, it's really important to practice every day.", "vi": "Bạn biết đấy, thực sự quan trọng khi luyện tập mỗi ngày."}]}, "vocab": [{"w": "well", "ipa": "/wel/", "vi": "à thì/à", "ex_en": "Well, let me think about it.", "ex_vi": "À thì, để tôi nghĩ về điều đó."}, {"w": "actually", "ipa": "/ˈæktʃuəli/", "vi": "thật ra", "ex_en": "Actually, I disagree.", "ex_vi": "Thật ra, tôi không đồng ý."}, {"w": "you know", "ipa": "", "vi": "bạn biết đấy", "ex_en": "You know, it's not easy.", "ex_vi": "Bạn biết đấy, điều đó không dễ."}, {"w": "I mean", "ipa": "", "vi": "ý tôi là", "ex_en": "I mean, it could work.", "ex_vi": "Ý tôi là, nó có thể hiệu quả."}, {"w": "by the way", "ipa": "", "vi": "nhân tiện", "ex_en": "By the w <script>

const WEEKS = JSON.parse(document.getElementById('weeks-data').textContent);
const LS_KEY = 'eng_journey_progress_v1';
function getProgress(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{};}catch(e){return {};} }
function setDone(week, val){ const p = getProgress(); p[week]=val; localStorage.setItem(LS_KEY, JSON.stringify(p)); renderSidebar(document.getElementById('search').value); renderProgressSummary(); }

let currentWeek = 1;
let speechRate = 0.8;
let englishVoice = null;

function pickVoice(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  englishVoice = voices.find(v=>v.lang==='en-US') || voices.find(v=>v.lang && v.lang.startsWith('en')) || null;
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
}

function speak(text){
  if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ đọc giọng nói. Hãy dùng Chrome, Edge hoặc Safari.'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  if(englishVoice) u.voice = englishVoice;
  u.rate = speechRate;
  window.speechSynthesis.speak(u);
}

function playDialogue(lines, button){
  if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ đọc giọng nói.'); return; }
  window.speechSynthesis.cancel();
  const originalLabel = button.textContent;
  button.disabled = true;
  let i = 0;
  function playNext(){
    document.querySelectorAll('.dlg-line').forEach(el=>el.classList.remove('dlg-playing'));
    if(i >= lines.length){ button.disabled = false; button.textContent = originalLabel; return; }
    const lineEl = document.querySelectorAll('.dlg-line')[i];
    if(lineEl) lineEl.classList.add('dlg-playing');
    button.textContent = `🔊 Đang đọc câu ${i+1}/${lines.length}...`;
    const u = new SpeechSynthesisUtterance(lines[i].en);
    u.lang = 'en-US';
    if(englishVoice) u.voice = englishVoice;
    u.rate = speechRate;
    u.onend = ()=>{ i++; playNext(); };
    window.speechSynthesis.speak(u);
  }
  playNext();
}

document.getElementById('rateSlow').addEventListener('click', ()=>{
  speechRate = 0.7;
  document.getElementById('rateSlow').classList.add('active');
  document.getElementById('rateNormal').classList.remove('active');
});
document.getElementById('rateNormal').addEventListener('click', ()=>{
  speechRate = 1.0;
  document.getElementById('rateNormal').classList.add('active');
  document.getElementById('rateSlow').classList.remove('active');
});

// ===== Speech recognition: mic check & scoring =====
const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition || null;

function normalizeWords(text){
  return (text||'').toLowerCase().replace(/[.,!?;:"'’]/g,'').split(/\s+/).filter(Boolean);
}

function lcsAlign(a,b){
  const n=a.length, m=b.length;
  const dp = Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=1;i<=n;i++){
    for(let j=1;j<=m;j++){
      if(a[i-1]===b[j-1]) dp[i][j]=dp[i-1][j-1]+1;
      else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
    }
  }
  let i=n, j=m;
  const aMark = new Array(n).fill('missing');
  const bMark = new Array(m).fill('extra');
  while(i>0 && j>0){
    if(a[i-1]===b[j-1]){ aMark[i-1]='match'; bMark[j-1]='match'; i--; j--; }
    else if(dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  return { aMark, bMark, lcsLen: dp[n][m] };
}

function renderScore(targetText, spokenText, resultEl){
  const tWords = normalizeWords(targetText);
  const sWords = normalizeWords(spokenText);
  const { aMark, bMark, lcsLen } = lcsAlign(tWords, sWords);
  const score = tWords.length ? Math.round(lcsLen / tWords.length * 100) : 0;
  const scoreClass = score>=85 ? 'good' : (score>=60 ? 'mid' : 'bad');
  const scoreLabel = score>=85 ? 'Rất tốt! 🎉' : (score>=60 ? 'Khá, cần luyện thêm' : 'Cần luyện lại');
  const targetHtml = tWords.map((w,idx)=>`<span class="${aMark[idx]==='match'?'w-match':'w-missing'}">${escapeHtml(w)}</span>`).join(' ');
  const spokenHtml = sWords.length ? sWords.map((w,idx)=>`<span class="${bMark[idx]==='match'?'w-match':'w-extra'}">${escapeHtml(w)}</span>`).join(' ') : '<i>(không nghe rõ)</i>';
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<span class="sc-score ${scoreClass}">${score}% — ${scoreLabel}</span>
    <div><b>Câu mẫu:</b> ${targetHtml}</div>
    <div style="margin-top:4px;"><b>Bạn đã nói:</b> ${spokenHtml}</div>`;
}

function startMicCheck(button, targetText, resultEl){
  if(!SpeechRecognitionCtor){
    resultEl.style.display = 'block';
    resultEl.innerHTML = '<span style="color:var(--coral)">Trình duyệt này không hỗ trợ nhận diện giọng nói. Vui lòng dùng Google Chrome (khuyên dùng) hoặc Safari mới nhất, và cho phép quyền micro.</span>';
    return;
  }
  const rec = new SpeechRecognitionCtor();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  button.disabled = true;
  button.classList.add('recording');
  const originalLabel = button.textContent;
  button.textContent = '🎙️ Đang nghe...';
  try{ rec.start(); }catch(e){ button.disabled=false; button.classList.remove('recording'); button.textContent=originalLabel; return; }
  rec.onresult = (e)=>{
    const transcript = e.results[0][0].transcript;
    renderScore(targetText, transcript, resultEl);
  };
  rec.onerror = (e)=>{
    resultEl.style.display = 'block';
    let msg = 'Có lỗi xảy ra (' + e.error + ').';
    if(e.error==='not-allowed' || e.error==='service-not-allowed') msg = 'Bạn cần cho phép quyền truy cập micro cho trang này trong trình duyệt.';
    if(e.error==='network') msg = 'Lỗi kết nối — tính năng nhận diện giọng nói cần Internet để hoạt động.';
    if(e.error==='no-speech') msg = 'Không nghe thấy giọng nói, hãy thử lại và nói to rõ hơn.';
    resultEl.innerHTML = `<span style="color:var(--coral)">${msg}</span>`;
  };
  rec.onend = ()=>{
    button.disabled = false;
    button.classList.remove('recording');
    button.textContent = originalLabel;
  };
}

  if(!SpeechRecognitionCtor){

    if(e.error==='network') msg = 'Lỗi kết nối — tính năng nhận diện giọng nói cần Internet để hoạt động.';

function renderSidebar(filter){

  filter = (filter||'').toLowerCase().trim();
  const phases = [...new Set(WEEKS.map(w=>w.phase))];
  phases.forEach(phase=>{
    const weeksInPhase = WEEKS.filter(w=>w.phase===phase);
    const months = [...new Set(weeksInPhase.map(w=>w.month))];
    let phaseHasMatch = false;
    let phaseHtml = '';
    months.forEach(month=>{
      const weeksInMonth = weeksInPhase.filter(w=>w.month===month);
      let monthHtml = '';
      let monthHasMatch = false;
      weeksInMonth.forEach(w=>{
        const hay = (w.title+' '+w.week+' '+w.vocab.map(v=>v.w+' '+v.vi).join(' ')).toLowerCase();
        if(filter && !hay.includes(filter)) return;
        monthHasMatch = true; phaseHasMatch = true;
        const isDone = !!p[w.week];
        const isActive = w.week === currentWeek;
        const statusGlyph = isDone ? '✓' : '';
        monthHtml += `<div class="week-item ${isActive?'active':''} ${w.review?'review':''}" data-week="${w.week}">

          <span class="w-label"><b>W${String(w.week).padStart(2,'0')}</b>${escapeHtml(w.title)}</span></div>`;
      });
      if(monthHasMatch){
        phaseHtml += `<div class="month-title">Tháng ${month}</div>${monthHtml}`;
      }
    });
    if(phaseHasMatch){
      container.innerHTML += `<div class="phase-block"><div class="phase-title">${phase}</div>${phaseHtml}</div>`;

  });
  container.querySelectorAll('.week-item').forEach(el=>{

        if(answered) return;
        answered = true;
        const oi = parseInt(btn.dataset.oi);
        qEl.querySelectorAll('.opt').forEach((b,i)=>{
          if(i===qData.answer) b.classList.add('correct');
          else if(i===oi) b.classList.add('wrong');
          b.disabled = true;
        });
        qEl.querySelector('.quiz-explain').classList.add('show');
        if(oi===qData.answer) score.correct++;
        const scoreEl = document.getElementById('quizScore');
        scoreEl.textContent = `Điểm hiện tại: ${score.correct}/${score.total} câu đã trả lời đúng`;
      });
    });
  });
}

document.getElementById('search').addEventListener('input', (e)=>{ renderSidebar(e.target.value); });
document.getElementById('guideNavItem').addEventListener('click', ()=>{ renderGuide(); window.scrollTo(0,0); closeMobileSidebar(); });
document.getElementById('menuToggle').addEventListener('click', openMobileSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);

renderProgressSummary();
renderSidebar();
renderContent();

if('serviceWorker' in navigator && (location.protocol==='http:'||location.protocol==='https:')){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}

</script>
</body>
</html>
