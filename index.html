<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>English Journey — Giáo án tiếng Anh 12 tháng</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f3b57">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Journey">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<style>
:root{
  --navy:#1f3b57; --blue:#2e75b6; --lightblue:#eaf3fb; --green:#2e8b57; --red:#c0392b;
  --gray:#666; --border:#dbe4ec; --bg:#f4f7fa;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:#222;}
#app{display:flex;min-height:100vh;}
/* Sidebar */
#sidebar{width:300px;flex-shrink:0;background:var(--navy);color:#fff;overflow-y:auto;max-height:100vh;position:sticky;top:0;}
#sidebar h1{font-size:17px;padding:18px 16px 6px;margin:0;}
#sidebar .subtitle{padding:0 16px 14px;font-size:12px;color:#9fb6c9;}
#progress-summary{padding:0 16px 14px;font-size:12px;color:#cfe0ee;}
#progress-bar-outer{background:#2c4a68;border-radius:6px;height:8px;margin-top:6px;overflow:hidden;}
#progress-bar-inner{background:#4fd1c5;height:100%;width:0%;transition:width .3s;}
.phase-block{border-top:1px solid #2c4a68;}
.phase-title{padding:12px 16px;font-size:12.5px;font-weight:700;color:#9fd3ff;cursor:pointer;user-select:none;}
.month-title{padding:6px 16px;font-size:11.5px;color:#8fa8bd;text-transform:uppercase;letter-spacing:.03em;margin-top:4px;}
.week-item{padding:8px 16px 8px 26px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#dce8f3;}
.week-item:hover{background:#28486a;}
.week-item.active{background:var(--blue);color:#fff;font-weight:600;}
.week-item .dot{width:8px;height:8px;border-radius:50%;background:#4a6d8c;flex-shrink:0;}
.week-item.done .dot{background:#4fd1c5;}
.week-item.review{font-style:italic;}
/* Main content */
#main{flex:1;min-width:0;padding:26px 40px 80px;max-width:900px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
#search{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:220px;}
.badge{display:inline-block;background:var(--lightblue);color:var(--blue);font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;margin-right:6px;}
h2.week-title{color:var(--navy);font-size:26px;margin:10px 0 4px;}
.week-meta{color:var(--gray);font-size:13px;margin-bottom:20px;}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card h3{margin-top:0;color:var(--navy);font-size:16.5px;border-left:4px solid var(--blue);padding-left:10px;}
.grammar-name{font-weight:700;color:var(--blue);margin-bottom:6px;}
.example{background:var(--lightblue);border-radius:8px;padding:10px 14px;margin:8px 0;}
.example .en{font-weight:600;}
.example .vi{color:var(--gray);font-size:13.5px;}
.pattern-box{background:#fff8e6;border-left:4px solid #e0a800;padding:10px 14px;border-radius:6px;margin:6px 0;font-family:Consolas,monospace;font-size:13.5px;}
/* Vocab flashcards */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.flashcard{perspective:1000px;height:120px;cursor:pointer;}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:center;}
.flashcard-front{background:var(--navy);color:#fff;}
.flashcard-back{background:var(--green);color:#fff;transform:rotateY(180deg);font-size:13px;}
.flashcard-front .w{font-size:16px;font-weight:700;}
.flashcard-front .ipa{font-size:12px;color:#bcd6ea;margin-top:4px;}
.flashcard-back .vi{font-weight:700;margin-bottom:4px;}
/* Speak button */
.speak-btn{border:none;background:rgba(255,255,255,.18);color:inherit;border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.speak-btn:hover{background:rgba(255,255,255,.32);}
.speak-btn.light{background:var(--lightblue);color:var(--blue);}
.speak-btn.light:hover{background:#d5e8f5;}
.flashcard-front-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.example{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.example .exText{flex:1;}
.rate-toggle{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--gray);}
.rate-toggle button{border:1px solid var(--border);background:#fff;border-radius:14px;padding:4px 10px;font-size:12px;cursor:pointer;}
.rate-toggle button.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.guide-table{width:100%;border-collapse:collapse;margin:10px 0 18px;font-size:13.5px;}
.guide-table th,.guide-table td{border:1px solid var(--border);padding:8px 10px;text-align:left;}
.guide-table th{background:var(--lightblue);color:var(--navy);}
.guide-table td.sym{font-family:Consolas,monospace;font-weight:700;color:var(--blue);white-space:nowrap;}
.pinned-item{padding:10px 16px;font-size:13px;cursor:pointer;color:#ffe9a8;font-weight:600;border-bottom:1px solid #2c4a68;display:flex;align-items:center;gap:8px;}
.pinned-item:hover{background:#28486a;}
.pinned-item.active{background:#3a5f7d;}
/* Speech recognition (mic check) */
.notice-box{background:#fff4e0;border-left:4px solid #e0a800;padding:10px 14px;border-radius:6px;font-size:13px;color:#6b5300;margin-bottom:14px;}
.speak-check-row{display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.speak-check-row:last-child{border-bottom:none;}
.sc-target{flex:1;font-size:14px;}
.mic-btn{border:1px solid var(--blue);background:#fff;color:var(--blue);border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.mic-btn:hover{background:var(--lightblue);}
.mic-btn.recording{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}70%{box-shadow:0 0 0 10px rgba(192,57,43,0);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
.sc-result{width:100%;margin-top:8px;background:#f7fafc;border-radius:8px;padding:10px 12px;font-size:13.5px;}
.sc-score{display:inline-block;font-weight:700;padding:2px 10px;border-radius:12px;margin-bottom:6px;font-size:12.5px;}
.sc-score.good{background:#e3f6ea;color:var(--green);}
.sc-score.mid{background:#fff6dd;color:#8a6d00;}
.sc-score.bad{background:#fbe9e7;color:var(--red);}
.w-match{color:var(--green);font-weight:600;}
.w-missing{color:#aaa;text-decoration:line-through;}
.w-extra{color:var(--red);text-decoration:underline;}
.free-record-box{margin-top:10px;}
.transcript-box{margin-top:8px;background:#f7fafc;border-radius:8px;padding:10px 12px;font-size:13.5px;display:none;}
/* Quiz */
.quiz-q{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.quiz-q:last-child{border-bottom:none;}
.quiz-q p.qtext{font-weight:600;margin:0 0 8px;}
.opt{display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:14px;}
.opt:hover{background:#f5f9fc;}
.opt.correct{background:#e3f6ea;border-color:var(--green);color:var(--green);font-weight:600;}
.opt.wrong{background:#fbe9e7;border-color:var(--red);color:var(--red);font-weight:600;}
.quiz-explain{font-size:13px;color:var(--gray);margin-top:4px;display:none;}
.quiz-explain.show{display:block;}
.quiz-score{font-weight:700;color:var(--blue);margin-top:10px;}
/* Homework / speaking */
.task-box{background:#f0f9f4;border-left:4px solid var(--green);padding:12px 16px;border-radius:6px;margin-bottom:10px;}
.task-box.speak{background:#eef4fb;border-left-color:var(--blue);}
.links a{display:inline-block;margin:4px 8px 4px 0;padding:7px 12px;background:var(--lightblue);color:var(--blue);border-radius:8px;text-decoration:none;font-size:13px;}
.links a:hover{background:#d5e8f5;}
.done-toggle{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:18px;cursor:pointer;font-weight:600;color:var(--navy);}
.done-toggle input{width:18px;height:18px;}
footer.app-footer{text-align:center;color:#9aa9b6;font-size:12px;margin-top:40px;}
@media print{#sidebar,.done-toggle,.links,#search{display:none;} #main{max-width:100%;}}
#menuToggle{display:none;}
#sidebarOverlay{display:none;}
@media (max-width:800px){
  #app{position:relative;}
  #menuToggle{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--border);background:#fff;border-radius:8px;font-size:18px;cursor:pointer;flex-shrink:0;}
  .topbar{flex-wrap:wrap;gap:10px;}
  .topbar > div{flex-wrap:wrap;}
  #search{width:150px;}
  #sidebar{position:fixed;top:0;left:0;height:100%;max-height:100%;width:82%;max-width:320px;z-index:1000;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 12px rgba(0,0,0,.25);}
  #sidebar.open{transform:translateX(0);}
  #sidebarOverlay.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;}
  #main{padding:16px;}
  h2.week-title{font-size:21px;}
  .card{padding:16px 16px;}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebarOverlay"></div>
  <nav id="sidebar">
    <h1>📘 English Journey</h1>
    <div class="subtitle">Lộ trình 12 tháng — Beginner đến giao tiếp cơ bản</div>
    <div id="progress-summary">Tiến độ: <span id="progress-count">0/48</span> tuần
      <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
    </div>
    <div class="pinned-item" id="guideNavItem">🔊 Hướng dẫn đọc phiên âm &amp; trọng âm</div>
    <div id="nav-list"></div>
  </nav>
  <main id="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="menuToggle" aria-label="Mở danh sách tuần">☰</button>
        <div id="phase-badge"></div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="rate-toggle">Tốc độ đọc:
          <button id="rateSlow" class="active">Chậm</button>
          <button id="rateNormal">Bình thường</button>
        </div>
        <input id="search" type="text" placeholder="Tìm tuần / chủ đề / từ vựng...">
      </div>
    </div>
    <div id="content"></div>
    <footer class="app-footer">Giáo án tiếng Anh 12 tháng — Dùng offline, tiến độ lưu tại máy bạn (localStorage). Không cần internet trừ khi mở link video/podcast.</footer>
  </main>
</div>

ên nghỉ ngơi nhiều hơn."}, {"w": "healthy / unhealthy", "ipa": "", "vi": "khỏe mạnh / không khỏe", "ex_en": "Eating vegetables is healthy.", "ex_vi": "Ăn rau tốt cho sức khỏe."}, {"w": "exercise", "ipa": "/ˈeksərsaɪz/", "vi": "tập thể dục", "ex_en": "You should exercise every day.", "ex_vi": "Bạn nên tập thể dục mỗi ngày."}, {"w": "body parts: head/hand/leg/stomach", "ipa": "", "vi": "đầu/tay/chân/bụng", "ex_en": "My stomach hurts.", "ex_vi": "Bụng tôi đau."}], "patterns": ["You should/shouldn't + V", "I have to/don't have to + V"], "quiz": [{"q": "'Bạn nên đi khám bác sĩ':", "options": ["You should see a doctor.", "You should to see a doctor.", "You should saw a doctor."], "answer": 0, "explain": "should + V nguyên mẫu."}, {"q": "'Tôi phải uống thuốc':", "options": ["I should take medicine.", "I have to take medicine.", "I has to take medicine."], "answer": 1, "explain": "have to + V nguyên mẫu."}, {"q": "Từ nào nghĩa 'nghỉ ngơi':", "options": ["exercise", "rest", "fever"], "answer": 1, "explain": "rest = nghỉ ngơi."}], "speaking": "Đóng vai khám bệnh: 1 người là bệnh nhân mô tả triệu chứng, 1 người là bác sĩ đưa lời khuyên.", "homework": "Viết 5 lời khuyên sức khỏe cho bản thân dùng should/shouldn't.", "links": [{"label": "Video YouTube: at the doctor English conversation health vocabulary", "url": "https://www.youtube.com/results?search_query=at%20the%20doctor%20English%20conversation%20health%20vocabulary"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}]}, {"week": 23, "month": 6, "phase": "Giai đoạn 2: Sơ cấp (Tháng 4-6)", "title": "Công việc & Nghề nghiệp", "review": false, "grammar": {"name": "Thì hiện tại tiếp diễn (đang xảy ra) & câu hỏi về công việc", "explain": "Hiện tại tiếp diễn: S + am/is/are + V-ing, diễn tả việc đang xảy ra ngay lúc nói hoặc xu hướng gần đây. Khác với hiện tại đơn (thói quen).", "examples": [{"en": "I am working on a new project.", "vi": "Tôi đang làm một dự án mới."}, {"en": "What do yo "I have visited Japan.", "vi": "Tôi đã từng đến Nhật Bản."}, {"en": "She has never eaten sushi.", "vi": "Cô ấy chưa bao giờ ăn sushi."}, {"en": "Have you ever tried Thai food?", "vi": "Bạn đã bao giờ thử đồ ăn Thái chưa?"}]}, "vocab": [{"w": "ever / never", "ipa": "", "vi": "đã từng / chưa bao giờ", "ex_en": "I have never been to Korea.", "ex_vi": "Tôi chưa bao giờ đến Hàn Quốc."}, {"w": "have been to", "ipa": "", "vi": "đã từng đến", "ex_en": "I have been to Da Nang.", "ex_vi": "Tôi đã từng đến Đà Nẵng."}, {"w": "try - tried", "ipa": "", "vi": "thử (V3)", "ex_en": "Have you tried durian?", "ex_vi": "Bạn đã thử sầu riêng chưa?"}, {"w": "experience", "ipa": "/ɪkˈspɪriəns/", "vi": "trải nghiệm", "ex_en": "It was an amazing experience.", "ex_vi": "Đó là một trải nghiệm tuyệt vời."}, {"w": "already", "ipa": "/ɔːlˈredi/", "vi": "đã (rồi)", "ex_en": "I have already finished it.", "ex_vi": "Tôi đã hoàn thành nó rồi."}, {"w": "yet", "ipa": "/jet/", "vi": "chưa (dùng trong câu hỏi/phủ định)", "ex_en": "I haven't finished yet.", "ex_vi": "Tôi vẫn chưa hoàn thành."}, {"w": "abroad", "ipa": "/əˈbrɔːd/", "vi": "ở nước ngoài", "ex_en": "Have you ever lived abroad?", "ex_vi": "Bạn đã từng sống ở nước ngoài chưa?"}, {"w": "amazing", "ipa": "/əˈmeɪzɪŋ/", "vi": "tuyệt vời", "ex_en": "The trip was amazing.", "ex_vi": "Chuyến đi thật tuyệt vời."}], "patterns": ["Have/Has + S + V3 (ever)?", "S + have/has + never + V3"], "quiz": [{"q": "'Cô ấy chưa bao giờ ăn sushi':", "options": ["She has never eat sushi.", "She has never eaten sushi.", "She never has eaten sushi."], "answer": 1, "explain": "have/has + never + V3."}, {"q": "Câu hỏi đúng: 'Bạn đã từng thử durian chưa?'", "options": ["Did you try durian?", "Have you ever tried durian?", "Do you try durian?"], "answer": 1, "explain": "Have + S + ever + V3?"}, {"q": "Quá khứ phân từ (V3) của 'try':", "options": ["try", "tried", "trying"], "answer": 1, "explain": "try - tried - tried."}], "speaking": "Nói về 3 điều bạn đã từng trải nghiệm trong đời (nơi đã đến, món ăn đã thử, việc đã làm).", "homework": "Viết danh sách 8 điều 'I have never...' và 'I have already...' về bản thân.", "links": [{"label": "Video YouTube: present perfect tense have you ever English grammar", "url": "https://www.youtube.com/results?search_query=present%20perfect%20tense%20have%20you%20ever%20English%20grammar"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 26, "month": 7, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "So sánh hiện tại hoàn thành vs quá khứ đơn", "review": false, "grammar": {"name": "Phân biệt Hiện tại hoàn thành và Quá khứ đơn, SINCE/FOR", "explain": "Quá khứ đơn: hành động đã kết thúc, có thời gian cụ thể (yesterday, in 2020). Hiện tại hoàn thành: không nói rõ thời điểm, hoặc kéo dài đến hiện tại (dùng since + mốc thời gian, for + khoảng thời gian).", "examples": [{"en": "I visited Hue in 2019.", "vi": "Tôi đã thăm Huế vào năm 2019."}, {"en": "I have lived here since 2019.", "vi": "Tôi đã sống ở đây từ năm 2019."}, {"en": "She has worked here for 3 years.", "vi": "Cô ấy đã làm việc ở đây được 3 năm."}]}, "vocab": [{"w": "since", "ipa": "/sɪns/", "vi": "từ (mốc thời gian)", "ex_en": "I have studied English since 2023.", "ex_vi": "Tôi đã học tiếng Anh từ năm 2023."}, {"w": "for", "ipa": "/fɔːr/", "vi": "trong (khoảng thời gian)", "ex_en": "I have lived here for 5 years.", "ex_vi": "Tôi đã sống ở đây 5 năm."}, {"w": "how long", "ipa": "", "vi": "bao lâu rồi", "ex_en": "How long have you worked here?", "ex_vi": "Bạn đã làm việc ở đây bao lâu rồi?"}, {"w": "recently", "ipa": "/ˈriːsəntli/", "vi": "gần đây", "ex_en": "I have recently changed jobs.", "ex_vi": "Gần đây tôi đã đổi việc."}, {"w": "moment", "ipa": "/ˈmoʊmənt/", "vi": "thời điểm", "ex_en": "At that moment, I felt happy.", "ex_vi": "Vào khoảnh khắc đó, tôi cảm thấy hạnh phúc."}, {"w": "still", "ipa": "/stɪl/", "vi": "vẫn còn", "ex_en": "I still live in Hanoi.", "ex_vi": "Tôi vẫn sống ở Hà Nội."}, {"w": "ago", "ipa": "/əˈɡoʊ/", "vi": "cách đây", "ex_en": "I moved here two years ago.", "ex_vi": "Tôi chuyển đến đây cách đây 2 năm."}, {"w": "continue", "ipa": "/kənˈtɪnjuː/", "vi": "tiếp tục", "ex_en": "I will continue studying.", "ex_vi": "Tôi sẽ tiếp tục học."}], "patterns": ["S + have/has + V3 + since/for...", "S + V-ed + (mốc thời gian cụ thể)"], "quiz": [{"q": "'Tôi sống ở đây được 5 năm rồi (và vẫn đang sống)':", "options": ["I lived here for 5 years.", "I have lived here for 5 years.", "I live here since 5 years."], "answer": 1, "explain": "Kéo dài đến hiện tại dùng hiện tại hoàn thành + for."}, {"q": "Chọn đúng: 'since' đi với:", "options": ["khoảng thời gian (3 years)", "mốc thời gian (2020)", "hôm qua"], "answer": 1, "explain": "since + mốc thời gian cụ thể."}, {"q": "'Tôi đã thăm Huế năm 2019' (đã kết thúc, có mốc rõ):", "options": ["I have visited Hue in 2019.", "I visited Hue in 2019.", "I visit Hue in 2019."], "answer": 1, "explain": "Có mốc thời gian cụ thể dùng quá khứ đơn."}], "speaking": "Nói về những điều bạn đã làm 'từ' (since) một thời điểm và 'trong' (for) bao lâu.", "homework": "Viết 5 câu về bản thân dùng since và 5 câu dùng for.", "links": [{"label": "Video YouTube: present perfect vs simple past since for English", "url": "https://www.youtube.com/results?search_query=present%20perfect%20vs%20simple%20past%20since%20for%20English"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}]}, {"week": 27, "month": 7, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Kỹ năng & Khả năng", "review": false, "grammar": {"name": "CAN / COULD / BE ABLE TO (khả năng)", "explain": "Can: khả năng ở hiện tại. Could: khả năng ở quá khứ, hoặc lịch sự hơn khi xin phép/yêu cầu. Be able to: có thể dùng ở mọi thì, trang trọng hơn can.", "examples": [{"en": "I can speak a little English.", "vi": "Tôi có thể nói một chút tiếng Anh."}, {"en": "When I was young, I could run fast.", "vi": "Khi còn nhỏ, tôi có thể chạy nhanh."}, {"en": "I will be able to finish it tomorrow.", "vi": "Tôi sẽ có thể hoàn thành nó vào ngày mai."}]}, "vocab": [{"w": "skill", "ipa": "/skɪl/", "vi": "kỹ năng", "ex_en": "I want to improve my skills.", "ex_vi": "Tôi muốn cải thiện kỹ năng của mình."}, {"w": "play the guitar/piano", "ipa": "", "vi": "chơi guitar/piano", "ex_en": "I can play the guitar.", "ex_vi": "Tôi có thể chơi guitar."}, {"w": "drive", "ipa": "/draɪv/", "vi": "lái xe", "ex_en": "I can drive a car.", "ex_vi": "Tôi có thể lái xe hơi."}, {"w": "swim", "ipa": "/swɪm/", "vi": "bơi", "ex_en": "I couldn't swim when I was a child.", "ex_vi": "Tôi không thể bơi khi còn nhỏ."}, {"w": "cook", "ipa": "/kʊk/", "vi": "nấu ăn", "ex_en": "She can cook Vietnamese food well.", "ex_vi": "Cô ấy có thể nấu món Việt rất ngon."}, {"w": "improve", "ipa": "/ɪmˈpruːv/", "vi": "cải thiện", "ex_en": "I want to improve my English.", "ex_vi": "Tôi muốn cải thiện tiếng Anh của mình."}, {"w": "talented", "ipa": "/ˈtæləntɪd/", "vi": "có năng khiếu", "ex_en": "He is talented at music.", "ex_vi": "Anh ấy có năng khiếu về âm nhạc."}, {"w": "practice", "ipa": "/ˈpræktɪs/", "vi": "luyện tập", "ex_en": "Practice makes perfect.", "ex_vi": "Có công mài sắt có ngày nên kim."}], "patterns": ["S + can/could + V", "S + will be able to + V"], "quiz": [{"q": "'Tôi có thể nói tiếng Anh' hiện tại:", "options": ["I can speak English.", "I could speak English.", "I can to speak English."], "answer": 0, "explain": "can + V nguyên mẫu, không có 'to'."}, {"q": "'Khi nhỏ tôi có thể bơi' (quá khứ):", "options": ["I can swim.", "I could swim.", "I will can swim."], "answer": 1, "explain": "Khả năng quá khứ dùng could."}, {"q": "Dạng tương lai của can:", "options": ["will can", "will be able to", "can will"], "answer": 1, "explain": "can không có dạng tương lai, dùng will be able to."}], "speaking": "Nói về 3 kỹ năng bạn có thể làm hiện tại và 1 kỹ năng bạn muốn cải thiện.", "homework": "Viết đoạn văn 6 câu về khả năng của bản thân ở hiện tại và quá khứ.", "links": [{"label": "Video YouTube: can could be able to English grammar ability", "url": "https://www.youtube.com/results?search_query=can%20could%20be%20able%20to%20English%20grammar%20ability"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 28, "month": 7, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Ôn tập & Kiểm tra tháng 7", "review": true, "grammar": {"name": "Ôn tập tổng hợp Tuần 25-27", "explain": "Ôn hiện tại hoàn thành (ever/never/since/for), phân biệt với quá khứ đơn, can/could/be able to.", "examples": [{"en": "I have lived in Hanoi for 10 years, and I have never lived abroad. I can speak a little English now.", "vi": "Tôi đã sống ở Hà Nội 10 năm, và tôi chưa bao giờ sống ở nước ngoài. Bây giờ tôi có thể nói một chút tiếng Anh."}]}, "vocab": [], "patterns": ["Ôn tất cả mẫu câu Tuần 25-27"], "quiz": [{"q": "'I ___ (live) here since 2020.'", "options": ["live", "lived", "have lived"], "answer": 2, "explain": "since + hiện tại hoàn thành."}, {"q": "'When I was a child, I ___ (swim) very well.'", "options": ["can", "could", "have been able to"], "answer": 1, "explain": "Khả năng quá khứ: could."}], "speaking": "Kể trải nghiệm cá nhân 2-3 phút: những điều đã từng làm, thời gian đã sống/làm việc ở đâu, khả năng bản thân.", "homework": "Ghi âm bài nói về trải nghiệm cá nhân, chú ý phát âm đúng have/has + V3.", "links": [{"label": "Video YouTube: present perfect speaking practice English intermediate", "url": "https://www.youtube.com/results?search_query=present%20perfect%20speaking%20practice%20English%20intermediate"}]}, {"week": 29, "month": 8, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Đặt phòng khách sạn/vé máy bay", "review": false, "grammar": {"name": "Câu lịch sự nâng cao: Could you.../I was wondering if...", "explain": "Dùng để yêu cầu một cách rất lịch sự, trang trọng, phù hợp khi giao dịch qua điện thoại hoặc với người lạ.", "examples": [{"en": "Could you help me book a room?", "vi": "Bạn có thể giúp tôi đặt phòng được không?"}, {"en": "I was wondering if you have any rooms available.", "vi": "Tôi không biết là bạn có phòng trống nào không."}, {"en": "Could I book a table for two?", "vi": "Tôi có thể đặt bàn cho 2 người được không?"}]}, "vocab": [{"w": "book a room/table/ticket", "ipa": "", "vi": "đặt phòng/bàn/vé", "ex_en": "I'd like to book a room for two nights.", "ex_vi": "Tôi muốn đặt phòng cho 2 đêm."}, {"w": "available", "ipa": "/əˈveɪləbəl/", "vi": "còn trống/có sẵn", "ex_en": "Is this room available?", "ex_vi": "Phòng này còn trống không?"}, {"w": "reservation", "ipa": "/ˌrezərˈveɪʃən/", "vi": "sự đặt chỗ", "ex_en": "I have a reservation under the name Thinh.", "ex_vi": "Tôi có đặt chỗ dưới tên Thinh."}, {"w": "check in / check out", "ipa": "", "vi": "nhận phòng / trả phòng", "ex_en": "What time is check-in?", "ex_vi": "Mấy giờ nhận phòng?"}, {"w": "single/double room", "ipa": "", "vi": "phòng đơn/đôi", "ex_en": "I'd like a double room.", "ex_vi": "Tôi muốn một phòng đôi."}, {"w": "confirm", "ipa": "/kənˈfɜːrm/", "vi": "xác nhận", "ex_en": "Can you confirm my booking?", "ex_vi": "Bạn có thể xác nhận đặt chỗ của tôi không?"}, {"w": "flight", "ipa": "/flaɪt/", "vi": "chuyến bay", "ex_en": "I need to book a flight to Hanoi.", "ex_vi": "Tôi cần đặt một chuyến bay đến Hà Nội."}, {"w": "I was wondering if...", "ipa": "", "vi": "tôi không biết là...", "ex_en": "I was wondering if I could change my booking.", "ex_vi": "Tôi không biết là tôi có thể đổi đặt chỗ không."}], "patterns": ["Could you please...?", "I was wondering if you could...", "I'd like to book..."], "quiz": [{"q": "Câu lịch sự nhất để yêu cầu:", "options": ["Give me a room.", "Could you help me book a room?", "I want a room now."], "answer": 1, "explain": "Could you... lịch sự hơn."}, {"q": "'Phòng này còn trống không?'", "options": ["Is this room available?", "Is this room book?", "This room available?"], "answer": 0, "explain": "available = còn trống."}, {"q": "'Mấy giờ nhận phòng?'", "options": ["What time is check-out?", "What time is check-in?", "What time is book?"], "answer": 1, "explain": "check-in = nhận phòng."}], "speaking": "Đóng vai gọi điện đặt phòng khách sạn: hỏi giá, loại phòng, ngày nhận/trả phòng.", "homework": "Viết đoạn hội thoại đặt vé máy bay qua điện thoại (8-10 câu).", "links": [{"label": "Video YouTube: booking a hotel room English phone conversation", "url": "https://www.youtube.com/results?search_query=booking%20a%20hotel%20room%20English%20phone%20conversation"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 30, "month": 8, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Giả định & Điều kiện đơn giản", "review": false, "grammar": {"name": "Câu điều kiện loại 1 (If + hiện tại đơn, will + V)", "explain": "Diễn tả điều kiện có thể xảy ra ở hiện tại/tương lai và kết quả của nó. Cấu trúc: If + S + V (hiện tại đơn), S + will + V.", "examples": [{"en": "If it rains, I will stay at home.", "vi": "Nếu trời mưa, tôi sẽ ở nhà."}, {"en": "If you study hard, you will pass the exam.", "vi": "Nếu bạn học chăm chỉ, bạn sẽ đậu kỳ thi."}, {"en": "What will you do if you have free time?", "vi": "Bạn sẽ làm gì nếu có thời gian rảnh?"}]}, "vocab": [{"w": "if", "ipa": "/ɪf/", "vi": "nếu", "ex_en": "If I have time, I will call you.", "ex_vi": "Nếu tôi có thời gian, tôi sẽ gọi cho bạn."}, {"w": "condition", "ipa": "/kənˈdɪʃən/", "vi": "điều kiện", "ex_en": "There is one condition.", "ex_vi": "Có một điều kiện."}, {"w": "result", "ipa": "/rɪˈzʌlt/", "vi": "kết quả", "ex_en": "The result will be good.", "ex_vi": "Kết quả sẽ tốt."}, {"w": "pass / fail (an exam)", "ipa": "", "vi": "đậu / rớt (kỳ thi)", "ex_en": "If you study, you will pass.", "ex_vi": "Nếu bạn học, bạn sẽ đậu."}, {"w": "succeed", "ipa": "/səkˈsiːd/", "vi": "thành công", "ex_en": "If you try, you will succeed.", "ex_vi": "Nếu bạn cố gắng, bạn sẽ thành công."}, {"w": "in case", "ipa": "", "vi": "phòng trường hợp", "ex_en": "Bring an umbrella in case it rains.", "ex_vi": "Mang theo ô phòng khi trời mưa."}, {"w": "unless", "ipa": "/ənˈles/", "vi": "trừ khi", "ex_en": "Unless you hurry, you will be late.", "ex_vi": "Trừ khi bạn nhanh lên, bạn sẽ trễ."}, {"w": "decision", "ipa": "/dɪˈsɪʒən/", "vi": "quyết định", "ex_en": "It's an important decision.", "ex_vi": "Đó là một quyết định quan trọng."}], "patterns": ["If + S + V(hiện tại đơn), S + will + V", "What will you do if...?"], "quiz": [{"q": "'Nếu trời mưa, tôi sẽ ở nhà':", "options": ["If it rains, I stay at home.", "If it rains, I will stay at home.", "If it will rain, I stay home."], "answer": 1, "explain": "If + hiện tại đơn, will + V."}, {"q": "'Nếu bạn học chăm chỉ, bạn sẽ đậu':", "options": ["If you study hard, you pass.", "If you will study hard, you will pass.", "If you study hard, you will pass."], "answer": 2, "explain": "Mệnh đề if dùng hiện tại đơn."}, {"q": "'unless' có nghĩa gần giống:", "options": ["if", "if not", "and"], "answer": 1, "explain": "unless = if not (trừ khi)."}], "speaking": "Nói 5 câu 'Nếu... thì...' về những dự định trong tương lai gần của bạn.", "homework": "Viết đoạn văn 6 câu điều kiện loại 1 về kế hoạch nghề nghiệp/học tập.", "links": [{"label": "Video YouTube: first conditional if clause English grammar beginner", "url": "https://www.youtube.com/results?search_query=first%20conditional%20if%20clause%20English%20grammar%20beginner"}, {"label": "Từ điển phát âm Cambridge", "url": "https://dictionary.cambridge.org/"}]}, {"week": 31, "month": 8, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Phàn nàn & Xin lỗi", "review": false, "grammar": {"name": "Cấu trúc phàn nàn lịch sự và xin lỗi", "explain": "Khi phàn nàn, nên dùng cấu trúc lịch sự để tránh gây khó chịu: 'I'm sorry to say this, but...', 'There seems to be a problem with...'. Khi xin lỗi: 'I apologize for...', 'I'm really sorry about...'.", "examples": [{"en": "I'm sorry to say this, but the food is cold.", "vi": "Tôi xin lỗi phải nói điều này, nhưng đồ ăn nguội rồi."}, {"en": "There seems to be a problem with my room.", "vi": "Có vẻ như có vấn đề với phòng của tôi."}, {"en": "I apologize for the inconvenience.", "vi": "Tôi xin lỗi vì sự bất tiện này."}]}, "vocab": [{"w": "problem / issue", "ipa": "", "vi": "vấn đề", "ex_en": "There is a problem with my order.", "ex_vi": "Có vấn đề với đơn hàng của tôi."}, {"w": "complain", "ipa": "/kəmˈpleɪn/", "vi": "phàn nàn", "ex_en": "I want to complain about the service.", "ex_vi": "Tôi muốn phàn nàn về dịch vụ."}, {"w": "apologize", "ipa": "/əˈpɒlədʒaɪz/", "vi": "xin lỗi", "ex_en": "I apologize for being late.", "ex_vi": "Tôi xin lỗi vì đã đến trễ."}, {"w": "inconvenience", "ipa": "/ˌɪnkənˈviːniəns/", "vi": "sự bất tiện", "ex_en": "Sorry for the inconvenience.", "ex_vi": "Xin lỗi vì sự bất tiện."}, {"w": "refund", "ipa": "/ˈriːfʌnd/", "vi": "hoàn tiền", "ex_en": "Can I get a refund?", "ex_vi": "Tôi có thể được hoàn tiền không?"}, {"w": "mistake", "ipa": "/mɪˈsteɪk/", "vi": "sai sót", "ex_en": "This is a mistake.", "ex_vi": "Đây là một sai sót."}, {"w": "fix / solve", "ipa": "", "vi": "sửa / giải quyết", "ex_en": "Can you fix this problem?", "ex_vi": "Bạn có thể giải quyết vấn đề này không?"}, {"w": "understand", "ipa": "/ˌʌndərˈstænd/", "vi": "thông cảm/hiểu", "ex_en": "I understand your frustration.", "ex_vi": "Tôi hiểu sự bực bội của bạn."}], "patterns": ["I'm sorry to say this, but...", "There seems to be a problem with...", "I apologize for..."], "quiz": [{"q": "Cách phàn nàn lịch sự:", "options": ["This food is terrible!", "I'm sorry to say this, but the food is cold.", "Give me new food now!"], "answer": 1, "explain": "Dùng cấu trúc lịch sự khi phàn nàn."}, {"q": "'Tôi xin lỗi vì sự bất tiện':", "options": ["I apologize for the inconvenience.", "I sorry the inconvenience.", "I apologize the inconvenience."], "answer": 0, "explain": "apologize for + danh từ."}, {"q": "Từ nào nghĩa 'hoàn tiền':", "options": ["mistake", "refund", "complain"], "answer": 1, "explain": "refund = hoàn tiền."}], "speaking": "Đóng vai xử lý tình huống phàn nàn tại khách sạn/nhà hàng (cả 2 vai: khách và nhân viên).", "homework": "Viết email ngắn phàn nàn lịch sự về một dịch vụ không tốt (6-8 câu).", "links": [{"label": "Video YouTube: making a complaint in English polite phrases", "url": "https://www.youtube.com/results?search_query=making%20a%20complaint%20in%20English%20polite%20phrases"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}]}, {"week": 32, "month": 8, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Ôn tập & Kiểm tra tháng 8", "review": true, "grammar": {"name": "Ôn tập tổng hợp Tuần 29-31", "explain": "Ôn câu lịch sự đặt phòng/vé, câu điều kiện loại 1, phàn nàn & xin lỗi.", "examples": [{"en": "I was wondering if I could change my reservation. If that's not possible, I apologize for the trouble.", "vi": "Tôi không biết là tôi có thể đổi đặt chỗ được không. Nếu không thể, tôi xin lỗi vì sự phiền hà."}]}, "vocab": [], "patterns": ["Ôn tất cả mẫu câu Tuần 29-31"], "quiz": [{"q": "'If you ___ (be) late, call me.'", "options": ["are", "will be", "were"], "answer": 0, "explain": "Mệnh đề if dùng hiện tại đơn."}, {"q": "Cách xin lỗi lịch sự nhất:", "options": ["Sorry.", "I apologize for the inconvenience.", "My bad."], "answer": 1, "explain": "Trang trọng hơn dùng apologize for."}], "speaking": "Xử lý liên tiếp 2 tình huống thực tế: đặt phòng khách sạn qua điện thoại, sau đó phàn nàn về phòng không như mong đợi.", "homework": "Viết kịch bản hoàn chỉnh (script) cho 2 tình huống trên, luyện đọc to 3 lần.", "links": [{"label": "Video YouTube: hotel booking and complaint role play English", "url": "https://www.youtube.com/results?search_query=hotel%20booking%20and%20complaint%20role%20play%20English"}]}, {"week": 33, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Nêu ý kiến cá nhân", "review": false, "grammar": {"name": "I think/In my opinion + liên từ but/because/so", "explain": "Dùng để mở đầu khi nêu quan điểm cá nhân một cách tự nhiên, tránh nói cộc lốc. Liên từ but/because/so giúp câu logic và tự nhiên hơn.", "examples": [{"en": "In my opinion, learning English is important.", "vi": "Theo ý kiến của tôi, học tiếng Anh rất quan trọng."}, {"en": "I think this is a good idea, but it takes time.", "vi": "Tôi nghĩ đây là ý tưởng hay, nhưng nó tốn thời gian."}, {"en": "I like this job because it pays well.", "vi": "Tôi thích công việc này vì nó trả lương cao."}]}, "vocab": [{"w": "in my opinion", "ipa": "", "vi": "theo ý kiến của tôi", "ex_en": "In my opinion, this is the best choice.", "ex_vi": "Theo ý kiến của tôi, đây là lựa chọn tốt nhất."}, {"w": "I think/I believe", "ipa": "", "vi": "tôi nghĩ/tôi tin rằng", "ex_en": "I believe hard work pays off.", "ex_vi": "Tôi tin rằng chăm chỉ sẽ được đền đáp."}, {"w": "agree / disagree", "ipa": "", "vi": "đồng ý / không đồng ý", "ex_en": "I agree with you.", "ex_vi": "Tôi đồng ý với bạn."}, {"w": "because", "ipa": "/bɪˈkɔːz/", "vi": "bởi vì", "ex_en": "I study English because I want a better job.", "ex_vi": "Tôi học tiếng Anh vì tôi muốn công việc tốt hơn."}, {"w": "so", "ipa": "/soʊ/", "vi": "vì vậy", "ex_en": "It was raining, so I stayed home.", "ex_vi": "Trời mưa nên tôi ở nhà."}, {"w": "but / however", "ipa": "", "vi": "nhưng / tuy nhiên", "ex_en": "I like it, but it's expensive.", "ex_vi": "Tôi thích nó, nhưng nó đắt."}, {"w": "point of view", "ipa": "", "vi": "quan điểm", "ex_en": "From my point of view, it's fair.", "ex_vi": "Theo quan điểm của tôi, điều đó công bằng."}, {"w": "importance", "ipa": "/ɪmˈpɔːrtəns/", "vi": "tầm quan trọng", "ex_en": "I understand the importance of English.", "ex_vi": "Tôi hiểu tầm quan trọng của tiếng Anh."}], "patterns": ["In my opinion, .../ I think..., but...", "S + V + because + S + V"], "quiz": [{"q": "Mở đầu nêu ý kiến tự nhiên:", "options": ["This is true.", "In my opinion, this is true.", "True this is."], "answer": 1, "explain": "In my opinion mở đầu tự nhiên hơn."}, {"q": "'Tôi thích vì nó rẻ':", "options": ["I like it so it's cheap.", "I like it because it's cheap.", "I like it but it's cheap."], "answer": 1, "explain": "because diễn tả lý do."}, {"q": "'Trời mưa nên tôi ở nhà':", "options": ["It rained because I stayed home.", "It rained so I stayed home.", "It rained but I stayed home."], "answer": 1, "explain": "so diễn tả kết quả."}], "speaking": "Nêu ý kiến về 2 chủ đề đơn giản (VD: học online vs học trực tiếp) dùng in my opinion/because/but.", "homework": "Viết đoạn văn 6-8 câu nêu quan điểm về một chủ đề bạn quan tâm.", "links": [{"label": "Video YouTube: giving opinions in English useful phrases", "url": "https://www.youtube.com/results?search_query=giving%20opinions%20in%20English%20useful%20phrases"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 34, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Câu bị động cơ bản", "review": false, "grammar": {"name": "Câu bị động (Passive Voice) thì hiện tại/quá khứ đơn", "explain": "Dùng khi muốn nhấn mạnh vào hành động/đối tượng chịu tác động hơn là người thực hiện. Cấu trúc: S + am/is/are/was/were + V3 (+ by + tác nhân).", "examples": [{"en": "English is spoken in many countries.", "vi": "Tiếng Anh được nói ở nhiều quốc gia."}, {"en": "The house was built in 1990.", "vi": "Ngôi nhà được xây vào năm 1990."}, {"en": "This product is made in Vietnam.", "vi": "Sản phẩm này được sản xuất tại Việt Nam."}]}, "vocab": [{"w": "made / built", "ipa": "", "vi": "được làm / được xây", "ex_en": "This car is made in Japan.", "ex_vi": "Chiếc xe này được sản xuất tại Nhật."}, {"w": "spoken / written", "ipa": "", "vi": "được nói / được viết", "ex_en": "This letter was written by her.", "ex_vi": "Bức thư này được viết bởi cô ấy."}, {"w": "used", "ipa": "/juːzd/", "vi": "được sử dụng", "ex_en": "This tool is used every day.", "ex_vi": "Công cụ này được dùng mỗi ngày."}, {"w": "produce", "ipa": "/prəˈdjuːs/", "vi": "sản xuất", "ex_en": "Rice is produced in Vietnam.", "ex_vi": "Gạo được sản xuất ở Việt Nam."}, {"w": "by (tác nhân)", "ipa": "/baɪ/", "vi": "bởi", "ex_en": "This song was written by him.", "ex_vi": "Bài hát này được viết bởi anh ấy."}, {"w": "known / famous", "ipa": "", "vi": "nổi tiếng", "ex_en": "This place is known for its food.", "ex_vi": "Nơi này nổi tiếng vì đồ ăn."}, {"w": "include", "ipa": "/ɪnˈkluːd/", "vi": "bao gồm", "ex_en": "Breakfast is included.", "ex_vi": "Bữa sáng đã được bao gồm."}, {"w": "worldwide", "ipa": "/ˌwɜːrldˈwaɪd/", "vi": "trên toàn thế giới", "ex_en": "This brand is known worldwide.", "ex_vi": "Thương hiệu này được biết đến trên toàn thế giới."}], "patterns": ["S + am/is/are + V3 (+ by...)", "S + was/were + V3 (+ by...)"], "quiz": [{"q": "'Tiếng Anh được nói ở nhiều nước':", "options": ["English speaks in many countries.", "English is spoken in many countries.", "English was spoken many countries."], "answer": 1, "explain": "hiện tại đơn bị động: is + V3."}, {"q": "'Ngôi nhà được xây năm 1990':", "options": ["The house built in 1990.", "The house was built in 1990.", "The house is built in 1990."], "answer": 1, "explain": "quá khứ đơn bị động: was + V3."}, {"q": "Câu bị động dùng khi:", "options": ["Nhấn mạnh người thực hiện", "Nhấn mạnh đối tượng chịu tác động", "Không có nghĩa gì khác"], "answer": 1, "explain": "Bị động nhấn mạnh đối tượng."}], "speaking": "Mô tả 3 sản phẩm/địa điểm nổi tiếng dùng câu bị động (VD: This phone is made in...).", "homework": "Viết 5 câu bị động về sản phẩm hoặc địa danh Việt Nam.", "links": [{"label": "Video YouTube: passive voice English grammar simple present past", "url": "https://www.youtube.com/results?search_query=passive%20voice%20English%20grammar%20simple%20present%20past"}, {"label": "Từ điển phát âm Cambridge", "url": "https://dictionary.cambridge.org/"}]}, {"week": 35, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Kể lại lời người khác", "review": false, "grammar": {"name": "Câu tường thuật (Reported Speech) cơ bản", "explain": "Khi kể lại lời người khác đã nói, thì thường lùi về một bậc (hiện tại đơn → quá khứ đơn) và đổi đại từ phù hợp. Cấu trúc: S + said (that) + S + V (lùi thì).", "examples": [{"en": "She said that she was tired.", "vi": "Cô ấy nói rằng cô ấy mệt."}, {"en": "He said he would come later.", "vi": "Anh ấy nói anh ấy sẽ đến sau."}, {"en": "They told me they liked the food.", "vi": "Họ nói với tôi rằng họ thích món ăn."}]}, "vocab": [{"w": "say - said", "ipa": "", "vi": "nói (quá khứ)", "ex_en": "She said she was busy.", "ex_vi": "Cô ấy nói cô ấy bận."}, {"w": "tell - told", "ipa": "", "vi": "kể/nói với ai (quá khứ)", "ex_en": "He told me his name.", "ex_vi": "Anh ấy nói tên anh ấy với tôi."}, {"w": "that (không bắt buộc)", "ipa": "", "vi": "rằng", "ex_en": "She said that she was happy.", "ex_vi": "Cô ấy nói rằng cô ấy hạnh phúc."}, {"w": "ask - asked", "ipa": "", "vi": "hỏi (quá khứ)", "ex_en": "He asked if I was okay.", "ex_vi": "Anh ấy hỏi tôi có ổn không."}, {"w": "mention", "ipa": "/ˈmenʃən/", "vi": "đề cập", "ex_en": "She mentioned her new job.", "ex_vi": "Cô ấy đã đề cập công việc mới của mình."}, {"w": "explain", "ipa": "/ɪkˈspleɪn/", "vi": "giải thích", "ex_en": "He explained the problem.", "ex_vi": "Anh ấy đã giải thích vấn đề."}, {"w": "according to", "ipa": "", "vi": "theo như", "ex_en": "According to her, it's true.", "ex_vi": "Theo như cô ấy nói, điều đó đúng."}, {"w": "would (lùi từ will)", "ipa": "", "vi": "sẽ (trong quá khứ)", "ex_en": "He said he would help me.", "ex_vi": "Anh ấy nói anh ấy sẽ giúp tôi."}], "patterns": ["S + said (that) + S + V (lùi thì)", "S + told + O + (that) + S + V"], "quiz": [{"q": "'Cô ấy nói cô ấy mệt' (mệt: is tired):", "options": ["She said she is tired.", "She said she was tired.", "She said she tired."], "answer": 1, "explain": "Lùi thì: is → was."}, {"q": "'Anh ấy nói anh ấy sẽ đến' (will come):", "options": ["He said he will come.", "He said he would come.", "He said he comes."], "answer": 1, "explain": "will lùi thành would."}, {"q": "Phân biệt say/tell:", "options": ["tell + tân ngữ người nghe, say + không cần", "say + tân ngữ, tell + không cần", "giống nhau hoàn toàn"], "answer": 0, "explain": "tell luôn cần tân ngữ chỉ người nghe."}], "speaking": "Kể lại một cuộc hội thoại ngắn bạn đã nghe được gần đây (dùng said/told).", "homework": "Viết đoạn hội thoại ngắn rồi chuyển thành câu tường thuật (5 câu).", "links": [{"label": "Video YouTube: reported speech English grammar basics beginner", "url": "https://www.youtube.com/results?search_query=reported%20speech%20English%20grammar%20basics%20beginner"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 36, "month": 9, "phase": "Giai đoạn 3: Tiền trung cấp (Tháng 7-9)", "title": "Ôn tập cuối Giai đoạn 3 & Kiểm tra tổng hợp", "review": true, "grammar": {"name": "Ôn tập toàn bộ Tháng 7-9", "explain": "Ôn hiện tại hoàn thành, can/could, câu lịch sự, câu điều kiện, phàn nàn/xin lỗi, nêu ý kiến, câu bị động, câu tường thuật. Ôn toàn bộ ~1.800 từ vựng lũy kế.", "examples": [{"en": "In my opinion, this hotel is well known, but I was wondering if there's a problem with my booking.", "vi": "Theo tôi, khách sạn này khá nổi tiếng, nhưng tôi không biết là có vấn đề gì với đặt chỗ của tôi không."}]}, "vocab": [], "patterns": ["Ôn tất cả cấu trúc Tháng 7-9"], "quiz": [{"q": "'This bag ___ (make) in Vietnam.'", "options": ["make", "made", "is made"], "answer": 2, "explain": "Câu bị động hiện tại: is made."}, {"q": "'She said she ___ (be) happy.'", "options": ["is", "was", "will be"], "answer": 1, "explain": "Câu tường thuật lùi thì: is → was."}], "speaking": "PHỎNG VẤN NÓI 5 PHÚT + xử lý 1 tình huống bất ngờ (VD: máy bay bị hoãn, phải phàn nàn và tìm giải pháp).", "homework": "Tổng ôn 3 tháng: viết danh sách 15 lỗi sai thường gặp nhất của bản thân để chuẩn bị cho giai đoạn cuối.", "links": [{"label": "Video YouTube: English speaking test intermediate 5 minutes practice", "url": "https://www.youtube.com/results?search_query=English%20speaking%20test%20intermediate%205%20minutes%20practice"}]}, {"week": 37, "month": 10, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Công nghệ & Mạng xã hội", "review": false, "grammar": {"name": "Cụm động từ (Phrasal Verbs) thông dụng", "explain": "Phrasal verb = động từ + giới từ/trạng từ, nghĩa thường khác với nghĩa gốc của từng từ. Rất phổ biến trong giao tiếp tự nhiên hằng ngày.", "examples": [{"en": "I need to look up this word.", "vi": "Tôi cần tra từ này."}, {"en": "Turn off your phone, please.", "vi": "Làm ơn tắt điện thoại của bạn."}, {"en": "I grew up using smartphones.", "vi": "Tôi lớn lên cùng với việc dùng điện thoại thông minh."}]}, "vocab": [{"w": "look up (a word)", "ipa": "", "vi": "tra cứu", "ex_en": "I look up new words online.", "ex_vi": "Tôi tra từ mới trên mạng."}, {"w": "turn on/off", "ipa": "", "vi": "bật/tắt", "ex_en": "Turn on the computer.", "ex_vi": "Bật máy tính lên."}, {"w": "log in/out", "ipa": "", "vi": "đăng nhập/đăng xuất", "ex_en": "I need to log in to my account.", "ex_vi": "Tôi cần đăng nhập vào tài khoản."}, {"w": "sign up", "ipa": "", "vi": "đăng ký", "ex_en": "I signed up for a new app.", "ex_vi": "Tôi đã đăng ký một ứng dụng mới."}, {"w": "check out", "ipa": "", "vi": "kiểm tra/xem thử", "ex_en": "Check out this new app.", "ex_vi": "Xem thử ứng dụng mới này đi."}, {"w": "upload / download", "ipa": "", "vi": "tải lên / tải xuống", "ex_en": "I downloaded a new app.", "ex_vi": "Tôi đã tải xuống một ứng dụng mới."}, {"w": "keep up with", "ipa": "", "vi": "theo kịp", "ex_en": "I try to keep up with technology.", "ex_vi": "Tôi cố gắng theo kịp công nghệ."}, {"w": "figure out", "ipa": "", "vi": "tìm ra/hiểu ra", "ex_en": "I figured out how to use it.", "ex_vi": "Tôi đã hiểu ra cách sử dụng nó."}], "patterns": ["S + phrasal verb + O", "Turn on/off, log in/out, sign up for..."], "quiz": [{"q": "'Tra từ này' dùng cụm động từ:", "options": ["look up", "turn on", "log in"], "answer": 0, "explain": "look up = tra cứu."}, {"q": "'Đăng nhập vào tài khoản':", "options": ["log in to my account", "log out my account", "turn on my account"], "answer": 0, "explain": "log in to = đăng nhập vào."}, {"q": "'figure out' nghĩa là:", "options": ["tải xuống", "hiểu ra/tìm ra", "đăng ký"], "answer": 1, "explain": "figure out = hiểu ra."}], "speaking": "Thảo luận thói quen dùng công nghệ/mạng xã hội hằng ngày, dùng ít nhất 5 phrasal verbs.", "homework": "Viết đoạn văn 8 câu về thói quen công nghệ, gạch chân các phrasal verbs đã dùng.", "links": [{"label": "Video YouTube: common phrasal verbs technology English conversation", "url": "https://www.youtube.com/results?search_query=common%20phrasal%20verbs%20technology%20English%20conversation"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 38, "month": 10, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Môi trường & Lối sống", "review": false, "grammar": {"name": "Liên từ nâng cao: although/however/despite", "explain": "Although + mệnh đề (mặc dù). However dùng đầu câu, sau dấu phẩy (tuy nhiên). Despite + danh từ/V-ing (mặc dù).", "examples": [{"en": "Although it's expensive, I bought it.", "vi": "Mặc dù đắt, tôi vẫn mua nó."}, {"en": "I like the city. However, it's very polluted.", "vi": "Tôi thích thành phố này. Tuy nhiên, nó rất ô nhiễm."}, {"en": "Despite the rain, we went out.", "vi": "Mặc dù trời mưa, chúng tôi vẫn ra ngoài."}]}, "vocab": [{"w": "environment", "ipa": "/ɪnˈvaɪrənmənt/", "vi": "môi trường", "ex_en": "We should protect the environment.", "ex_vi": "Chúng ta nên bảo vệ môi trường."}, {"w": "pollution", "ipa": "/pəˈluːʃən/", "vi": "ô nhiễm", "ex_en": "Air pollution is a big problem.", "ex_vi": "Ô nhiễm không khí là một vấn đề lớn."}, {"w": "recycle", "ipa": "/riːˈsaɪkəl/", "vi": "tái chế", "ex_en": "We should recycle plastic.", "ex_vi": "Chúng ta nên tái chế nhựa."}, {"w": "lifestyle", "ipa": "/ˈlaɪfstaɪl/", "vi": "lối sống", "ex_en": "I want a healthy lifestyle.", "ex_vi": "Tôi muốn một lối sống lành mạnh."}, {"w": "although", "ipa": "/ɔːlˈðoʊ/", "vi": "mặc dù", "ex_en": "Although it's hard, I keep trying.", "ex_vi": "Mặc dù khó, tôi vẫn tiếp tục cố gắng."}, {"w": "however", "ipa": "/haʊˈevər/", "vi": "tuy nhiên", "ex_en": "I like it. However, it's costly.", "ex_vi": "Tôi thích nó. Tuy nhiên, nó tốn kém."}, {"w": "despite", "ipa": "/dɪˈspaɪt/", "vi": "mặc dù (+ danh từ/Ving)", "ex_en": "Despite being tired, she kept working.", "ex_vi": "Mặc dù mệt, cô ấy vẫn tiếp tục làm việc."}, {"w": "reduce", "ipa": "/rɪˈdjuːs/", "vi": "giảm thiểu", "ex_en": "We should reduce plastic waste.", "ex_vi": "Chúng ta nên giảm rác thải nhựa."}], "patterns": ["Although + S + V, S + V.", "S + V. However, S + V.", "Despite + N/V-ing, S + V."], "quiz": [{"q": "'Mặc dù trời mưa, chúng tôi vẫn ra ngoài' dùng despite + :", "options": ["S+V", "danh từ/V-ing", "mệnh đề đầy đủ"], "answer": 1, "explain": "despite + danh từ/V-ing, không phải mệnh đề."}, {"q": "Vị trí của 'however' thường là:", "options": ["Đầu câu mới, sau dấu chấm/phẩy", "Giữa 2 mệnh đề không dấu câu", "Cuối câu luôn luôn"], "answer": 0, "explain": "however thường đứng đầu câu, sau dấu chấm."}, {"q": "'Although' đi với:", "options": ["danh từ", "mệnh đề đầy đủ (S+V)", "V-ing"], "answer": 1, "explain": "although + mệnh đề đầy đủ."}], "speaking": "Thảo luận về lối sống lành mạnh và bảo vệ môi trường, dùng although/however/despite.", "homework": "Viết đoạn văn 8 câu về một thói quen bạn muốn thay đổi để sống lành mạnh hơn.", "links": [{"label": "Video YouTube: although however despite English grammar linking words", "url": "https://www.youtube.com/results?search_query=although%20however%20despite%20English%20grammar%20linking%20words"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}]}, {"week": 39, "month": 10, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Văn hóa & Du lịch nước ngoài", "review": false, "grammar": {"name": "So sánh văn hóa & Thành ngữ (Idioms) cơ bản", "explain": "Idioms là các cụm từ có nghĩa bóng, không dịch theo nghĩa đen. Học vài idiom thông dụng giúp nói tự nhiên hơn như người bản xứ.", "examples": [{"en": "When in Rome, do as the Romans do.", "vi": "Nhập gia tùy tục."}, {"en": "It's a piece of cake.", "vi": "Việc đó dễ như ăn bánh (rất dễ)."}, {"en": "Break the ice.", "vi": "Phá vỡ sự ngại ngùng ban đầu."}]}, "vocab": [{"w": "culture", "ipa": "/ˈkʌltʃər/", "vi": "văn hóa", "ex_en": "I'm interested in Vietnamese culture.", "ex_vi": "Tôi thích thú với văn hóa Việt Nam."}, {"w": "tradition", "ipa": "/trəˈdɪʃən/", "vi": "truyền thống", "ex_en": "This is a traditional custom.", "ex_vi": "Đây là một phong tục truyền thống."}, {"w": "piece of cake", "ipa": "", "vi": "dễ như ăn bánh (rất dễ)", "ex_en": "This test was a piece of cake.", "ex_vi": "Bài kiểm tra này rất dễ."}, {"w": "break the ice", "ipa": "", "vi": "phá vỡ sự ngại ngùng", "ex_en": "Let's break the ice with a joke.", "ex_vi": "Hãy phá vỡ sự ngại ngùng bằng một câu chuyện cười."}, {"w": "when in Rome...", "ipa": "", "vi": "nhập gia tùy tục", "ex_en": "When in Rome, do as the Romans do.", "ex_vi": "Nhập gia tùy tục."}, {"w": "cost an arm and a leg", "ipa": "", "vi": "rất đắt đỏ", "ex_en": "This phone costs an arm and a leg.", "ex_vi": "Điện thoại này đắt kinh khủng."}, {"w": "custom", "ipa": "/ˈkʌstəm/", "vi": "phong tục", "ex_en": "Every country has its own customs.", "ex_vi": "Mỗi nước có phong tục riêng."}, {"w": "respect", "ipa": "/rɪˈspekt/", "vi": "tôn trọng", "ex_en": "We should respect other cultures.", "ex_vi": "Chúng ta nên tôn trọng văn hóa khác."}], "patterns": ["It's a piece of cake. / Break the ice.", "When in Rome, do as the Romans do."], "quiz": [{"q": "'Việc đó rất dễ' dùng idiom:", "options": ["It's a piece of cake.", "Break the ice.", "Cost an arm and a leg."], "answer": 0, "explain": "piece of cake = rất dễ."}, {"q": "'Rất đắt' dùng idiom:", "options": ["Piece of cake", "Cost an arm and a leg", "Break the ice"], "answer": 1, "explain": "cost an arm and a leg = rất đắt."}, {"q": "'Nhập gia tùy tục' tiếng Anh là:", "options": ["When in Rome, do as the Romans do.", "Break the ice.", "Piece of cake."], "answer": 0, "explain": "Idiom tương đương."}], "speaking": "So sánh một phong tục văn hóa Việt Nam với một nước khác, dùng ít nhất 2 idiom đã học.", "homework": "Tìm hiểu và viết thêm 3 idiom tiếng Anh thông dụng khác kèm ví dụ.", "links": [{"label": "Video YouTube: common English idioms for beginners with examples", "url": "https://www.youtube.com/results?search_query=common%20English%20idioms%20for%20beginners%20with%20examples"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 40, "month": 10, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Ôn tập & Kiểm tra tháng 10", "review": true, "grammar": {"name": "Ôn tập tổng hợp Tuần 37-39", "explain": "Ôn phrasal verbs công nghệ, although/however/despite, idioms văn hóa.", "examples": [{"en": "Although technology costs an arm and a leg sometimes, I keep up with it. However, I always respect traditional customs.", "vi": "Mặc dù công nghệ đôi khi rất đắt đỏ, tôi vẫn theo kịp nó. Tuy nhiên, tôi luôn tôn trọng các phong tục truyền thống."}]}, "vocab": [], "patterns": ["Ôn tất cả mẫu câu Tuần 37-39"], "quiz": [{"q": "'___ it's expensive, I bought the phone.'", "options": ["However", "Although", "Despite"], "answer": 1, "explain": "although + mệnh đề đầy đủ."}, {"q": "Idiom 'rất dễ':", "options": ["piece of cake", "break the ice", "cost an arm and a leg"], "answer": 0, "explain": "piece of cake = rất dễ."}], "speaking": "Thảo luận tự do 5 phút theo 1 trong 3 chủ ạn có thể gửi cho tôi báo cáo được không?"}, {"en": "Best regards, Thinh", "vi": "Trân trọng, Thinh"}]}, "vocab": [{"w": "Dear...", "ipa": "", "vi": "kính gửi", "ex_en": "Dear Ms. Lan,", "ex_vi": "Kính gửi cô Lan,"}, {"w": "I am writing to...", "ipa": "", "vi": "tôi viết thư này để...", "ex_en": "I am writing to ask about the schedule.", "ex_vi": "Tôi viết thư này để hỏi về lịch trình."}, {"w": "Best regards / Sincerely", "ipa": "", "vi": "trân trọng", "ex_en": "Best regards, Thinh", "ex_vi": "Trân trọng, Thinh"}, {"w": "attach", "ipa": "/əˈtætʃ/", "vi": "đính kèm", "ex_en": "Please find the file attached.", "ex_vi": "Vui lòng xem tệp đính kèm."}, {"w": "inquire", "ipa": "/ɪnˈkwaɪər/", "vi": "hỏi thông tin", "ex_en": "I am writing to inquire about the price.", "ex_vi": "Tôi viết thư này để hỏi về giá."}, {"w": "as soon as possible (ASAP)", "ipa": "", "vi": "càng sớm càng tốt", "ex_en": "Please reply as soon as possible.", "ex_vi": "Vui lòng trả lời càng sớm càng tốt."}, {"w": "hold on / hold the line", "ipa": "", "vi": "đợi máy (điện thoại)", "ex_en": "Please hold on for a moment.", "ex_vi": "Xin vui lòng đợi máy một lát."}, {"w": "get back to (someone)", "ipa": "", "vi": "phản hồi lại ai đó", "ex_en": "I will get back to you soon.", "ex_vi": "Tôi sẽ phản hồi lại bạn sớm."}], "patterns": ["Dear... / I am writing to... / Best regards,", "Could you please + V?"], "quiz": [{"q": "Cách mở đầu email trang trọng:", "options": ["Hi there!", "Dear Mr. Smith,", "Hey buddy!"], "answer": 1, "explain": "Dear + tên là trang trọng."}, {"q": "Kết thúc email trang trọng:", "options": ["See you!", "Best regards,", "Bye bye"], "answer": 1, "explain": "Best regards = trân trọng."}, {"q": "'Tôi sẽ phản hồi lại bạn sớm':", "options": ["I will get back to you soon.", "I will get you back soon.", "I get back you soon."], "answer": 0, "explain": "get back to someone = phản hồi lại ai."}], "speaking": "Đóng vai gọi điện công việc: xin nghỉ phép, hỏi thông tin dự án, hoặc dời lịch họp.", "ho : "Cảm ơn khán giả đã lắng nghe."}, {"w": "slide", "ipa": "/slaɪd/", "vi": "trang trình chiếu", "ex_en": "Let's look at the next slide.", "ex_vi": "Hãy xem trang tiếp theo."}, {"w": "conclusion", "ipa": "/kənˈkluːʒən/", "vi": "phần kết luận", "ex_en": "In conclusion, English is useful.", "ex_vi": "Kết luận lại, tiếng Anh rất hữu ích."}], "patterns": ["Today, I'm going to talk about...", "Firstly,.../In addition,.../Finally,...", "To sum up,..."], "quiz": [{"q": "Mở đầu bài thuyết trình:", "options": ["To sum up...", "Today, I'm going to talk about...", "Finally..."], "answer": 1, "explain": "Mở đầu giới thiệu chủ đề."}, {"q": "Từ nối ý thứ 2:", "options": ["Firstly", "In addition", "To sum up"], "answer": 1, "explain": "in addition = thêm vào đó."}, {"q": "Kết luận bài thuyết trình:", "options": ["Firstly...", "Today...", "To sum up..."], "answer": 2, "explain": "To sum up = tóm lại, dùng để kết luận."}], "speaking": "Thuyết trình 2 phút về 1 chủ đề tự chọn (sở thích, quê hương, công việc mơ ước) theo cấu trúc 3 phần.", "homework": "Viết dàn ý (outline) và nội dung đầy đủ cho bài thuyết trình 2 phút.", "links": [{"label": "Video YouTube: how to give a short presentation in English beginner", "url": "https://www.youtube.com/results?search_query=how%20to%20give%20a%20short%20presentation%20in%20English%20beginner"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}]}, {"week": 44, "month": 11, "phase": "Giai đoạn 4: Trôi chảy & Ứng dụng (Tháng 10-12)", "title": "Ôn tập & Kiểm tra tháng 11", "review": true, "grammar": {"name": "Ôn tập tổng hợp Tuần 41-43", "explain": "Ôn ngôn ngữ phỏng vấn xin việc, email/cuộc gọi công việc trang trọng, cấu trúc thuyết trình.", "examples": [{"en": "Today, I'm going to talk about my experience. Firstly, I have worked in sales for 2 years. To sum up, I believe I'm a good fit for this position.", "vi": "Hôm nay tôi sẽ nói về kinh nghiệm của mình. Đầu tiên, tôi đã làm việc trong lĩnh vực bán h function pickVoice(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  englishVoice = voices.find(v=>v.lang==='en-US') || voices.find(v=>v.lang && v.lang.startsWith('en')) || null;
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
}

function speak(text){
  if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ đọc giọng nói. Hãy dùng Chrome, Edge hoặc Safari.'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  if(englishVoice) u.voice = englishVoice;
  u.rate = speechRate;
  window.speechSynthesis.speak(u);
}

// ===== Speech recognition: mic check & scoring =====
const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition || null;

function normalizeWords(text){
  return (text||'').toLowerCase().replace(/[.,!?;:"'’]/g,'').split(/\s+/).filter(Boolean);
}

function lcsAlign(a,b){
  const n=a.length, m=b.length;
  const dp = Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=1;i<=n;i++){
    for(let j=1;j<=m;j++){
      if(a[i-1]===b[j-1]) dp[i][j]=dp[i-1][j-1]+1;
      else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
    }
  }
  let i=n, j=m;
  const aMark = new Array(n).fill('missing');
  const bMark = new Array(m).fill('extra');
  while(i>0 && j>0){
    if(a[i-1]===b[j-1]){ aMark[i-1]='match'; bMark[j-1]='match'; i--; j--; }
    else if(dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  return { aMark, bMark, lcsLen: dp[n][m] };
}

function renderScore(targetText, spokenText, resultEl){
  const tWords = normalizeWords(targetText);
  const sWords = normalizeWords(spokenText);
  const { aMark, bMark, lcsLen } = lcsAlign(tWords, sWords);
  const score = tWords.length ? Math.round(lcsLen / tWords.length * 100) : 0;
  const scoreClass = score>=85 ? 'good' : (score>=60 ? 'mid' : 'bad');
  const scoreLabel = score>=85 ? 'Rất tốt! 🎉' : (score>=60 ? 'Khá, cần luyện thêm' : 'Cần luyện lại');
  const targetHtml = tWords.map((w,idx)=>`<span class="${aMark[idx]==='match'?'w-match':'w-missing'}">${escapeHtml(w)}</span>`).join(' ');
  const spokenHtml = sWords.length ? sWords.map((w,idx)=>`<span class="${bMark[idx]==='match'?'w-match':'w-extra'}">${escapeHtml(w)}</span>`).join(' ') : '<i>(không nghe rõ)</i>';
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<span class="sc-score ${scoreClass}">${score}% — ${scoreLabel}</span>
    <div><b>Câu mẫu:</b> ${targetHtml}</div>
    <div style="margin-top:4px;"><b>Bạn đã nói:</b> ${spokenHtml}</div>`;
}

function startMicCheck(button, targetText, resultEl){
  if(!SpeechRecognitionCtor){
    resultEl.style.display = 'block';
    resultEl.innerHTML = '<span style="color:var(--red)">Trình duyệt này không hỗ trợ nhận diện giọng nói. Vui lòng dùng Google Chrome (khuyên dùng) hoặc Safari mới nhất, và cho phép quyền micro.</span>';
    return;
  }
  const rec = new SpeechRecognitionCtor();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  button.disabled = true;
  button.classList.add('recording');
  const originalLabel = button.textContent;
  button.textContent = '🎙️ Đang nghe...';
  try{ rec.start(); }catch(e){ button.disabled=false; button.classList.remove('recording'); button.textContent=originalLabel; return; }
  rec.onresult = (e)=>{
    const transcript = e.results[0][0].transcript;
    renderScore(targetText, transcript, resultEl);
  };
  rec.onerror = (e)=>{
    resultEl.style.display = 'block';
    let msg = 'Có lỗi xảy ra (' + e.error + ').';
    if(e.error==='not-allowed' || e.error==='service-not-allowed') msg = 'Bạn cần cho phép quyền truy cập micro cho trang này trong trình duyệt.';
    if(e.error==='network') msg = 'Lỗi kết nối — tính năng nhận diện giọng nói cần Internet để hoạt động.';
    if(e.error==='no-speech') msg = 'Không nghe thấy giọng nói, hãy thử lại và nói to rõ hơn.';
    resultEl.innerHTML = `<span style="color:var(--red)">${msg}</span>`;
  };
  rec.onend = ()=>{
    button.disabled = false;
    button.classList.remove('recording');
    button.textContent = originalLabel;
  };
}

  document.getElementById('phase-badge').innerHTML = `<span class="badge">Tài liệu tham khảo</span>`;
  let html = `<h2 class="week-title">🔊 Hướng dẫn đọc phiên âm IPA &amp; Trọng âm</h2>
  <div class="week-meta">Dùng trang này bất cứ khi nào gặp ký hiệu phiên âm lạ trong phần từ vựng — bấm nút 🔊 để nghe, đọc theo nhiều lần.</div>
  <div class="card"><h3>1. Cách đọc bảng ký hiệu phiên âm (IPA)</h3>
  <p>Mỗi từ tiếng Anh trong app đều có phiên âm quốc tế (IPA) đặt trong dấu gạch chéo, ví dụ <b>family /ˈfæməli/</b>. Bảng dưới đây giải thích các âm thường gặp nhất, so sánh gần đúng với tiếng Việt để bạn dễ hình dung — nhưng cách chuẩn nhất vẫn là <b>bấm nút 🔊 để nghe trực tiếp</b>.</p>
  <table class="guide-table"><thead><tr><th>Nhóm</th><th>Ký hiệu</th><th>Cách đọc gần đúng</th><th>Ví dụ (bấm để nghe)</th></tr></thead><tbody>`;
  IPA_GUIDE.forEach(row=>{
    html += `<tr><td>${escapeHtml(row[0])}</td><td class="sym">${escapeHtml(row[1])}</td><td>${escapeHtml(row[2])}</td><td>${escapeHtml(row[3])}
      <button class="speak-btn light" onclick="speak('${escapeHtml(row[3]).split(',')[0].split('/')[0].trim().replace(/'/g,"\\'")}')">🔊</button></td></tr>`;
  });
  html += `</tbody></table></div>`;

  html += `<div class="card"><h3>2. Trọng âm (Word Stress) — vì sao câu nghe "đúng-sai" khác nhau</h3>
  <p>Trong phiên âm, dấu <b>ˈ</b> đứng <b>ngay trước</b> âm tiết được nhấn mạnh (đọc to, rõ, kéo dài hơn các âm còn lại). Ví dụ:</p>
  <div class="example"><div class="exText"><div class="en"><b>ˈfæ</b>-mə-li → <b>FA</b>-mi-ly (nhấn âm 1)</div><div class="vi">family — nếu nhấn sai âm tiết, người bản xứ có thể không hiểu ngay bạn đang nói từ gì.</div></div>
    <button class="speak-btn light" onclick="speak('family')">🔊</button></div>
  <div class="example"><div class="exText"><div class="en">im-ˈpɔːr-tənt → im-<b>POR</b>-tant (nhấn âm 2)</div><div class="vi">important</div></div>
    <button class="speak-btn light" onclick="speak('important')">🔊</button></div>
  <p style="margin-top:10px;"><b>Mẹo thực hành:</b> khi học từ mới trong app, hãy bấm 🔊 nghe 2-3 lần, để ý âm tiết nào được đọc mạnh/dài hơn, sau đó tự nói lại và ghi âm để so sánh — đây chính xác là cách luyện phát âm được đề cập trong Phần 9 của giáo án.</p>
  </div>`;

  html += `<div class="card"><h3>3. Ngữ điệu câu (Sentence Stress &amp; Intonation)</h3>
  <p>Tiếng Anh không đọc đều đều từng từ như tiếng Việt — các từ mang nghĩa chính (danh từ, động từ, tính từ) được nhấn mạnh hơn, còn từ chức năng (a, the, is, to...) đọc nhanh và nhẹ hơn.</p>
  <div class="example"><div class="exText"><div class="en">I want to <b>VIS</b>-it <b>JA</b>-pan next <b>YEAR</b>.</div><div class="vi">Các từ in đậm (visit, Japan, year) được nhấn — đây là các từ mang nội dung chính của câu.</div></div>
    <button class="speak-btn light" onclick="speak('I want to visit Japan next year.')">🔊</button></div>
  <p>Câu hỏi Yes/No thường lên giọng ở cuối; câu hỏi Wh- (What/Where/When) thường xuống giọng ở cuối.</p>
  <div class="example"><div class="exText"><div class="en">Do you like coffee? ↗ (lên giọng cuối câu)</div><div class="vi">Câu hỏi Yes/No</div></div>
    <button class="speak-btn light" onclick="speak('Do you like coffee?')">🔊</button></div>
  <div class="example"><div class="exText"><div class="en">Where do you live? ↘ (xuống giọng cuối câu)</div><div class="vi">Câu hỏi Wh-</div></div>
    <button class="speak-btn light" onclick="speak('Where do you live?')">🔊</button></div>
  </div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('guideNavItem').classList.add('active');
  document.querySelectorAll('.week-item.active').forEach(el=>el.classList.remove('active'));
}

function renderProgressSummary(){
  const p = getProgress();
  const doneCount = WEEKS.filter(w=>p[w.week]).length;
  document.getElementById('progress-count').textContent = doneCount + '/' + WEEKS.length;
  document.getElementById('progress-bar-inner').style.width = (doneCount/WEEKS.length*100) + '%';
}

function renderSidebar(filter){
  const p = getProgress();
  const container = document.getElementById('nav-list');
  container.innerHTML = '';
  filter = (filter||'').toLowerCase().trim();
  const phases = [...new Set(WEEKS.map(w=>w.phase))];
  phases.forEach(phase=>{
    const weeksInPhase = WEEKS.filter(w=>w.phase===phase);
    const months = [...new Set(weeksInPhase.map(w=>w.month))];
    let phaseHasMatch = false;
    let phaseHtml = '';
    months.forEach(month=>{
      const weeksInMonth = weeksInPhase.filter(w=>w.month===month);
      let monthHtml = '';
      let monthHasMatch = false;
      weeksInMonth.forEach(w=>{
        const hay = (w.title+' '+w.week+' '+w.vocab.map(v=>v.w+' '+v.vi).join(' ')).toLowerCase();
        if(filter && !hay.includes(filter)) return;
        monthHasMatch = true; phaseHasMatch = true;
        const isDone = !!p[w.week];
        const isActive = w.week === currentWeek;
        monthHtml += `<div class="week-item ${isDone?'done':''} ${isActive?'active':''} ${w.review?'review':''}" data-week="${w.week}">
          <span class="dot"></span>Tuần ${w.week}: ${w.title}</div>`;
      });
      if(monthHasMatch){
        phaseHtml += `<div class="month-title">Tháng ${month}</div>${monthHtml}`;
      }
    });
    if(phaseHasMatch){
      container.innerHTML += `<div class="phase-block"><div class="phase-title">${phase}</div>${phaseHtml}</div>`;
    }
  });
  container.querySelectorAll('.week-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentWeek = parseInt(el.dataset.week);
      renderContent();
      renderSidebar(document.getElementById('search').value);
      window.scrollTo(0,0);
      closeMobileSidebar();
    });
  });
}

function openMobileSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeMobileSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderContent(){
  const w = WEEKS.find(x=>x.week===currentWeek);
  if(!w) return;
  document.getElementById('guideNavItem').classList.remove('active');
  document.getElementById('phase-badge').innerHTML = `<span class="badge">${w.phase}</span><span class="badge">Tháng ${w.month}</span>`;
  const p = getProgress();
  let html = '';
  html += `<h2 class="week-title">Tuần ${w.week}: ${escapeHtml(w.title)}</h2>`;
  html += `<div class="week-meta">${w.review ? '🔁 Tuần ôn tập & kiểm tra' : '📖 Bài học chính'}</div>`;

  html += `<div class="done-toggle" id="doneToggle"><input type="checkbox" id="doneCheckbox" ${p[w.week]?'checked':''}> Đánh dấu tuần này đã hoàn thành</div>`;

  // Grammar
  html += `<div class="card"><h3>1. Ngữ pháp & Cấu trúc câu</h3>
    <div class="grammar-name">${escapeHtml(w.grammar.name)}</div>
    <p>${escapeHtml(w.grammar.explain)}</p>`;
  w.grammar.examples.forEach(ex=>{
    html += `<div class="example"><div class="exText"><div class="en">${escapeHtml(ex.en)}</div><div class="vi">${escapeHtml(ex.vi)}</div></div>
      <button class="speak-btn light" data-speak="${escapeHtml(ex.en)}">🔊</button></div>`;
  });
  if(w.patterns && w.patterns.length){
    html += `<div style="margin-top:10px;font-weight:600;color:var(--navy);font-size:13.5px;">Mẫu câu (pattern):</div>`;
    w.patterns.forEach(pt=>{ html += `<div class="pattern-box">${escapeHtml(pt)}</div>`; });
  }
  html += `</div>`;

  // Vocab
  if(w.vocab && w.vocab.length){
    html += `<div class="card"><h3>2. Từ vựng (bấm vào thẻ để lật xem nghĩa)</h3><div class="vocab-grid">`;
    w.vocab.forEach((v,i)=>{
      const speakWord = v.w.split('/')[0].split('-')[0].split('(')[0].trim();
      html += `<div class="flashcard" data-idx="${i}"><div class="flashcard-inner">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-front-row"><div class="w">${escapeHtml(v.w)}</div>
            <button class="speak-btn" data-speak="${escapeHtml(speakWord)}">🔊</button></div>
          <div class="ipa">${escapeHtml(v.ipa)}</div>
        </div>
        <div class="flashcard-face flashcard-back"><div class="vi">${escapeHtml(v.vi)}</div><div>${escapeHtml(v.ex_en)}</div></div>
      </div></div>`;
    });
    html += `</div></div>`;
  }

  // Quiz
  if(w.quiz && w.quiz.length){
    html += `<div class="card"><h3>3. Bài tập trắc nghiệm (tự chấm điểm)</h3><div id="quizBox">`;
    w.quiz.forEach((q,qi)=>{
      html += `<div class="quiz-q" data-qi="${qi}"><p class="qtext">${qi+1}. ${escapeHtml(q.q)}</p>`;
      q.options.forEach((opt,oi)=>{
        html += `<button class="opt" data-oi="${oi}">${escapeHtml(opt)}</button>`;
      });
      html += `<div class="quiz-explain">💡 ${escapeHtml(q.explain)}</div></div>`;
    });
    html += `<div class="quiz-score" id="quizScore"></div></div></div>`;
  }

  // Speaking + homework
  html += `<div class="card"><h3>4. Luyện nói</h3><div class="task-box speak">🗣️ ${escapeHtml(w.speaking)}</div>
    <div class="free-record-box">
      <button class="mic-btn" id="freeMicBtn">🎤 Ghi âm bài nói tự do (không chấm điểm, chỉ hiện lại những gì nghe được)</button>
      <div class="transcript-box" id="freeMicResult"></div>
    </div>
  </div>`;
  html += `<div class="card"><h3>5. Bài tập về nhà</h3><div class="task-box">✍️ ${escapeHtml(w.homework)}</div></div>`;

  // Speech check / pronunciation scoring
  const scItems = [];
  w.grammar.examples.forEach(ex=>scItems.push(ex.en));
  w.vocab.forEach(v=>{ const word = v.w.split('/')[0].split('-')[0].split('(')[0].trim(); if(word) scItems.push(word); });
  if(scItems.length){
    html += `<div class="card"><h3>6. Kiểm tra phát âm (nói và app tự chấm điểm)</h3>
      <div class="notice-box">⚠️ Tính năng này cần <b>micro</b> và <b>kết nối Internet</b> (khác với phát âm mẫu 🔊 — chạy offline). Hoạt động tốt nhất trên <b>Google Chrome</b>. Bấm "Nói", đợi trình duyệt hỏi quyền micro thì bấm Cho phép, rồi đọc to câu/từ bên trái.</div>
      <div id="scList">`;
    scItems.forEach((text,i)=>{
      html += `<div class="speak-check-row" data-idx="${i}">
        <div class="sc-target">${escapeHtml(text)}</div>
        <button class="mic-btn" data-target="${escapeHtml(text)}">🎤 Nói</button>
        <div class="sc-result" style="display:none;"></div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Links
  if(w.links && w.links.length){
    html += `<div class="card"><h3>7. Tài nguyên bên ngoài (video / podcast / từ điển)</h3><div class="links">`;
    w.links.forEach(l=>{ html += `<a href="${l.url}" target="_blank" rel="noopener">🔗 ${escapeHtml(l.label)}</a>`; });
    html += `</div></div>`;
  }

  document.getElementById('content').innerHTML = html;

  // wire up interactions
  document.getElementById('doneCheckbox').addEventListener('change', (e)=>{ setDone(w.week, e.target.checked); });
  document.querySelectorAll('.flashcard').forEach(fc=>{ fc.addEventListener('click', ()=>fc.classList.toggle('flipped')); });
  document.querySelectorAll('[data-speak]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{ e.stopPropagation(); speak(btn.dataset.speak); });
  });

  const freeMicBtn = document.getElementById('freeMicBtn');
  if(freeMicBtn){
    freeMicBtn.addEventListener('click', ()=>{ startFreeMic(freeMicBtn, document.getElementById('freeMicResult')); });
  }
  document.querySelectorAll('.speak-check-row .mic-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const row = btn.closest('.speak-check-row');
      startMicCheck(btn, btn.dataset.target, row.querySelector('.sc-result'));
    });
  });

  let score = {correct:0, total: w.quiz.length};
  document.querySelectorAll('.quiz-q').forEach(qEl=>{
    const qi = parseInt(qEl.dataset.qi);
    const qData = w.quiz[qi];
    let answered = false;
    qEl.querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(answered) return;
        answered = true;
        const oi = parseInt(btn.dataset.oi);
        qEl.querySelectorAll('.opt').forEach((b,i)=>{
          if(i===qData.answer) b.classList.add('correct');
          else if(i===oi) b.classList.add('wrong');
          b.disabled = true;
        });
        qEl.querySelector('.quiz-explain').classList.add('show');
        if(oi===qData.answer) score.correct++;
        const scoreEl = document.getElementById('quizScore');
        const answeredCount = document.querySelectorAll('.quiz-q').length - document.querySelectorAll('.quiz-q .opt:not([disabled])').length / qData.options.length;
        scoreEl.textContent = `Điểm hiện tại: ${score.correct}/${score.total} câu đã trả lời đúng (trong số đã làm)`;
      });
    });
  });
}

document.getElementById('search').addEventListener('input', (e)=>{ renderSidebar(e.target.value); });
document.getElementById('guideNavItem').addEventListener('click', ()=>{ renderGuide(); window.scrollTo(0,0); closeMobileSidebar(); });
document.getElementById('menuToggle').addEventListener('click', openMobileSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);

renderProgressSummary();
renderSidebar();
renderContent();

if('serviceWorker' in navigator && (location.protocol==='http:'||location.protocol==='https:')){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
