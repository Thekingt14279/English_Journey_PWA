<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>English Journey — Giáo án tiếng Anh 12 tháng</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#EEF1F5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0E1524" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eng Journey">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="fonts.css">
<style>
/* ============ Design tokens ============ */
:root{
  --bg:#F6F7FA;
  --surface:#FFFFFF;
  --surface-2:#F0F2F6;
  --ink:#1C2029;
  --ink-soft:#5B6272;
  --ink-faint:#9AA1B0;
  --line:#E7E9EF;
  --accent:#2E6E8E;
  --accent-strong:#1F4E66;
  --accent-soft:#E6EEF2;
  --success:#227A53;
  --success-soft:#E3F3EA;
  --danger:#B23B32;
  --danger-soft:#FBEAE7;
  --radius-s:8px; --radius-m:10px; --radius-l:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#12151D; --surface:#191D27; --surface-2:#222732; --ink:#E9ECF2; --ink-soft:#A7AEBC; --ink-faint:#6E7484;
    --line:#2B3140; --accent:#7BB8CF; --accent-strong:#A9D5E5; --accent-soft:rgba(123,184,207,.12);
    --success:#59C293; --success-soft:rgba(89,194,147,.14); --danger:#E08276; --danger-soft:rgba(224,130,118,.14);
  }
}
:root[data-theme="dark"]{
  --bg:#12151D; --surface:#191D27; --surface-2:#222732; --ink:#E9ECF2; --ink-soft:#A7AEBC; --ink-faint:#6E7484;
  --line:#2B3140; --accent:#7BB8CF; --accent-strong:#A9D5E5; --accent-soft:rgba(123,184,207,.12);
  --success:#59C293; --success-soft:rgba(89,194,147,.14); --danger:#E08276; --danger-soft:rgba(224,130,118,.14);
}
:root[data-theme="light"]{
  --bg:#F6F7FA; --surface:#FFFFFF; --surface-2:#F0F2F6; --ink:#1C2029; --ink-soft:#5B6272; --ink-faint:#9AA1B0;
  --line:#E7E9EF; --accent:#2E6E8E; --accent-strong:#1F4E66; --accent-soft:#E6EEF2;
  --success:#227A53; --success-soft:#E3F3EA; --danger:#B23B32; --danger-soft:#FBEAE7;
}

*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:'Public Sans','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  font-size:15.5px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace; font-variant-numeric:tabular-nums;}
h1,h2,h3{font-family:'Archivo',sans-serif; font-weight:700; letter-spacing:-0.01em; text-wrap:balance; margin:0;}
a{color:var(--accent-strong);}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

#app{display:flex; min-height:100vh;}

/* ============ Sidebar ============ */
#sidebar{
  width:290px; flex-shrink:0; background:var(--surface); color:var(--ink); border-right:1px solid var(--line);
  overflow-y:auto; max-height:100vh; position:sticky; top:0;
  display:flex; flex-direction:column;
}
.brand{display:flex; align-items:center; gap:11px; padding:22px 20px 18px;}
.brand-mark{
  width:34px; height:34px; border-radius:9px; background:var(--accent-soft); color:var(--accent-strong);
  display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
}
.brand-name{font-family:'Archivo',sans-serif; font-weight:700; font-size:16.5px; color:var(--ink); letter-spacing:-0.01em;}
.brand-tag{font-size:11.5px; color:var(--ink-faint); margin-top:1px;}

.journey-progress{padding:0 20px 16px;}
.jp-row{display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:var(--ink-faint); margin-bottom:8px;}
.jp-row .mono{color:var(--accent-strong); font-weight:600; font-size:12.5px;}
.jp-track{height:5px; border-radius:4px; background:var(--surface-2); overflow:hidden;}
.jp-fill{height:100%; background:var(--accent); border-radius:4px; transition:width .4s ease; width:0%;}

.pinned-item{
  margin:0 20px 8px; padding:10px 12px; font-size:13px; cursor:pointer; color:var(--accent-strong);
  font-weight:600; border:none; border-radius:var(--radius-s);
  display:flex; align-items:center; gap:9px; background:var(--accent-soft); text-align:left; width:calc(100% - 40px);
}
.pinned-item:hover{filter:brightness(0.96);}
.pinned-item.active{background:var(--accent); color:var(--surface);}
.pin-icon{font-size:14px;}

#nav-list{padding-bottom:24px; flex:1;}
.phase-block{border-top:1px solid var(--line); margin-top:10px; padding-top:10px;}
.phase-block:first-child{border-top:none;}
.phase-title{
  padding:6px 20px 4px; font-size:11px; font-weight:700; color:var(--ink-faint);
  text-transform:uppercase; letter-spacing:.05em;
}
.month-title{
  padding:9px 20px 3px; font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.06em;
}
.week-item{
  padding:7px 12px 7px 17px; font-size:13.5px; cursor:pointer; display:flex; align-items:center; gap:9px; color:var(--ink-soft);
  margin:1px 8px; border-radius:8px; border-left:3px solid transparent;
}
.week-item:hover{background:var(--surface-2);}
.week-item.active{background:var(--accent-soft); color:var(--accent-strong); font-weight:700; border-left-color:var(--accent);}
.w-status{
  width:17px; height:17px; border-radius:50%; border:1.5px solid var(--line); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--ink-faint);
}
.w-status.done{background:var(--success); border-color:var(--success); color:#fff; font-weight:700;}
.week-item.review .w-label b{color:var(--accent-strong);}
.w-label b{font-weight:700; margin-right:5px; font-size:12px; opacity:.65;}

/* ============ Main ============ */
#main{flex:1; min-width:0; padding:26px 44px 90px; max-width:860px;}
.topbar{display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:24px; flex-wrap:wrap;}
.topbar-left{display:flex; align-items:center; gap:12px;}
#menuToggle{display:none;}
.badge{
  display:inline-flex; align-items:center; color:var(--ink-faint);
  font-size:12px; font-weight:600; margin-right:10px;
}
.badge:not(:last-child)::after{content:"·"; margin-left:10px; color:var(--line);}
.top-actions{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
.rate-toggle{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-faint);}
.rate-toggle button{
  border:1px solid var(--line); background:var(--surface); color:var(--ink-soft); border-radius:20px;
  padding:5px 12px; font-size:12px; cursor:pointer;
}
.rate-toggle button.active{background:var(--ink); color:var(--bg); border-color:var(--ink);}
#search{
  padding:9px 14px; border:1px solid var(--line); border-radius:20px; font-size:13px; width:190px;
  background:var(--surface); color:var(--ink);
}
#search:focus{border-color:var(--accent);}

/* ============ Week header ============ */
.week-head{margin-bottom:28px;}
.week-head-top{display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:10px;}
.eyebrow{font-size:12px; color:var(--accent-strong); font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
.week-head h1{font-size:27px; color:var(--ink); line-height:1.25; margin-bottom:6px;}
.week-head-sub{font-size:13px; color:var(--ink-faint);}
.done-pill{
  display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:20px; border:1px solid var(--line);
  cursor:pointer; font-size:13px; font-weight:600; color:var(--ink-soft); flex-shrink:0; background:var(--surface);
}
.done-pill:has(input:checked){background:var(--success-soft); border-color:var(--success); color:var(--success);}
.done-pill input{width:15px; height:15px; accent-color:var(--success); cursor:pointer;}

/* ============ Cards & section heads ============ */
.card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-l);
  padding:24px 26px; margin-bottom:18px;
}
.sec-head{margin-bottom:16px; border-left:3px solid var(--accent); padding-left:13px;}
.sec-head h3{font-size:17px; color:var(--ink);}
.sec-chip, .sec-icon{display:none;}

.grammar-name{font-weight:700; color:var(--accent-strong); margin-bottom:8px; font-size:14.5px;}
.card > p{color:var(--ink-soft); margin:0 0 14px;}

.example{
  display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  padding:12px 0; border-bottom:1px solid var(--line);
}
.example:last-of-type{border-bottom:none; padding-bottom:0;}
.example .exText{flex:1;}
.example .en{font-weight:600; color:var(--ink);}
.example .vi{color:var(--ink-faint); font-size:13px; margin-top:2px;}

.pattern-label{margin-top:16px; font-weight:700; color:var(--ink-faint); font-size:11.5px; letter-spacing:.05em; text-transform:uppercase;}
.pattern-box{
  border-left:2px solid var(--accent); color:var(--ink-soft);
  padding:4px 0 4px 14px; margin:10px 0 0; font-size:13.5px;
}

/* speak buttons */
.speak-btn{
  border:1px solid var(--line); background:var(--surface); color:var(--ink-soft); border-radius:50%; width:30px; height:30px; font-size:13px;
  cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;
}
.speak-btn:hover{border-color:var(--accent); color:var(--accent-strong);}
.speak-btn.light{background:none;}

/* ============ Vocab flashcards ============ */
.vocab-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:11px;}
.flashcard{perspective:1000px; height:112px; cursor:pointer;}
.flashcard-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-face{
  position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:var(--radius-m);
  padding:13px; display:flex; flex-direction:column; justify-content:center; border:1px solid var(--line);
}
.flashcard-front{background:var(--surface);}
.flashcard-back{background:var(--accent-soft); border-color:var(--accent); transform:rotateY(180deg); font-size:13px; color:var(--ink);}
.flashcard-front-row{display:flex; align-items:flex-start; justify-content:space-between; gap:6px;}
.flashcard-front .w{font-family:'Archivo',sans-serif; font-size:15.5px; font-weight:700; color:var(--ink); line-height:1.2;}
.flashcard-front .ipa{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-faint); margin-top:7px;}
.flashcard-back .vi{font-weight:700; margin-bottom:4px; color:var(--accent-strong);}

/* ============ Quiz ============ */
.quiz-q{margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid var(--line);}
.quiz-q:last-child{border-bottom:none; margin-bottom:0; padding-bottom:0;}
.quiz-q p.qtext{font-weight:700; margin:0 0 10px; color:var(--ink);}
.opt{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left; padding:10px 13px; margin-bottom:7px;
  border:1px solid var(--line); border-radius:var(--radius-m); background:var(--surface); cursor:pointer; font-size:14px; color:var(--ink);
}
.opt:hover:not(:disabled){border-color:var(--accent);}
.opt.correct{background:var(--success-soft); border-color:var(--success); color:var(--success); font-weight:700;}
.opt.wrong{background:var(--danger-soft); border-color:var(--danger); color:var(--danger); font-weight:700;}
.opt:disabled{cursor:default;}
.opt .mono{display:none;}
.quiz-explain{font-size:13px; color:var(--ink-faint); margin-top:6px; display:none; padding:9px 0 0;}
.quiz-explain.show{display:block;}
.quiz-score{font-weight:700; color:var(--accent-strong); margin-top:12px; font-size:13.5px;}

/* ============ Task boxes ============ */
.task-box{background:var(--surface-2); border-left:3px solid var(--accent); padding:13px 16px; border-radius:var(--radius-s); margin-bottom:10px; color:var(--ink);}
.task-box.speak{border-left-color:var(--success);}
.free-record-box{margin-top:12px;}
.transcript-box{margin-top:10px; background:var(--surface-2); border-radius:var(--radius-m); padding:11px 14px; font-size:13.5px; display:none; color:var(--ink);}

/* ============ Mic check ============ */
.notice-box{
  background:var(--surface-2); border-left:3px solid var(--accent); padding:11px 15px; border-radius:var(--radius-s);
  font-size:13px; color:var(--ink-soft); margin-bottom:16px;
}
.speak-check-row{display:flex; flex-wrap:wrap; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line);}
.speak-check-row:last-child{border-bottom:none;}
.sc-target{flex:1; font-size:14px; color:var(--ink); min-width:140px;}
.mic-btn{
  border:1px solid var(--line); background:var(--surface); color:var(--ink); border-radius:20px; padding:8px 16px;
  font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.mic-btn:hover{border-color:var(--accent); color:var(--accent-strong);}
.mic-btn.recording{background:var(--danger); border-color:var(--danger); color:#fff; animation:pulse 1s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(178,59,50,.4);}70%{box-shadow:0 0 0 9px rgba(178,59,50,0);}100%{box-shadow:0 0 0 0 rgba(178,59,50,0);}}
.sc-result{width:100%; margin-top:4px; background:var(--surface-2); border-radius:var(--radius-m); padding:11px 14px; font-size:13.5px; color:var(--ink);}
.sc-score{display:inline-block; font-weight:700; padding:3px 11px; border-radius:12px; margin-bottom:7px; font-size:12.5px;}
.sc-score.good{background:var(--success-soft); color:var(--success);}
.sc-score.mid{background:var(--accent-soft); color:var(--accent-strong);}
.sc-score.bad{background:var(--danger-soft); color:var(--danger);}
.w-match{color:var(--success); font-weight:700;}
.w-missing{color:var(--ink-faint); text-decoration:line-through;}
.w-extra{color:var(--danger); text-decoration:underline;}

/* ============ Dialogue ============ */
.dialogue-box{display:flex; flex-direction:column; gap:10px;}
.dlg-line{display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:var(--radius-m); background:var(--surface-2); transition:background .15s;}
.dlg-line.dlg-playing{background:var(--accent-soft); box-shadow:0 0 0 1px var(--accent) inset;}
.dlg-line.dlg-B{background:var(--surface); border:1px solid var(--line);}
.dlg-line.dlg-B.dlg-playing{background:var(--accent-soft);}
.dlg-speaker{
  width:26px; height:26px; border-radius:50%; background:var(--ink); color:var(--bg); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; margin-top:1px;
}
.dlg-line.dlg-B .dlg-speaker{background:var(--accent); color:var(--surface);}
.dlg-line.dlg-C .dlg-speaker{background:var(--success); color:#fff;}
.dlg-text{flex:1;}
.dlg-en{font-weight:600; color:var(--ink);}
.dlg-vi{color:var(--ink-faint); font-size:13px; margin-top:2px;}
.dlg-play-all{margin-top:4px; align-self:flex-start;}

/* ============ Links / resources ============ */
.links{display:flex; flex-direction:column; gap:7px;}
.links a{
  display:flex; align-items:center; gap:10px; padding:11px 14px; color:var(--ink);
  border-radius:var(--radius-m); text-decoration:none; font-size:13.5px; border:1px solid var(--line);
}
.links a:hover{border-color:var(--accent);}
.links a .go{margin-left:auto; color:var(--ink-faint); font-size:12px;}

/* ============ IPA guide table ============ */
.guide-table{width:100%; border-collapse:collapse; margin:12px 0 4px; font-size:13.5px;}
.guide-table th,.guide-table td{border-bottom:1px solid var(--line); padding:10px 10px; text-align:left; vertical-align:top;}
.guide-table th{color:var(--ink-faint); font-size:11px; text-transform:uppercase; letter-spacing:.05em; font-weight:700;}
.guide-table td.sym{font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--accent-strong); white-space:nowrap;}
.guide-table-wrap{overflow-x:auto;}

footer.app-footer{text-align:center; color:var(--ink-faint); font-size:11.5px; margin-top:44px; line-height:1.7;}

/* ============ Mobile ============ */
#sidebarOverlay{display:none;}
@media (max-width:860px){
  #menuToggle{
    display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px;
    border:1px solid var(--line); background:var(--surface); border-radius:10px; font-size:18px; cursor:pointer; color:var(--ink);
  }
  #search{width:130px;}
  #sidebar{
    position:fixed; top:0; left:0; height:100%; max-height:100%; width:84%; max-width:300px; z-index:1000;
    transform:translateX(-100%); transition:transform .25s ease; box-shadow:2px 0 20px rgba(0,0,0,.15);
  }
  #sidebar.open{transform:translateX(0);}
  #sidebarOverlay.open{display:block; position:fixed; inset:0; background:rgba(10,15,25,.4); z-index:999;}
  #main{padding:16px 16px 80px;}
  .week-head h1{font-size:22px;}
  .week-head-top{flex-wrap:wrap;}
  .card{padding:18px 17px;}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
}
@media print{ #sidebar,.done-toggle,.links,#search,#menuToggle{display:none;} #main{max-width:100%;} }
</style>
</head>
<body>
<div id="app">
  <div id="sidebarOverlay"></div>
  <nav id="sidebar">
    <div class="brand">
      <div class="brand-mark">✈</div>
      <div>
        <div class="brand-name">English Journey</div>
        <div class="brand-tag">Lộ trình 12 tháng · Beginner → Giao tiếp</div>
      </div>
    </div>
    <div class="journey-progress">
      <div class="jp-row"><span>Hành trình của bạn</span><span id="progress-count" class="mono">0/48</span></div>
      <div class="jp-track"><div class="jp-fill" id="progress-bar-inner"></div></div>
    </div>
    <button class="pinned-item" id="guideNavItem"><span class="pin-icon">🔊</span>Hướng dẫn đọc phiên âm &amp; trọng âm</button>
    <div id="nav-list"></div>
  </nav>

  <main id="main">
    <div class="topbar">
      <div class="topbar-left">
        <button id="menuToggle" aria-label="Mở danh sách tuần">☰</button>
        <div id="phase-badge"></div>
      </div>
      <div class="top-actions">
        <div class="rate-toggle">Tốc độ đọc:
          <button id="rateSlow" class="active">Chậm</button>
          <button id="rateNormal">Bình thường</button>
        </div>
        <input id="search" type="text" placeholder="Tìm tuần / chủ đề / từ...">
      </div>
    </div>
    <div id="content"></div>
    <footer class="app-footer">Giáo án tiếng Anh 12 tháng — Dùng offline, tiến độ lưu tại máy bạn.<br>Tính năng 🎤 chấm điểm phát âm cần Internet; mọi tính năng khác chạy offline hoàn toàn.</footer>

, "is", "are"], "answer": 1, "explain": "Ngôi thứ 3 số ít dùng is."}, {"q": "'___ your parents at home?'", "options": ["Is", "Are", "Am"], "answer": 1, "explain": "your parents là số nhiều nên dùng Are."}, {"q": "'Bà tôi 70 tuổi và bà rất hiền' - chọn đúng:", "options": ["My grandmother is 70 and she is kind.", "My grandmother are 70 and she kind.", "My grandmother is 70 and she kind."], "answer": 0, "explain": "is + tính từ; câu đầy đủ cần động từ to be."}, {"q": "'Chìa khóa của tôi màu đỏ' dùng:", "options": ["My key are red.", "My key is red.", "My key red."], "answer": 1, "explain": "key số ít dùng is."}, {"q": "Câu hỏi đúng cho 'Bạn có phải là học sinh không?':", "options": ["Are you a student?", "Is you a student?", "You are a student?"], "answer": 0, "explain": "Are + you + a student?"}, {"q": "'Tôi không mệt' dùng:", "options": ["I not tired.", "I am not tired.", "I don't tired."], "answer": 1, "explain": "to be phủ định: am/is/are + not."}], "speaking": "Bài kiểm tra nói 1 phút: Tự giới thiệu đầy đủ bản thân + gia đình + 3 đồ vật yêu thích.", "homework": "Ghi âm bài nói 1 phút, nghe lại và so sánh với tuần 1 để thấy tiến bộ.", "links": [{"label": "Video YouTube: English self introduction practice beginner", "url": "https://www.youtube.com/results?search_query=English%20self%20introduction%20practice%20beginner"}], "dialogue": {"title": "Tổng ôn: Giới thiệu bản thân, gia đình và đồ vật", "lines": [{"speaker": "A", "en": "Hello! Good morning. My name is Mai.", "vi": "Xin chào! Chào buổi sáng. Tôi tên là Mai."}, {"speaker": "B", "en": "Good morning, Mai. Nice to meet you. I'm Nam.", "vi": "Chào buổi sáng, Mai. Rất vui được gặp bạn. Tôi là Nam."}, {"speaker": "A", "en": "Nice to meet you too. Is this your family photo?", "vi": "Tôi cũng rất vui được gặp bạn. Đây là ảnh gia đình bạn à?"}, {"speaker": "B", "en": "Yes, these are my parents and my sister.", "vi": "Vâng, đây là bố mẹ tôi và em gái tôi."}, {"speaker": "A", "en": "They look very kind. By the way, is this your key?", "vi": "Trông họ rất hiền. Nhân tiện, đây có phải chìa khóa của bạn không?"}, {"speaker": "B", "en": "Oh yes, thank you! I'm not tired now, let's go.", "vi": "Ồ vâng, cảm ơn bạn! Bây giờ tôi không mệt nữa, đi thôi."}]}}, {"week": 5, "month": 2, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Thói quen hằng ngày", "review": false, "grammar": {"name": "Thì hiện tại đơn (khẳng định)", "explain": "Dùng để nói thói quen, sự thật. Chủ ngữ He/She/It thêm 's/es' vào động từ. I/You/We/They giữ nguyên động từ.", "examples": [{"en": "I get up at 6 a.m.", "vi": "Tôi thức dậy lúc 6 giờ sáng."}, {"en": "She works in a bank.", "vi": "Cô ấy làm việc ở ngân hàng."}, {"en": "We have breakfast together.", "vi": "Chúng tôi ăn sáng cùng nhau."}]}, "vocab": [{"w": "wake up / get up", "ipa": "", "vi": "thức dậy / ngồi dậy", "ex_en": "I wake up at 6 a.m.", "ex_vi": "Tôi thức dậy lúc 6 giờ sáng."}, {"w": "brush teeth", "ipa": "", "vi": "đánh răng", "ex_en": "I brush my teeth every morning.", "ex_vi": "Tôi đánh răng mỗi sáng."}, {"w": "have breakfast/lunch/dinner", "ipa": "", "vi": "ăn sáng/trưa/tối", "ex_en": "We have dinner at 7 p.m.", "ex_vi": "Chúng tôi ăn tối lúc 7 giờ."}, {"w": "go to work/school", "ipa": "", "vi": "đi làm/đi học", "ex_en": "He goes to work by bus.", "ex_vi": "Anh ấy đi làm bằng xe buýt."}, {"w": "study", "ipa": "/ˈstʌdi/", "vi": "học", "ex_en": "She studies English every day.", "ex_vi": "Cô ấy học tiếng Anh mỗi ngày."}, {"w": "watch TV", "ipa": "", "vi": "xem tivi", "ex_en": "I watch TV at night.", "ex_vi": "Tôi xem tivi vào buổi tối."}, {"w": "go to bed", "ipa": "", "vi": "đi ngủ", "ex_en": "I go to bed at 10 p.m.", "ex_vi": "Tôi đi ngủ lúc 10 giờ tối."}, {"w": "every day", "ipa": "/ˈevri deɪ/", "vi": "mỗi ngày", "ex_en": "I exercise every day.", "ex_vi": "Tôi tập thể dục mỗi ngày."}, {"w": "take a shower", "ipa": "/teɪk ə ˈʃaʊər/", "vi": "tắm", "ex_en": "I take a shower every morning.", "ex_vi": "Tôi tắm mỗi sáng."}, {"w": "cook dinner", "ipa" aker": "A", "en": "What time do you wake up every day?", "vi": "Bạn thức dậy lúc mấy giờ mỗi ngày?"}, {"speaker": "B", "en": "I wake up at 6 a.m. and take a shower.", "vi": "Tôi thức dậy lúc 6 giờ sáng và đi tắm."}, {"speaker": "A", "en": "Do you exercise in the morning?", "vi": "Bạn có tập thể dục vào buổi sáng không?"}, {"speaker": "B", "en": "Yes, I work out for 30 minutes, then I have breakfast.", "vi": "Có, tôi tập thể dục 30 phút, sau đó ăn sáng."}, {"speaker": "A", "en": "What do you do after work?", "vi": "Bạn làm gì sau giờ làm?"}, {"speaker": "B", "en": "I cook dinner and relax by watching TV.", "vi": "Tôi nấu bữa tối và thư giãn bằng cách xem tivi."}]}}, {"week": 6, "month": 2, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Thời gian & Lịch", "review": false, "grammar": {"name": "Cách nói giờ, ngày trong tuần, tháng", "explain": "Nói giờ: It's + giờ + o'clock / half past / quarter. Ngày trong tuần và tháng luôn viết hoa chữ cái đầu.", "examples": [{"en": "It's seven o'clock.", "vi": "Bây giờ là 7 giờ."}, {"en": "It's half past seven.", "vi": "Bây giờ là 7 giờ rưỡi."}, {"en": "Today is Monday.", "vi": "Hôm nay là thứ Hai."}]}, "vocab": [{"w": "Monday-Sunday", "ipa": "", "vi": "Thứ Hai - Chủ Nhật", "ex_en": "My class is on Monday.", "ex_vi": "Lớp của tôi vào thứ Hai."}, {"w": "January-December", "ipa": "", "vi": "Tháng 1 - Tháng 12", "ex_en": "My birthday is in July.", "ex_vi": "Sinh nhật tôi vào tháng Bảy."}, {"w": "o'clock", "ipa": "/əˈklɒk/", "vi": "giờ đúng", "ex_en": "It's three o'clock.", "ex_vi": "Bây giờ là 3 giờ."}, {"w": "half past", "ipa": "", "vi": "...rưỡi", "ex_en": "It's half past five.", "ex_vi": "Bây giờ là 5 giờ rưỡi."}, {"w": "quarter past/to", "ipa": "", "vi": "15 phút hơn/kém", "ex_en": "It's quarter to nine.", "ex_vi": "Bây giờ là 9 giờ kém 15."}, {"w": "morning/afternoon/evening/night", "ipa": "", "vi": "sáng/chiều/tối/đêm", "ex_en": "I study in the evening.", "ex_vi": "Tôi học vào buổi tối."}, {"w": "today/tomorrow/yesterday", "ipa": "", "vi": "hôm nay/ngày mai/hôm qua", "ex_en": "Today is Sunday.", "ex_vi": "Hôm nay là Chủ Nhật."}, {"w": "what time", "ipa": "", "vi": "mấy giờ", "ex_en": "What time is it now?", "ex_vi": "Bây giờ là mấy giờ?"}, {"w": "What's the date today?", "ipa": "/wɒts ðə deɪt/", "vi": "hôm nay là ngày mấy", "ex_en": "What's the date today? - It's July 12th.", "ex_vi": "Hôm nay là ngày mấy? - Ngày 12 tháng 7."}, {"w": "week / month / year", "ipa": "/wiːk/ /mʌnθ/ /jɪr/", "vi": "tuần / tháng / năm", "ex_en": "I study English every week.", "ex_vi": "Tôi học tiếng Anh mỗi tuần."}, {"w": "early / late", "ipa": "/ˈɜːrli/ /leɪt/", "vi": "sớm / muộn", "ex_en": "I don't want to be late.", "ex_vi": "Tôi không muốn bị trễ."}, {"w": "on time", "ipa": "/ɒn taɪm/", "vi": "đúng giờ", "ex_en": "The train arrived on time.", "ex_vi": "Tàu đến đúng giờ."}], "patterns": ["What time is it? - It's ...", "What day is it today? - It's ..."], "quiz": [{"q": "'Bây giờ là 3 giờ' dịch đúng là:", "options": ["It's three o'clock.", "It is three day.", "Three o'clock is now."], "answer": 0, "explain": "It's + giờ + o'clock."}, {"q": "Ngày sau Thứ Ba (Tuesday) là:", "options": ["Monday", "Wednesday", "Thursday"], "answer": 1, "explain": "Wednesday = Thứ Tư."}, {"q": "'Sinh nhật tôi vào tháng 7':", "options": ["My birthday is in July.", "My birthday is on July.", "My birthday July."], "answer": 0, "explain": "Dùng 'in' với tháng."}, {"q": "Hỏi ngày tháng đúng:", "options": ["What time is it?", "What's the date today?", "What day is it?"], "answer": 1, "explain": "What's the date today? hỏi ngày cụ thể."}, {"q": "'Đúng giờ' tiếng Anh là:", "options": ["on time", "early", "late"], "answer": 0, "explain": "on time = đúng giờ."}, {"q": "'Tôi không muốn bị trễ':", "options": ["I don't want to be late.", "I don't want to be early.", "I don't want on time."], "answer": 0, "explain": "late = trễ, muộn."}], "speaking": "Hỏi và trả lời giờ giấc với AI/bạn học: hỏi 5 câu 'What time...?' về lịch trình.", "homework": "Viết lịch làm việc/học tập trong tuần (7 ngày) bằng tiếng Anh.", "links": [{"label": "Video YouTube: telling time in English for beginners", "url": "https://www.youtube.com/results?search_query=telling%20time%20in%20English%20for%20beginners"}, {"label": "Từ điển phát âm Cambridge", "url": "https://dictionary.cambridge.org/"}], "dialogue": {"title": "Hẹn giờ gặp mặt", "lines": [{"speaker": "A", "en": "What's the date today?", "vi": "Hôm nay là ngày mấy?"}, {"speaker": "B", "en": "It's July 12th, Sunday.", "vi": "Hôm nay ngày 12 tháng 7, Chủ Nhật."}, {"speaker": "A", "en": "Great. What time shall we meet next week?", "vi": "Tốt. Tuần sau chúng ta gặp lúc mấy giờ?"}, {"speaker": "B", "en": "How about 9 o'clock? Let's not be late.", "vi": "9 giờ được không? Đừng để bị trễ nhé."}, {"speaker": "A", "en": "Sure, I'll be on time. See you then!", "vi": "Được, tôi sẽ đến đúng giờ. Hẹn gặp lại!"}]}}, {"week": 7, "month": 2, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Sở thích", "review": false, "grammar": {"name": "Hiện tại đơn phủ định/nghi vấn, like/love/hate + V-ing", "explain": "Phủ định: don't/doesn't + động từ nguyên mẫu. Nghi vấn: Do/Does + chủ ngữ + động từ? Sau like/love/hate thường thêm V-ing để nói sở thích.", "examples": [{"en": "I don't like coffee.", "vi": "Tôi không thích cà phê."}, {"en": "Does she like music?", "vi": "Cô ấy có thích âm nhạc không?"}, {"en": "I love reading books.", "vi": "Tôi thích đọc sách."}]}, "vocab": [{"w": "like / love / hate", "ipa": "", "vi": "thích / rất thích / ghét", "ex_en": "I love watching movies.", "ex_vi": "Tôi rất thích xem phim."}, {"w": "read books", "ipa": "", "vi": "đọc sách", "ex_en": "She likes reading books.", "ex_vi": "Cô ấy thích đọc sách."}, {"w": "listen to music", "ipa": "", "vi": "nghe nhạc", "ex_en": "I listen to music every day.", "ex_vi": "Tôi nghe nhạc mỗi ngày."}, {"w": "play sports/football", "ipa": "", "vi": "chơi thể thao/bóng đá", "ex_en": "He plays football on weekends.", "ex_vi": "Anh ấy chơi bóng đá vào cuối tuần."}, {"w": "cook", "ipa": "/kʊk/", "vi": "nấu ăn", "ex_en": "My mother loves cooking.", "ex_vi": "Mẹ tôi rất thích nấu ăn."}, {"w": "travel", "ipa": "/ˈtrævəl/", "vi": "du lịch", "ex_en": "We like traveling.", "ex_vi": "Chúng tôi thích du lịch."}, {"w": "swim / swimming", "ipa": "", "vi": "bơi / bơi lội", "ex_en": "I don't like swimming.", "ex_vi": "Tôi không thích bơi lội."}, {"w": "free time", "ipa": "", "vi": "thời gian rảnh", "ex_en": "What do you do in your free time?", "ex_vi": "Bạn làm gì lúc rảnh?"}, {"w": "draw / paint", "ipa": "/drɔː/ /peɪnt/", "vi": "vẽ / vẽ tranh (sơn)", "ex_en": "She loves painting.", "ex_vi": "Cô ấy rất thích vẽ tranh."}, {"w": "play video games", "ipa": "/pleɪ ˈvɪdioʊ ɡeɪmz/", "vi": "chơi trò chơi điện tử", "ex_en": "My brother plays video games every day.", "ex_vi": "Em trai tôi chơi game mỗi ngày."}, {"w": "take photos", "ipa": "/teɪk ˈfoʊtoʊz/", "vi": "chụp ảnh", "ex_en": "I like taking photos of food.", "ex_vi": "Tôi thích chụp ảnh đồ ăn."}, {"w": "go shopping", "ipa": "/ɡoʊ ˈʃɒpɪŋ/", "vi": "đi mua sắm", "ex_en": "We go shopping on weekends.", "ex_vi": "Chúng tôi đi mua sắm vào cuối tuần."}], "patterns": ["Do/Does + S + V? - Yes, I do./No, I don't.", "S + don't/doesn't + V"], "quiz": [{"q": "Câu hỏi đúng: 'Anh ấy có thích bóng đá không?'", "options": ["Does he like football?", "Do he like football?", "Does he likes football?"], "answer": 0, "explain": "He dùng Does + V nguyên mẫu."}, {"q": "Phủ định đúng: 'Tôi không thích cà phê.'", "options": ["I no like coffee.", "I don't like coffee.", "I doesn't like coffee."], "answer": 1, "explain": "I dùng don't."}, {"q": "'Cô ấy thích đọc sách' - dùng đúng:", "options": ["She likes read books.", "She likes reading books.", "She like reading books."], "answer": 1, "explain": "like + V-ing, ngôi 3 thêm s."}, {"q": "'Cô ấy thích vẽ tranh':", "options": ["She likes paint.", "She likes painting.", "She like painting."], "answer": 1, "explain": "like + V-ing, ngôi 3 thêm s."}, {"q": "'Chụp ảnh' tiếng Anh là:", "options": ["take photos", "play video games", "go shopping"], "answer": 0, "explain": "take photos = chụp ảnh."}, {"q": "'Chúng tôi đi mua sắm vào cuối tuần':", "options": ["We go shopping on weekends.", "We going shopping on weekends.", "We goes shopping on weekends."], "answer": 0, "explain": "we + động từ nguyên mẫu (hiện tại đơn, không thêm s)."}], "speaking": "Nói về 3 sở thích của bạn và lý do tại sao (dùng because).", "homework": "Viết đoạn văn ngắn 5 câu về sở thích cá nhân.", "links": [{"label": "Video YouTube: talking about hobbies in English beginner", "url": "https://www.youtube.com/results?search_query=talking%20about%20hobbies%20in%20English%20beginner"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Nói về sở thích cuối tuần", "lines": [{"speaker": "A", "en": "What do you usually do on weekends?", "vi": "Cuối tuần bạn thường làm gì?"}, {"speaker": "B", "en": "I love painting and taking photos. What about you?", "vi": "Tôi rất thích vẽ tranh và chụp ảnh. Còn bạn?"}, {"speaker": "A", "en": "I usually play video games or go shopping.", "vi": "Tôi thường chơi game hoặc đi mua sắm."}, {"speaker": "B", "en": "Do you like reading books too?", "vi": "Bạn có thích đọc sách không?"}, {"speaker": "A", "en": "Not really, I prefer listening to music.", "vi": "Không hẳn, tôi thích nghe nhạc hơn."}]}}, {"week": 8, "month": 2, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Ôn tập & Kiểm tra tháng 2", "review": true, "grammar": {"name": "Ôn tập tổng hợp Tuần 5-7", "explain": "Ôn thì hiện tại đơn (khẳng định/phủ định/nghi vấn), cách nói giờ/ngày/tháng, sở thích với like/love/hate + V-ing.", "examples": [{"en": "I usually get up at 6 and I like reading books in my free time.", "vi": "Tôi thường thức dậy lúc 6 giờ và tôi thích đọc sách lúc rảnh."}]}, "vocab": [{"w": "wake up / get up", "ipa": "", "vi": "thức dậy / ngồi dậy", "ex_en": "I wake up at 6 a.m.", "ex_vi": "Tôi thức dậy lúc 6 giờ sáng."}, {"w": "brush teeth", "ipa": "", "vi": "đánh răng", "ex_en": "I brush my teeth every morning.", "ex_vi": "Tôi đánh răng mỗi sáng."}, {"w": "have breakfast/lunch/dinner", "ipa": "", "vi": "ăn sáng/trưa/tối", "ex_en": "We have dinner at 7 p.m.", "ex_vi": "Chúng tôi ăn tối lúc 7 giờ."}, {"w": "go to work/school", "ipa": "", "vi": "đi làm/đi học", "ex_en": "He goes to work by bus.", "ex_vi": "Anh ấy đi làm bằng xe buýt."}, {"w": "Monday-Sunday", "ipa": "", "vi": "Thứ Hai - Chủ Nhật", "ex_en": "My class is on Monday.", "ex_vi": "Lớp của tôi vào thứ Hai."}, {"w": "January-December", "ipa": "", "vi": "Tháng 1 - Tháng 12", "ex_en": "My birthday is in July.", "ex_vi": "Sinh nhật tôi vào tháng Bảy."}, {"w": "o'clock", "ipa": "/əˈklɒk/", "vi": "giờ đúng", "ex_en": "It's three o'clock.", "ex_vi": "Bây giờ là 3 giờ."}, {"w": "half past", "ipa": "", "vi": "...rưỡi", "ex_en": "It's half past five.", "ex_vi": "Bây giờ là 5 giờ rưỡi."}, {"w": "like / love / hate", "ipa": "", "vi": "thích / rất thích / ghét", "ex_en": "I love watching movies.", "ex_vi": "Tôi rất thích xem phim."}, {"w": "read books", "ipa": "", "vi": "đọc sách", "ex_en": "She likes reading books.", "ex_vi": "Cô ấy thích đọc sách."}, {"w": "listen to music", "ipa": "", "vi": "nghe nhạc", "ex_en": "I listen to music every day.", "ex_vi": "Tôi nghe nhạc mỗi ngày."}, {"w": "play sports/football", "ipa": "", "vi": "chơi thể thao/bóng đá", "ex_en": "He plays football on weekends.", "ex_vi": "Anh ấy chơi bóng đá vào cuối tuần."}], "patterns": ["Ôn tất cả mẫu câu Tuần 5-7"], "quiz": [{"q": "'What time ___ you get up?'", "options": ["do", "does", "is"], "answer": 0, "explain": "Do + you."}, {"q": "'She ___ like fish.'", "options": ["don't", "doesn't", "isn't"], "answer": 1, "explain": "She dùng doesn't."}, {"q": "'Cô ấy thường thức dậy lúc 6 giờ và tập thể dục':", "options": ["She usually wake up at 6 and exercise.", "She usually wakes up at 6 and exercises.", "She usually waking up at 6."], "answer": 1, "explain": "ngôi 3 số ít thêm 's' cho cả 2 động từ."}, {"q": "'Hôm nay là ngày mấy?' tiếng Anh:", "options": ["What time is it?", "What's the date today?", "What do you do?"], "answer": 1, "explain": "hỏi ngày tháng dùng What's the date."}, {"q": "'Tôi thích chụp ảnh vào cuối tuần':", "options": ["I like take photos on weekends.", "I like taking photos on weekends.", "I likes taking photos."], "answer": 1, "explain": "like + V-ing."}, {"q": "'Đừng trễ, hãy đến đúng giờ':", "options": ["Don't be late, come on time.", "Don't late, come on time.", "Not be late, come on time."], "answer": 0, "explain": "Don't be + tính từ (mệnh lệnh phủ định)."}], "speaking": "Kể về một ngày của bạn kèm sở thích, dùng cả 3 dạng câu (khẳng định/phủ định/nghi vấn).", "homework": "Ghi âm bài nói 'Một ngày của tôi' 1.5-2 phút.", "links": [{"label": "Video YouTube: a day in my life English speaking practice", "url": "https://www.youtube.com/results?search_query=a%20day%20in%20my%20life%20English%20speaking%20practice"}], "dialogue": {"title": "Tổng ôn: Thói quen, thời gian và sở thích", "lines": [{"speaker": "A", "en": "What time do you usually wake up?", "vi": "Bạn thường thức dậy lúc mấy giờ?"}, {"speaker": "B", "en": "I wake up at 6 a.m., exercise, then have breakfast.", "vi": "Tôi thức dậy lúc 6 giờ sáng, tập thể dục, rồi ăn sáng."}, {"speaker": "A", "en": "What do you do in your free time?", "vi": "Lúc rảnh bạn làm gì?"}, {"speaker": "B", "en": "I like taking photos and going shopping. What's the date today, by the way?", "vi": "Tôi thích chụp ảnh và đi mua sắm. Nhân tiện, hôm nay ngày mấy vậy?"}, {"speaker": "A", "en": "It's July 12th. Let's meet on time next week!", "vi": "Hôm nay ngày 12 tháng 7. Tuần sau gặp nhau đúng giờ nhé!"}]}}, {"week": 9, "month": 3, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Đồ ăn & Đi chợ/siêu thị", "review": false, "grammar": {"name": "Danh từ đếm được/không đếm được, some/any", "explain": "Danh từ đếm được có số nhiều (apple/apples). Danh từ không đếm được không có số nhiều (rice, water, sugar). Dùng 'some' trong câu khẳng định, 'any' trong câu phủ định/nghi vấn.", "examples": [{"en": "I need some rice.", "vi": "Tôi cần một ít gạo."}, {"en": "Do you have any eggs?", "vi": "Bạn có quả trứng nào không?"}, {"en": "There isn't any milk.", "vi": "Không còn sữa nào."}]}, "vocab": [{"w": "rice / bread / milk", "ipa": "", "vi": "gạo / bánh mì / sữa", "ex_en": "I need some rice.", "ex_vi": "Tôi cần một ít gạo."}, {"w": "meat / fish / egg(s)", "ipa": "", "vi": "thịt / cá / trứng", "ex_en": "I'd like some eggs.", "ex_vi": "Tôi muốn một ít trứng."}, {"w": "vegetable(s) / fruit", "ipa": "", "vi": "rau / trái cây", "ex_en": "We eat a lot of vegetables.", "ex_vi": "Chúng tôi ăn nhiều rau."}, {"w": "water / sugar / salt", "ipa": "", "vi": "nước / đường / muối", "ex_en": "Can I have some water?", "ex_vi": "Cho tôi xin một ít nước được không?"}, {"w": "how much / how many", "ipa": "", "vi": "bao nhiêu (không đếm/đếm được)", "ex_en": "How much rice do you need?", "ex_vi": "Bạn cần bao nhiêu gạo?"}, {"w": "kilogram/kilo", "ipa": "", "vi": "cân, ký", "ex_en": "I need one kilo of rice.", "ex_vi": "Tôi cần một ký gạo."}, {"w": "supermarket / market", "ipa": "", "vi": "siêu thị / chợ", "ex_en": "I go to the market every morning.", "ex_vi": "Tôi đi chợ mỗi sáng."}, {"w": "expensive / cheap", "ipa": "", "vi": "đắt / rẻ", "ex_en": "This fruit is cheap.", "ex_vi": "Trái cây này rẻ."}, {"w": "chicken / pork / beef", "ipa": "/ˈtʃɪkɪn/ /pɔːrk/ /biːf/", "vi": "thịt gà / thịt heo / thịt bò", "ex_en": "I'd like some chicken.", "ex_vi": "Tôi muốn một ít thịt gà."}, {"w": "onion / garlic", "ipa": "/ˈʌnjən/ /ˈɡɑːrlɪk/", "vi": "hành / tỏi", "ex_en": "Do you have any onions?", "ex_vi": "Bạn có hành không?"}, {"w": "basket / cart", "ipa": "/ˈbæskɪt/ /kɑːrt/", "vi": "giỏ / xe đẩy", "ex_en": "I need a shopping cart.", "ex_vi": "Tôi cần một xe đẩy hàng."}, {"w": "fresh / frozen", "ipa": "/freʃ/ /ˈfroʊzən/", "vi": "tươi / đông lạnh", "ex_en": "This fish is fresh.", "ex_vi": "Con cá này tươi."}], "patterns": ["I need some/a...", "Do you have any...?", "How much/many ... do you need?"], "quiz": [{"q": "Danh từ không đếm được: ", "options": ["egg", "rice", "apple"], "answer": 1, "explain": "rice (gạo) là danh từ không đếm được."}, {"q": "Câu hỏi đúng: 'Bạn có trứng không?'", "options": ["Do you have some eggs?", "Do you have any eggs?", "Do you has any eggs?"], "answer": 1, "explain": "Câu hỏi dùng 'any'."}, {"q": "Hỏi số lượng gạo dùng:", "options": ["How many rice", "How much rice", "How rice"], "answer": 1, "explain": "Rice không đếm được nên dùng 'How much'."}, {"q": "'Bạn có hành không?' dùng đúng:", "options": ["Do you have any onions?", "Do you have some onions?", "Do you has any onions?"], "answer": 0, "explain": "câu hỏi dùng 'any'."}, {"q": "Từ trái nghĩa với 'fresh':", "options": ["frozen", "cheap", "expensive"], "answer": 0, "explain": "frozen (đông lạnh) trái với fresh (tươi)."}, {"q": "'Tôi cần một xe đẩy hàng':", "options": ["I need a shopping basket.", "I need a shopping cart.", "I need a shopping onion."], "answer": 1, "explain": "cart = xe đẩy."}], "speaking": "Đóng vai đi chợ mua 5 loại thực phẩm, hỏi giá bằng tiếng Anh.", "homework": "Viết danh sách đi chợ (shopping list) bằng tiếng Anh gồm 8 món.", "links": [{"label": "Video YouTube: shopping for food English conversation beginner", "url": "https://www.youtube.com/results?search_query=shopping%20for%20food%20English%20conversation%20beginner"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}], "dialogue": {"title": "Đi siêu thị mua đồ ăn", "lines": [{"speaker": "A", "en": "Excuse me, do you have any fresh chicken?", "vi": "Xin lỗi, ở đây có thịt gà tươi không?"}, {"speaker": "B", "en": "Yes, we do. It's right here, next to the beef.", "vi": "Có ạ. Ở ngay đây, cạnh thịt bò."}, {"speaker": "A", "en": "Great. How much is one kilo?", "vi": "Tuyệt. Một ký giá bao nhiêu?"}, {"speaker": "B", "en": "It's 80,000 dong per kilo.", "vi": "80,000 đồng một ký ạ."}, {"speaker": "A", "en": "I'll take one kilo, please. Do you have onions and garlic too?", "vi": "Cho tôi một ký. Ở đây có hành và tỏi không?"}, {"speaker": "B", "en": "Yes, they're over there, in the basket.", "vi": "Có ạ, ở đằng kia, trong cái giỏ."}]}}, {"week": 10, "month": 3, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Ở nhà hàng/quán ăn", "review": false, "grammar": {"name": "Cấu trúc gọi món lịch sự: I'd like.../Can I have...?", "explain": "Khi gọi món, dùng 'I'd like' (= I would like) hoặc 'Can I have...?' để lịch sự hơn 'I want'.", "examples": [{"en": "I'd like a coffee, please.", "vi": "Cho tôi một ly cà phê."}, {"en": "Can I have the menu, please?", "vi": "Cho tôi xin thực đơn được không?"}, {"en": "Could we have the bill, please?", "vi": "Cho chúng tôi xin hóa đơn được không?"}]}, "vocab": [{"w": "menu", "ipa": "/ˈmenjuː/", "vi": "thực đơn", "ex_en": "Can I see the menu, please?", "ex_vi": "Cho tôi xem thực đơn được không?"}, {"w": "order", "ipa": "/ˈɔːrdər/", "vi": "gọi món/đặt hàng", "ex_en": "I'd like to order now.", "ex_vi": "Tôi muốn gọi món ngay bây giờ."}, {"w": "waiter/waitress", "ipa": "", "vi": "phục vụ nam/nữ", "ex_en": "The waiter is friendly.", "ex_vi": "Anh phục vụ rất thân thiện."}, {"w": "bill/check", "ipa": "", "vi": "hóa đơn", "ex_en": "Can we have the bill, please?", "ex_vi": "Cho chúng tôi xin hóa đơn."}, {"w": "delicious", "ipa": "/dɪˈlɪʃəs/", "vi": "ngon", "ex_en": "This dish is delicious.", "ex_vi": "Món này ngon."}, {"w": "spicy / sweet / sour", "ipa": "", "vi": "cay / ngọt / chua", "ex_en": "I like spicy food.", "ex_vi": "Tôi thích đồ ăn cay."}, {"w": "water / juice / tea", "ipa": "", "vi": "nước / nước ép / trà", "ex_en": "Can I have some water?", "ex_vi": "Cho tôi xin một ít nước."}, {"w": "recommend", "ipa": "/ˌrekəˈmend/", "vi": "gợi ý/giới thiệu", "ex_en": "What do you recommend?", "ex_vi": "Bạn gợi ý món gì?"}, {"w": "appetizer / main course / dessert", "ipa": "/ˈæpɪtaɪzər/", "vi": "khai vị / món chính / tráng miệng", "ex_en": "What's the main course today?", "ex_vi": "Món chính hôm nay là gì?"}, {"w": "vegetarian", "ipa": "/ˌvedʒəˈteriən/", "vi": "người ăn chay", "ex_en": "I'm vegetarian.", "ex_vi": "Tôi ăn chay."}, {"w": "service", "ipa": "/ˈsɜːrvɪs/", "vi": "dịch vụ (phục vụ)", "ex_en": "The service here is great.", "ex_vi": "Dịch vụ ở đây rất tốt."}, {"w": "takeaway / to go", "ipa": "/ˈteɪkəweɪ/", "vi": "mang đi", "ex_en": "Can I get this to go?", "ex_vi": "Cho tôi món này mang đi được không?"}], "patterns": ["I'd like + danh từ, please.", "Can I have + danh từ?", "What do you recommend?"], "quiz": [{"q": "Cách gọi món lịch sự nhất:", "options": ["I want a coffee.", "I'd like a coffee, please.", "Give me a coffee."], "answer": 1, "explain": "I'd like... please lịch sự hơn."}, {"q": "'Cho tôi xin hóa đơn' dịch đúng:", "options": ["Can I have the bill, please?", "Can I have the menu?", "I like the bill."], "answer": 0, "explain": "bill = hóa đơn."}, {"q": "Từ nào nghĩa là 'ngon'?", "options": ["spicy", "delicious", "sour"], "answer": 1, "explain": "delicious = ngon."}, {"q": "'Tôi ăn chay' tiếng Anh là:", "options": ["I'm vegetarian.", "I'm a service.", "I'm takeaway."], "answer": 0, "explain": "vegetarian = người ăn chay."}, {"q": "'Cho tôi món này mang đi':", "options": ["Can I get this to go?", "Can I get this appetizer?", "Can I get this service?"], "answer": 0, "explain": "to go = mang đi."}, {"q": "Món ăn đầu tiên trong bữa gọi là:", "options": ["dessert", "appetizer", "main course"], "answer": 1, "explain": "appetizer = món khai vị."}], "speaking": "Đóng vai role-play: 1 người là khách, 1 người là phục vụ, gọi món đầy đủ.", "homework": "Viết đoạn hội thoại gọi món tại nhà hàng (6-8 câu).", "links": [{"label": "Video YouTube: ordering food at a restaurant English conversation", "url": "https://www.youtube.com/results?search_query=ordering%20food%20at%20a%20restaurant%20English%20conversation"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Gọi món tại nhà hàng", "lines": [{"speaker": "A", "en": "Good evening! Can I see the menu, please?", "vi": "Chào buổi tối! Cho tôi xem thực đơn được không?"}, {"speaker": "B", "en": "Of course. Here you are. Are you ready to order?", "vi": "Vâng ạ. Đây ạ. Anh/chị đã sẵn sàng gọi món chưa?"}, {"speaker": "A", "en": "Yes. I'd like the chicken soup as an appetizer, and grilled fish as the main course.", "vi": "Vâng. Tôi muốn súp gà làm món khai vị, và cá nướng làm món chính."}, {"speaker": "B", "en": "Great choice. Anything to drink?", "vi": "Lựa chọn tuyệt vời. Anh/chị muốn uống gì không?"}, {"speaker": "A", "en": "Just water, thanks. Actually, I'm vegetarian — can you make it without meat?", "vi": "Chỉ cần nước thôi. Mà tôi ăn chay — có thể làm không thịt được không?"}, {"speaker": "B", "en": "No problem at all!", "vi": "Không vấn đề gì ạ!"}]}}, {"week": 11, "month": 3, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Hỏi đường & Phương tiện", "review": false, "grammar": {"name": "Giới từ chỉ nơi chốn (in/on/at/next to/near)", "explain": "in: trong một không gian kín/khu vực lớn (in the city). on: trên bề mặt/con đường (on Main Street). at: tại một điểm cụ thể (at the corner). next to/near: kề bên/gần.", "examples": [{"en": "The bank is next to the supermarket.", "vi": "Ngân hàng ở kề bên siêu thị."}, {"en": "Turn left at the corner.", "vi": "Rẽ trái ở góc đường."}, {"en": "It's on Main Street.", "vi": "Nó ở trên đường Main."}]}, "vocab": [{"w": "turn left/right", "ipa": "", "vi": "rẽ trái/phải", "ex_en": "Turn left at the traffic light.", "ex_vi": "Rẽ trái ở đèn giao thông."}, {"w": "go straight", "ipa": "", "vi": "đi thẳng", "ex_en": "Go straight for two blocks.", "ex_vi": "Đi thẳng hai dãy nhà."}, {"w": "traffic light", "ipa": "", "vi": "đèn giao thông", "ex_en": "Turn right at the traffic light.", "ex_vi": "Rẽ phải ở đèn giao thông."}, {"w": "corner", "ipa": "/ˈkɔːrnər/", "vi": "góc đường", "ex_en": "The shop is on the corner.", "ex_vi": "Cửa hàng ở góc đường."}, {"w": "bus / train / taxi", "ipa": "", "vi": "xe buýt / tàu / taxi", "ex_en": "I go to work by bus.", "ex_vi": "Tôi đi làm bằng xe buýt."}, {"w": "station", "ipa": "/ˈsteɪʃən/", "vi": "trạm/ga", "ex_en": "The bus station is near here.", "ex_vi": "Trạm xe buýt gần đây."}, {"w": "excuse me", "ipa": "", "vi": "xin lỗi (để hỏi)", "ex_en": "Excuse me, where is the bank?", "ex_vi": "Xin lỗi, ngân hàng ở đâu?"}, {"w": "far / near", "ipa": "/fɑːr/ /nɪr/", "vi": "xa / gần", "ex_en": "Is it far from here?", "ex_vi": "Nó có xa đây không?"}, {"w": "crossroads / intersection", "ipa": "/ˈkrɔːsroʊdz/", "vi": "ngã tư/giao lộ", "ex_en": "Turn right at the intersection.", "ex_vi": "Rẽ phải ở giao lộ."}, {"w": "bridge", "ipa": "/brɪdʒ/", "vi": "cây cầu", "ex_en": "Go over the bridge.", "ex_vi": "Đi qua cây cầu."}, {"w": "on foot / by bike", "ipa": "/ɒn fʊt/ /baɪ baɪk/", "vi": "đi bộ / đi xe đạp", "ex_en": "I go to school on foot.", "ex_vi": "Tôi đi bộ đến trường."}, {"w": "map", "ipa": "/mæp/", "vi": "bản đồ", "ex_en": "Can you show me on the map?", "ex_vi": "Bạn có thể chỉ cho tôi trên bản đồ không?"}], "patterns": ["Excuse me, where is the...?", "Turn left/right at...", "It's next to/near..."], "quiz": [{"q": "'Ngân hàng kề bên siêu thị' dùng giới từ:", "options": ["in", "next to", "on"], "answer": 1, "explain": "next to = kề bên."}, {"q": "Hỏi đường lịch sự bắt đầu bằng:", "options": ["Excuse me,", "Sorry you,", "Hello where"], "answer": 0, "explain": "Excuse me = xin lỗi để hỏi."}, {"q": "'Đi thẳng' tiếng Anh là:", "options": ["turn left", "go straight", "turn right"], "answer": 1, "explain": "go straight = đi thẳng."}, {"q": "'Đi qua cây cầu':", "options": ["Go over the bridge.", "Go over the intersection.", "Go over the map."], "answer": 0, "explain": "bridge = cây cầu."}, {"q": "'Tôi đi bộ đến trường':", "options": ["I go to school on foot.", "I go to school by foot.", "I go to school on bike."], "answer": 0, "explain": "on foot = đi bộ."}, {"q": "'Rẽ phải ở giao lộ':", "options": ["Turn right at the bridge.", "Turn right at the intersection.", "Turn right at the map."], "answer": 1, "explain": "intersection = giao lộ, ngã tư."}], "speaking": "Đóng vai hỏi đường đến 3 địa điểm khác nhau (bưu điện, bệnh viện, trạm xe buýt).", "homework": "Vẽ bản đồ đơn giản từ nhà đến 1 địa điểm quen thuộc, viết chỉ dẫn bằng tiếng Anh.", "links": [{"label": "Video YouTube: asking for directions in English beginner", "url": "https://www.youtube.com/results?search_query=asking%20for%20directions%20in%20English%20beginner"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}], "dialogue": {"title": "Hỏi đường đến bưu điện", "lines": [{"speaker": "A", "en": "Excuse me, how can I get to the post office?", "vi": "Xin lỗi, làm sao để đến bưu điện ạ?"}, {"speaker": "B", "en": "Go straight, then turn left at the intersection.", "vi": "Đi thẳng, rồi rẽ trái ở giao lộ."}, {"speaker": "A", "en": "Is it far from here?", "vi": "Nó có xa đây không?"}, {"speaker": "B", "en": "No, it's close. You can go on foot, about 5 minutes.", "vi": "Không, gần thôi. Bạn có thể đi bộ, khoảng 5 phút."}, {"speaker": "A", "en": "Do I need to cross the bridge?", "vi": "Tôi có cần qua cầu không?"}, {"speaker": "B", "en": "No, the post office is right next to the bank, before the bridge.", "vi": "Không, bưu điện ngay cạnh ngân hàng, trước cây cầu."}, {"speaker": "A", "en": "Great, thank you so much!", "vi": "Tuyệt, cảm ơn bạn rất nhiều!"}]}}, {"week": 12, "month": 3, "phase": "Giai đoạn 1: Nền tảng (Tháng 1-3)", "title": "Ôn tập cuối Giai đoạn 1 & Kiểm tra tổng hợp", "review": true, "grammar": {"name": "Ôn tập toàn bộ Tháng 1-3", "explain": "Ôn toàn bộ: to be, hiện tại đơn, mạo từ, some/any, gọi món nhà hàng, hỏi đường. Ôn toàn bộ ~500 từ vựng đã học.", "examples": [{"en": "Excuse me, I'd like some rice and where is the supermarket?", "vi": "Xin lỗi, tôi muốn mua ít gạo và siêu thị ở đâu?"}]}, "vocab": [{"w": "rice / bread / milk", "ipa": "", "vi": "gạo / bánh mì / sữa", "ex_en": "I need some rice.", "ex_vi": "Tôi cần một ít gạo."}, {"w": "meat / fish / egg(s)", "ipa": "", "vi": "thịt / cá / trứng", "ex_en": "I'd like some eggs.", "ex_vi": "Tôi muốn một ít trứng."}, {"w": "vegetable(s) / fruit", "ipa": "", "vi": "rau / trái cây", "ex_en": "We eat a lot of vegetables.", "ex_vi": "Chúng tôi ăn nhiều rau."}, {"w": "water / sugar / salt", "ipa": "", "vi": "nước / đường / muối", "ex_en": "Can I have some water?", "ex_vi": "Cho tôi xin một ít nước được không?"}, {"w": "menu", "ipa": "/ˈmenjuː/", "vi": "thực đơn", "ex_en": "Can I see the menu, please?", "ex_vi": "Cho tôi xem thực đơn được không?"}, {"w": "order", "ipa": "/ˈɔːrdər/", "vi": "gọi món/đặt hàng", "ex_en": "I'd like to order now.", "ex_vi": "Tôi muốn gọi món ngay bây giờ."}, {"w": "waiter/waitress", "ipa": "", "vi": "phục vụ nam/nữ", "ex_en": "The waiter is friendly.", "ex_vi": "Anh phục vụ rất thân thiện."}, {"w": "bill/check", "ipa": "", "vi": "hóa đơn", "ex_en": "Can we have the bill, please?", "ex_vi": "Cho chúng tôi xin hóa đơn."}, {"w": "turn left/right", "ipa": "", "vi": "rẽ trái/phải", "ex_en": "Turn left at the traffic light.", "ex_vi": "Rẽ trái ở đèn giao thông."}, {"w": "go straight", "ipa": "", "vi": "đi thẳng", "ex_en": "Go straight for two blocks.", "ex_vi": "Đi thẳng hai dãy nhà."}, {"w": "traffic light", "ipa": "", "vi": "đèn giao thông", "ex_en": "Turn right at the traffic light.", "ex_vi": "Rẽ phải ở đèn giao thông."}, {"w": "corner", "ipa": "/ˈkɔːrnər/", "vi": "góc đường", "ex_en": "The shop is on the corner.", "ex_vi": "Cửa hàng ở góc đường."}], "patterns": ["Ôn tất cả cấu trúc đã học 12 tuần"], "quiz": [{"q": "Tổng hợp: 'She ___ a teacher and she ___ like coffee.'", "options": ["is / doesn't", "is / don't", "are / doesn't"], "answer": 0, "explain": "is (to be) + doesn't (hiện tại đơn phủ hàng nhé. Tôi biết một chỗ ngon."}, {"speaker": "B", "en": "Sounds great. Is it far? Can we go on foot?", "vi": "Nghe hay đấy. Có xa không? Mình đi bộ được không?"}, {"speaker": "A", "en": "It's close, just turn left at the intersection.", "vi": "Gần thôi, chỉ cần rẽ trái ở giao lộ."}, {"speaker": "B", "en": "Perfect. I'm vegetarian, though — I hope they have options for me.", "vi": "Tuyệt. Nhưng tôi ăn chay — hy vọng họ có món cho tôi."}, {"speaker": "A", "en": "Don't worry, this restaurant has great vegetarian dishes too!", "vi": "Đừng lo, nhà hàng này cũng có món chay rất ngon!"}]}}, {"week": 13, "month": 4, "phase": "Giai đoạn 2: Sơ cấp (Tháng 4-6)", "title": "Hôm qua tôi đã làm gì", "review": false, "grammar": {"name": "Thì quá khứ đơn (động từ có quy tắc)", "explain": "Diễn tả hành động đã xảy ra và kết thúc trong quá khứ. Động từ có quy tắc thêm '-ed'. Phủ định: didn't + V nguyên mẫu. Nghi vấn: Did + S + V nguyên mẫu?", "examples": [{"en": "I worked yesterday.", "vi": "Tôi đã làm việc hôm qua."}, {"en": "She didn't call me.", "vi": "Cô ấy đã không gọi cho tôi."}, {"en": "Did you watch the movie?", "vi": "Bạn đã xem phim chưa?"}]}, "vocab": [{"w": "yesterday", "ipa": "/ˈjestərdeɪ/", "vi": "hôm qua", "ex_en": "I worked yesterday.", "ex_vi": "Tôi đã làm việc hôm qua."}, {"w": "last night/week", "ipa": "", "vi": "tối qua/tuần trước", "ex_en": "I studied last night.", "ex_vi": "Tôi đã học tối qua."}, {"w": "watch - watched", "ipa": "", "vi": "xem (quá khứ)", "ex_en": "I watched a movie.", "ex_vi": "Tôi đã xem một bộ phim."}, {"w": "play - played", "ipa": "", "vi": "chơi (quá khứ)", "ex_en": "We played football.", "ex_vi": "Chúng tôi đã chơi bóng đá."}, {"w": "visit - visited", "ipa": "", "vi": "thăm (quá khứ)", "ex_en": "I visited my grandma.", "ex_vi": "Tôi đã thăm bà."}, {"w": "clean - cleaned", "ipa": "", "vi": "dọn dẹp (quá khứ)", "ex_en": "She cleaned the house.", "ex_vi": "Cô ấy đã dọn nhà."}, {"w": "call - called", "ipa": "", "vi": "gọi điện (quá khứ)", "ex_en": "He called me.", "ex_vi": "Anh ấy đã gọi cho tôi."}, {"w": "finish - finished", "ipa": "", "vi": "hoàn thành (quá khứ)", "ex_en": "I finished my homework.", "ex_vi": "Tôi đã hoàn thành bài tập."}, {"w": "cook - cooked", "ipa": "/kʊkt/", "vi": "nấu ăn (quá khứ)", "ex_en": "I cooked dinner yesterday.", "ex_vi": "Tôi đã nấu bữa tối hôm qua."}, {"w": "wash - washed", "ipa": "/wɒʃt/", "vi": "rửa (quá khứ)", "ex_en": "I washed the dishes.", "ex_vi": "Tôi đã rửa bát."}, {"w": "walk - walked", "ipa": "/wɔːkt/", "vi": "đi bộ (quá khứ)", "ex_en": "We walked to the park.", "ex_vi": "Chúng tôi đã đi bộ đến công viên."}, {"w": "stay - stayed", "ipa": "/steɪd/", "vi": "ở lại (quá khứ)", "ex_en": "I stayed at home last night.", "ex_vi": "Tối qua tôi đã ở nhà."}], "patterns": ["S + V-ed + O (yesterday/last night)", "Did + S + V? / S + didn't + V"], "quiz": [{"q": "Quá khứ của 'work' là:", "options": ["work", "worked", "working"], "answer": 1, "explain": "Động từ có quy tắc thêm -ed."}, {"q": "Câu hỏi đúng: 'Bạn đã xem phim chưa?'", "options": ["Did you watch the movie?", "Did you watched the movie?", "Do you watch the movie?"], "answer": 0, "explain": "Did + V nguyên mẫu."}, {"q": "Phủ định đúng: 'Cô ấy đã không gọi.'", "options": ["She not called.", "She didn't call.", "She didn't called."], "answer": 1, "explain": "didn't + V nguyên mẫu."}, {"q": "Quá khứ của 'wash' là:", "options": ["wash", "washed", "washing"], "answer": 1, "explain": "wash → washed (thêm -ed)."}, {"q": "'Chúng tôi đã đi bộ đến công viên':", "options": ["We walk to the park.", "We walked to the park.", "We walking to the park."], "answer": 1, "explain": "quá khứ đơn: walked."}, {"q": "'Tối qua tôi đã ở nhà':", "options": ["I stay at home last night.", "I stayed at home last night.", "I staying at home last night."], "answer": 1, "explain": "stay → stayed."}], "speaking": "Kể lại 5 việc bạn đã làm ngày hôm qua bằng thì quá khứ đơn.", "homework": "Viết nhật ký (diary) ngắn về hôm qua, ít nhất 6 câu dùng quá khứ đơn.", "links": [{"label": "Video YouTube: simple past tense regular verbs English beginner", "url": "https://www.youtube.com/results?search_query=simple%20past%20tense%20regular%20verbs%20English%20beginner"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Kể lại một ngày đã qua", "lines": [{"speaker": "A", "en": "What did you do yesterday?", "vi": "Hôm qua bạn đã làm gì?"}, {"speaker": "B", "en": "I cooked dinner and washed the dishes.", "vi": "Tôi đã nấu bữa tối và rửa bát."}, {"speaker": "A", "en": "Did you go out at all?", "vi": "Bạn có ra ngoài không?"}, {"speaker": "B", "en": "Yes, I walked to the park in the evening.", "vi": "Có, tôi đã đi bộ đến công viên vào buổi tối."}, {"speaker": "A", "en": "Sounds nice. I stayed at home all day.", "vi": "Nghe hay đấy. Tôi đã ở nhà cả ngày."}]}}, {"week": 14, "month": 4, "phase": "Giai đoạn 2: Sơ cấp (Tháng 4-6)", "title": "Kỳ nghỉ đáng nhớ", "review": false, "grammar": {"name": "Thì quá khứ đơn (động từ bất quy tắc thông dụng)", "explain": "Nhiều động từ không thêm -ed mà biến đổi hoàn toàn: go-went, eat-ate, see-saw, have-had... Cần học thuộc vì không theo quy tắc.", "examples": [{"en": "I went to Da Lat last year.", "vi": "Tôi đã đi Đà Lạt năm ngoái."}, {"en": "We ate delicious food.", "vi": "Chúng tôi đã ăn đồ ăn ngon."}, {"en": "I saw the beach.", "vi": "Tôi đã thấy bãi biển."}]}, "vocab": [{"w": "go - went", "ipa": "/went/", "vi": "đi (quá khứ)", "ex_en": "I went to the beach.", "ex_vi": "Tôi đã đi biển."}, {"w": "eat - ate", "ipa": "/eɪt/", "vi": "ăn (quá khứ)", "ex_en": "We ate seafood.", "ex_vi": "Chúng tôi đã ăn hải sản."}, {"w": "see - saw", "ipa": "/sɔː/", "vi": "thấy (quá khứ)", "ex_en": "I saw a beautiful sunset.", "ex_vi": "Tôi đã thấy hoàng hôn đẹp."}, {"w": "have - had", "ipa": "/hæd/", "vi": "có (quá khứ)", "ex_en": "We had a great time.", "ex_vi": "Chúng tôi đã có khoảng thời gian tuyệt vời."}, {"w": "buy - bought", "ipa": "/bɔːt/", "vi": "mua (quá khứ)", "ex_en": "I bought some souvenirs.", "ex_vi": "Tôi đã mua ít quà lưu niệm."}, {"w": "take - took", "ipa": "/tʊk/", "vi": "chụp/lấy (quá khứ)", "ex_en": "I took a lot of photos.", "ex_vi": "Tôi đã chụp rất nhiều ảnh."}, {"w": "beach / mountain", "ipa": "", "vi": "bãi biển / núi", "ex_en": "We went to the mountain.", "ex_vi": "Chúng tôi đã đi núi."}, {"w": "souvenir", "ipa": "/ˌsuːvəˈnɪr/", "vi": "quà lưu niệm", "ex_en": "I bought a souvenir.", "ex_vi": "Tôi đã mua một món quà lưu niệm."}, {"w": "meet - met", "ipa": "/met/", "vi": "gặp (quá khứ)", "ex_en": "I met new friends there.", "ex_vi": "Tôi đã gặp bạn mới ở đó."}, {"w": "swim - swam", "ipa": "/swæm/", "vi": "bơi (quá khứ)", "ex_en": "We swam in the sea.", "ex_vi": "Chúng tôi đã bơi ở biển."}, {"w": "stay overnight", "ipa": "/steɪ ˈoʊvərnaɪt/", "vi": "ở qua đêm", "ex_en": "We stayed overnight at a hotel.", "ex_vi": "Chúng tôi đã ở qua đêm tại khách sạn."}, {"w": "relax on the beach", "ipa": "/rɪˈlæks/", "vi": "thư giãn trên bãi biển", "ex_en": "I relaxed on the beach all day.", "ex_vi": "Tôi đã thư giãn trên bãi biển cả ngày."}], "patterns": ["I went to... / I had a great time.", "Last year, I..."], "quiz": [{"q": "Quá khứ của 'go' là:", "options": ["goed", "went", "going"], "answer": 1, "explain": "go là động từ bất quy tắc: went."}, {"q": "Quá khứ của 'eat' là:", "options": ["ated", "ate", "eating"], "answer": 1, "explain": "eat - ate."}, {"q": "'Tôi đã chụp nhiều ảnh':", "options": ["I take a lot of photos.", "I took a lot of photos.", "I taked photos."], "answer": 1, "explain": "take - took."}, {"q": "Quá khứ của 'meet' là:", "options": ["meeted", "met", "meet"], "answer": 1, "explain": "meet là bất quy tắc: met."}, {"q": "Quá khứ của 'swim' là:", "options": ["swimmed", "swam", "swum"], "answer": 1, "explain": "swim - swam (quá khứ đơn); swum là V3."}, {"q": "'Chúng tôi đã ở qua đêm tại khách sạn':", "options": ["We stay overnight at a hotel.", "We stayed overnight at a hotel.", "We staying overnight."], "answer": 1, "explain": "stayed = quá khứ."}], "speaking": "Kể về một chuyến du lịch đáng nhớ (nơi đến, đã làm gì, cảm nhận).", "homework": "Viết đoạn văn 6-8 câu về kỳ nghỉ đáng nhớ nhất của bạn.", "links": [{"label": "Video YouTube: irregular verbs past tense English list beginner", "url": "https://www.youtube.com/results?search_query=irregular%20verbs%20past%20tense%20English%20list%20beginner"}, {"label": "VOA Learning English (trang chủ)", "url": "https://learningenglish.voanews.com/"}], "dialogue": {"title": "Kể về kỳ nghỉ ở biển", "lines": [{"speaker": "A", "en": "How was your trip to Da Nang?", "vi": "Chuyến đi Đà Nẵng của bạn thế nào?"}, {"speaker": "B", "en": "It was amazing! We swam in the sea every day.", "vi": "Tuyệt vời lắm! Chúng tôi đã bơi ở biển mỗi ngày."}, {"speaker": "A", "en": "Where did you stay?", "vi": "Bạn đã ở đâu?"}, {"speaker": "B", "en": "We stayed overnight at a beach hotel. We also met some interesting people.", "vi": "Chúng tôi đã ở qua đêm tại khách sạn gần biển. Chúng tôi cũng đã gặp vài người thú vị."}, {"speaker": "A", "en": "That sounds relaxing.", "vi": "Nghe có vẻ thư giãn đấy."}, {"speaker": "B", "en": "It was. I relaxed on the beach and took a lot of photos.", "vi": "Đúng vậy. Tôi đã thư giãn trên bãi biển và chụp rất nhiều ảnh."}]}}, {"week": 15, "month": 4, "phase": "Giai đoạn 2: Sơ cấp (Tháng 4-6)", "title": "Tiểu sử bản thân", "review": false, "grammar": {"name": "Câu hỏi Wh- ở thì quá khứ (When/Where/Why did you...?)", "explain": "Kết hợp từ để hỏi (When, Where, Why, What, How) với 'did' để hỏi chi tiết về quá khứ.", "examples": [{"en": "Where did you grow up?", "vi": "Bạn đã lớn lên ở đâu?"}, {"en": "When did you start working?", "vi": "Bạn đã bắt đầu đi làm khi nào?"}, {"en": "Why did you learn English?", "vi": "Tại sao bạn học tiếng Anh?"}]}, "vocab": [{"w": "grow up", "ipa": "", "vi": "lớn lên", "ex_en": "I grew up in Hanoi.", "ex_vi": "Tôi lớn lên ở Hà Nội."}, {"w": "born", "ipa": "/bɔːrn/", "vi": "được sinh ra", "ex_en": "I was born in 1996.", "ex_vi": "Tôi sinh năm 1996."}, {"w": "graduate", "ipa": "/ˈɡrædʒueɪt/", "vi": "tốt nghiệp", "ex_en": "I graduated in 2018.", "ex_vi": "Tôi đã tốt nghiệp năm 2018."}, {"w": "start / begin", "ipa": "", "vi": "bắt đầu", "ex_en": "I started working in 2019.", "ex_vi": "Tôi bắt đầu đi làm năm 2019."}, {"w": "move (to a city)", "ipa": "", "vi": "chuyển đến (thành phố)", "ex_en": "I moved to Ho Chi Minh City.", "ex_vi": "Tôi đã chuyển đến TP.HCM."}, {"w": "childhood", "ipa": "/ˈtʃaɪldhʊd/", "vi": "tuổi thơ", "ex_en": "I had a happy childhood.", "ex_vi": "Tôi đã có một tuổi thơ hạnh phúc."}, {"w": "hometown", "ipa": "/ˈhoʊmtaʊn/", "vi": "quê hương", "ex_en": "My hometown is beautiful.", "ex_vi": "Quê hương tôi rất đẹp."}, {"w": "experience", "ipa": "/ɪkˈspɪriəns/", "vi": "kinh nghiệm/trải nghiệm", "ex_en": "I have work experience.", "ex_vi": "Tôi có kinh nghiệm làm việc."}, {"w": "get married", "ipa": "/ɡet ˈmærid/", "vi": "kết hôn", "ex_en": "I got married in 2020.", "ex_vi": "Tôi đã kết hôn năm 2020."}, {"w": "get a job", "ipa": "/ɡet ə dʒɒb/", "vi": "có việc làm", "ex_en": "I got a job at a big company.", "ex_vi": "Tôi đã có việc làm ở một công ty lớn."}, {"w": "high school / university", "ipa": "/haɪ skuːl/", "vi": "trung học / đại học", "ex_en": "I studied at a university in Hanoi.", "ex_vi": "Tôi đã học ở một trường đại học tại Hà Nội."}, {"w": "achievement", "ipa": "/əˈtʃiːvmənt/", "vi": "thành tựu", "ex_en": "Graduating was a big achievement.", "ex_vi": "Tốt nghiệp là một thành tựu lớn."}], "patterns": ["Where/When/Why did you...?", "I was born in... / I grew up in..."], "quiz": [{"q": "Hỏi đúng 'Bạn sinh năm nào?'", "options": ["When you were born?", "When were you born?", "When did you born?"], "answer": 1, "explain": "Câu hỏi với 'was/were' cho 'to be' ở quá khứ."}, {"q": "'Tôi đã tốt nghiệp năm 2018':", "options": ["I graduate in 2018.", "I graduated in 2018.", "I am graduated 2018."], "answer": 1, "e m 2019."}], "patterns": ["Ôn tất cả mẫu câu Tuần 13-15"], "quiz": [{"q": "'Last week, I ___ (visit) my parents.'", "options": ["visit", "visited", "visiting"], "answer": 1, "explain": "quá khứ đơn: visited."}, {"q": "'___ did you go last summer?'", "options": ["What", "Where", "Why"], "answer": 1, "explain": "Hỏi địa điểm dùng Where."}, {"q": "'Tôi đã nấu bữa tối và rửa bát tối qua':", "options": ["I cook dinner and wash the dishes last night.", "I cooked dinner and washed the dishes last night.", "I cooking dinner and washing dishes."], "answer": 1, "explain": "cả 2 động từ đều ở quá khứ đơn."}, {"q": "'Chúng tôi đã bơi ở biển và gặp bạn mới':", "options": ["We swam in the sea and met new friends.", "We swimmed in the sea and meeted new friends.", "We swim in the sea and meet friends."], "answer": 0, "explain": "swim→swam, meet→met (bất quy tắc)."}, {"q": "'Tôi tốt nghiệp năm 2018 và có việc làm ngay sau đó':", "options": ["I graduate in 2018 and get a job.", "I graduated in 2018 and got a job right after.", "I graduated in 2018 and getting a job."], "answer": 1, "explain": "graduated, got đều là quá khứ đơn."}, {"q": "Câu hỏi đúng: 'Bạn đã lớn lên ở đâu?'", "options": ["Where you grew up?", "Where did you grow up?", "Where do you grew up?"], "answer": 1, "explain": "Did + S + V nguyên mẫu (grow, không phải grew)."}], "speaking": "Kể chuyện quá khứ 2 phút: tiểu sử bản thân + một kỷ niệm đáng nhớ.", "homework": "Ghi âm bài kể chuyện quá khứ 2 phút, nghe lại và sửa lỗi phát âm -ed.", "links": [{"label": "Video YouTube: past tense storytelling English practice", "url": "https://www.youtube.com/results?search_query=past%20tense%20storytelling%20English%20practice"}], "dialogue": {"title": "Tổng ôn: Kể chuyện quá khứ và tiểu sử", "lines": [{"speaker": "A", "en": "What did you do last weekend?", "vi": "Cuối tuần trước bạn đã làm gì?"}, {"speaker": "B", "en": "I went to Da Nang and swam in the sea. I also met some old friends there.", "vi": "Tôi đã đi Đà Nẵng và bơi ở biể i định tiết kiệm tiền."}, {"w": "move house", "ipa": "", "vi": "chuyển nhà", "ex_en": "We are going to move house.", "ex_vi": "Chúng tôi định chuyển nhà."}, {"w": "get married", "ipa": "", "vi": "kết hôn", "ex_en": "They are going to get married.", "ex_vi": "Họ định kết hôn."}, {"w": "intend to", "ipa": "/ɪnˈtend tuː/", "vi": "dự định", "ex_en": "I intend to travel next year.", "ex_vi": "Tôi dự định đi du lịch năm sau."}, {"w": "look forward to", "ipa": "/lʊk ˈfɔːrwərd tuː/", "vi": "mong chờ", "ex_en": "I'm looking forward to the trip.", "ex_vi": "Tôi đang mong chờ chuyến đi."}, {"w": "dream", "ipa": "/driːm/", "vi": "ước mơ", "ex_en": "My dream is to visit Japan.", "ex_vi": "Ước mơ của tôi là đến thăm Nhật Bản."}, {"w": "achieve a goal", "ipa": "/əˈtʃiːv ə ɡoʊl/", "vi": "đạt mục tiêu", "ex_en": "I want to achieve my goal this year.", "ex_vi": "Tôi muốn đạt mục tiêu của mình năm nay."}], "patterns": ["S + am/is/are + going to + V", "What are you going to do...?"], "quiz": [{"q": "'Cô ấy định đi du học':", "options": ["She going to study abroad.", "She is going to study abroad.", "She is go to study abroad."], "answer": 1, "explain": "S + is + going to + V."}, {"q": "Câu hỏi đúng:", "options": ["Are you going to travel?", "Do you going to travel?", "Are you go to travel?"], "answer": 0, "explain": "Are + S + going to + V?"}, {"q": "'be going to' dùng khi:", "options": ["Quyết định ngay lúc nói", "Đã có kế hoạch từ trước", "Dự đoán không chắc chắn"], "answer": 1, "explain": "be going to = kế hoạch có sẵn."}, {"q": "'Tôi đang mong chờ chuyến đi':", "options": ["I'm looking forward to the trip.", "I'm going to the trip.", "I intend the trip."], "answer": 0, "explain": "look forward to = mong chờ."}, {"q": "'Ước mơ của tôi là đến Nhật Bản':", "options": ["My dream is visit Japan.", "My dream is to visit Japan.", "My dream is visiting to Japan."], "answer": 1, "explain": "dream is + to V."}, {"q": "'Tôi dự định đi du lịch năm sau':", "options": ["I intend to travel next year.", "I intend travel next year.", "I intending to travel."], "answer": 0, "explain": "intend to + V nguyên mẫu."}], "speaking": "Nói về 3 dự định của bạn trong tháng tới.", "homework": "Viết kế hoạch cuối tuần chi tiết (5 câu) dùng be going to.", "links": [{"label": "Video YouTube: be going to future plans English grammar beginner", "url": "https://www.youtube.com/results?search_query=be%20going%20to%20future%20plans%20English%20grammar%20beginner"}, {"label": "BBC Learning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Chia sẻ dự định tương lai", "lines": [{"speaker": "A", "en": "What are you going to do this weekend?", "vi": "Cuối tuần này bạn định làm gì?"}, {"speaker": "B", "en": "I'm going to visit my parents. I intend to stay for two days.", "vi": "Tôi định thăm bố mẹ. Tôi dự định ở lại hai ngày."}, {"speaker": "A", "en": "That's nice. Do you have any big goals this year?", "vi": "Hay đấy. Năm nay bạn có mục tiêu lớn nào không?"}, {"speaker": "B", "en": "Yes, my dream is to travel abroad. I'm looking forward to it!", "vi": "Có, ước mơ của tôi là đi du lịch nước ngoài. Tôi đang rất mong chờ điều đó!"}, {"speaker": "A", "en": "I hope you achieve your goal!", "vi": "Tôi hy vọng bạn đạt được mục tiêu!"}]}}, {"week": 18, "month": 5, "phase": "Giai đoạn 2: Sơ cấp (Tháng 4-6)", "title": "Dự đoán tương lai", "review": false, "grammar": {"name": "WILL / WON'T (dự đoán, quyết định tức thời, lời hứa)", "explain": "Cấu trúc: S + will/won't + V nguyên mẫu. Dùng để dự đoán tương lai không chắc chắn, quyết định ngay lúc nói, hoặc đưa ra lời hứa.", "examples": [{"en": "It will rain tomorrow.", "vi": "Ngày mai trời sẽ mưa."}, {"en": "I will help you.", "vi": "Tôi sẽ giúp bạn."}, {"en": "She won't come to the party.", "vi": "Cô ấy sẽ không đến bữa tiệc."}]}, "vocab": [{"w": "weather", "ipa": "/ˈweðər/", "vi": "thời tiết", "ex_en": "The weather will be nice.", "ex_vi": "Thời tiết sẽ đẹp."}, {"w": "rain / sunny / cloudy", "ipa": "", "vi": "mưa / nắng / nhiều mây", "ex_en": "It will be sunny tomorrow.", "ex_vi": "Ngày mai trời sẽ nắng."}, {"w": "promise", "ipa": "/ˈprɒmɪs/", "vi": "hứa", "ex_en": "I promise I will call you.", "ex_vi": "Tôi hứa tôi sẽ gọi cho bạn."}, {"w": "probably", "ipa": "/ˈprɒbəbli/", "vi": "có lẽ", "ex_en": "It will probably rain.", "ex_vi": "Có lẽ trời sẽ mưa."}, {"w": "future", "ipa": "/ˈfjuːtʃər/", "vi": "tương lai", "ex_en": "I think about my future.", "ex_vi": "Tôi nghĩ về tương lai của mình."}, {"w": "believe", "ipa": "/bɪˈliːv/", "vi": "tin rằng", "ex_en": "I believe you will succeed.", "ex_vi": "Tôi tin bạn sẽ thành công."}, {"w": "in the future", "ipa": "", "vi": "trong tương lai", "ex_en": "In the future, I will live abroad.", "ex_vi": "Trong tương lai, tôi sẽ sống ở nước ngoài."}, {"w": "maybe", "ipa": "/ˈmeɪbi/", "vi": "có thể", "ex_en": "Maybe I will go there.", "ex_vi": "Có thể tôi sẽ đến đó."}, {"w": "forecast", "ipa": "/ˈfɔːrkæst/", "vi": "dự báo", "ex_en": "The weather forecast says it will rain.", "ex_vi": "Dự báo thời tiết nói trời sẽ mưa."}, {"w": "windy / stormy", "ipa": "/ˈwɪndi/ /ˈstɔːrmi/", "vi": "có gió / có bão", "ex_en": "It will be windy tomorrow.", "ex_vi": "Ngày mai trời sẽ có gió."}, {"w": "temperature", "ipa": "/ˈtemprətʃər/", "vi": "nhiệt độ", "ex_en": "The temperature will rise.", "ex_vi": "Nhiệt độ sẽ tăng."}, {"w": "definitely / certainly", "ipa": "/ˈdefɪnətli/", "vi": "chắc chắn", "ex_en": "It will definitely rain.", "ex_vi": "Trời chắc chắn sẽ mưa."}], "patterns": ["S + will/won't + V", "I think/I'm sure + S + will + V"], "quiz": [{"q": "'Ngày mai trời sẽ mưa':", "options": ["It will rains tomorrow.", "It will rain tomorrow.", "It rain tomorrow."], "answer": 1, "explain": "will + V nguyên mẫu."}, {"q": "Phủ định của will là:", "options": ["don't will", "won't", "not will"], "answer": 1, "explain": "won't = will not."}, {"q": "Dùng will khi:", "options": ["Có kế hoạch từ trước", "Quyết định/dự đoán ngay lúc nói", "Thói quen hằng n ning English (trang chủ)", "url": "https://learnenglish.britishcouncil.org/"}], "dialogue": {"title": "Nói chuyện công việc với đồng nghiệp", "lines": [{"speaker": "A", "en": "How's work going these days?", "vi": "Dạo này công việc thế nào?"}, {"speaker": "B", "en": "Pretty busy. I'm working overtime this week.", "vi": "Khá bận. Tuần này tôi đang làm thêm giờ."}, {"speaker": "A", "en": "I heard you got a promotion! Congratulations!", "vi": "Tôi nghe nói bạn được thăng chức! Chúc mừng nhé!"}, {"speaker": "B", "en": "Thank you! My coworkers are really supportive too.", "vi": "Cảm ơn bạn! Đồng nghiệp của tôi cũng rất hỗ trợ."}, {"speaker": "A", "en": "That's great. I'm actually applying for a new job myself.", "vi": "Hay quá. Thật ra tôi cũng đang ứng tuyển công việc mới."}]}}, {"week": 24, "month": 6, "phase": "Giai đoạn 2: Sơ cấp (Tháng 4-6)", "title": "Ôn tập cuối Giai đoạn 2 & Kiểm tra tổng hợp", "review": true, "grammar": {"name": "Ôn tập toàn bộ Tháng 4-6", "explain": "Ôn quá khứ đơn, be going to, will, so sánh hơn/nhất, should/have to, hiện tại tiếp diễn. Ôn toàn bộ ~1.200 từ vựng lũy kế.", "examples": [{"en": "Last year I went to Da Lat, and next year I'm going to visit Sapa. It will be amazing.", "vi": "Năm ngoái tôi đã đi Đà Lạt, và năm sau tôi định đi Sapa. Nó sẽ tuyệt vời."}]}, "vocab": [{"w": "big - bigger - biggest", "ipa": "", "vi": "to - to hơn - to nhất", "ex_en": "This house is bigger.", "ex_vi": "Ngôi nhà này to hơn."}, {"w": "small - smaller - smallest", "ipa": "", "vi": "nhỏ - nhỏ hơn - nhỏ nhất", "ex_en": "My room is smaller.", "ex_vi": "Phòng tôi nhỏ hơn."}, {"w": "expensive - more expensive - most expensive", "ipa": "", "vi": "đắt - đắt hơn - đắt nhất", "ex_en": "This phone is more expensive.", "ex_vi": "Điện thoại này đắt hơn."}, {"w": "good - better - best", "ipa": "", "vi": "tốt - tốt hơn - tốt nhất", "ex_en": "This restaurant is better.", "ex_vi": "Nhà hàng này tốt hơn."}, {"w": "headache / stomachache", "ipa": "", "vi": "đau đầu / đau bụng"
